$kind: http-example
name: An array of objects detailing contract information.
request:
  url: "{{baseUrl}}/pa/transactions"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "currency": "USD",
        "days": 90
      }
