$kind: http-example
name: access denied
request:
  url: "{{baseUrl}}/pa/transactions"
  method: POST
  headers:
    Content-Type: application/json
    Accept: text/plain; charset=utf-8
  body:
    type: json
    content: |-
      {
        "currency": "USD",
        "days": 90
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain; charset=utf-8
  body:
    type: text
    content: pariatur deserunt mollit
order: 10000
