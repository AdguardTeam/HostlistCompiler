$kind: http-example
request:
  url: "{{baseUrl}}/pa/transactions"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "currency": "USD",
        "days": 90
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "error": "aliqua cupidatat",
        "statusCode": "magna reprehenderit veniam"
      }
order: 2000
