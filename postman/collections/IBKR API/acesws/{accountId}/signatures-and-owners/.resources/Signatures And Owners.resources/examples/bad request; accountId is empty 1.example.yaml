$kind: http-example
name: bad request; accountId is empty
request:
  url: https://api.ibkr.com/v1/api/acesws/:accountId/signatures-and-owners
  method: GET
  headers:
    Accept: application/json; charset=utf-8
  pathVariables:
    accountId: ""
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "error": "Bad Request: accountId needed",
        "statusCode": 400
      }
order: 7000
