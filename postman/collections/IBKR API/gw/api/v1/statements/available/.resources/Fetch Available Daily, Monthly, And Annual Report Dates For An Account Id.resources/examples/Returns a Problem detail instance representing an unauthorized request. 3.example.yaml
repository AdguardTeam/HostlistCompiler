$kind: http-example
name: Returns a Problem detail instance representing an unauthorized request.
request:
  url: "{{baseUrl}}/gw/api/v1/statements/available?accountId=UXXXX"
  method: GET
  headers:
    Accept: application/problem+json
  queryParams:
    - key: accountId
      value: UXXXX
      description: (Required) Specifies the account id to retrieve information
response:
  statusCode: 402
  statusText: Payment Required
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 402,
        "title": "Unauthorized",
        "type": "/simple",
        "detail": "The request cannot be fulfilled for the account"
      }
order: 12000
