$kind: http-example
name: Returns a JSON object containing the available report dates.
request:
  url: "{{baseUrl}}/gw/api/v1/statements/available?accountId=UXXXX"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: accountId
      value: UXXXX
      description: (Required) Specifies the account id to retrieve information
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "data": {
          "dataType": "String",
          "value": {
            "daily": {
              "startDate": "veniam in exercitation velit ad",
              "endDate": "sint laborum ullamco mollit"
            },
            "monthly": [
              "fugiat et",
              "est ex veniam"
            ],
            "annual": [
              "nulla vo",
              "in laboris ullamco"
            ]
          }
        }
      }
order: 8000
