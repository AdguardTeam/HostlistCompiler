$kind: http-example
request:
  url: "{{baseUrl}}/gw/api/v1/statements/available?accountId=UXXXX"
  method: GET
  headers:
    Accept: application/problem+json
  queryParams:
    - key: accountId
      value: UXXXX
      description: (Required) Specifies the account id to retrieve information
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 401,
        "title": "Unauthorized",
        "type": "/simple",
        "detail": "The access token request is invalid"
      }
order: 3000
