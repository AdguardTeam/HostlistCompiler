$kind: http-example
name: Returns a Problem detail instance representing a forbidden request.
request:
  url: "{{baseUrl}}/gw/api/v1/statements/available?accountId=UXXXX"
  method: GET
  headers:
    Accept: application/problem+json
  queryParams:
    - key: accountId
      value: UXXXX
      description: (Required) Specifies the account id to retrieve information
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 403,
        "title": "Forbidden",
        "type": "/simple",
        "detail": "The access token fails to have sufficient scope"
      }
order: 7000
