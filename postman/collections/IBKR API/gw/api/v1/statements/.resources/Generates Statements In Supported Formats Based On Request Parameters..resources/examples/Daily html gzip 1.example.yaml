$kind: http-example
name: Daily html gzip
request:
  url: "{{baseUrl}}/gw/api/v1/statements"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "accountId": "UXXXX",
        "startDate": "20230102",
        "endDate": "20230102",
        "mimeType": "text/html",
        "gzip": true
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 400,
        "title": "Bad Request",
        "type": "/invalid-argument",
        "invalidArguments": [
          {
            "field": "accountId",
            "description": "Missing required parameter"
          },
          {
            "field": "accountId",
            "description": "Missing required parameter"
          }
        ]
      }
order: 6000
