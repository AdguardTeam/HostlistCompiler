$kind: http-example
name: Monthly pdf
request:
  url: "{{baseUrl}}/gw/api/v1/statements"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "accountId": "UXXXX",
        "startDate": "202301",
        "endDate": "202301",
        "mimeType": "application/pdf"
      }
