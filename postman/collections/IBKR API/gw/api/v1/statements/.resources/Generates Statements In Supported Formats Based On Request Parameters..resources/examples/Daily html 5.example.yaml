$kind: http-example
name: Daily html
request:
  url: "{{baseUrl}}/gw/api/v1/statements"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "accountId": "UXXXX",
        "startDate": "20230102",
        "endDate": "20230102",
        "mimeType": "text/html"
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 16000
