$kind: http-example
name: Daily html gzip
request:
  url: "{{baseUrl}}/gw/api/v1/statements"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "accountId": "UXXXX",
        "startDate": "20230102",
        "endDate": "20230102",
        "mimeType": "text/html",
        "gzip": true
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 401,
        "title": "Unauthorized",
        "type": "/simple",
        "detail": "The access token request is invalid"
      }
order: 20000
