$kind: http-example
name: Daily html
request:
  url: "{{baseUrl}}/gw/api/v1/statements"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "accountId": "UXXXX",
        "startDate": "20230102",
        "endDate": "20230102",
        "mimeType": "text/html"
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 403,
        "title": "Forbidden",
        "type": "/simple",
        "detail": "The access token fails to have sufficient scope"
      }
order: 13000
