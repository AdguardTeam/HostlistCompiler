$kind: http-example
name: Response
request:
  url: "{{baseUrl}}/gw/api/v1/instructions/query"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "QUERY_RECENT_INSTRUCTIONS",
        "instruction": {
          "clientInstructionId": 7009001,
          "accountId": "U139838",
          "transactionHistory": {
            "daysToGoBack": 3,
            "transactionType": "ACH_INSTRUCTION"
          }
        }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/invalid-argument",
        "title": "Bad Request",
        "status": 400,
        "detail": "Input is not a JSON Object or doesn't contain all expected fields",
        "invalidArguments": [
          {
            "field": "templateName",
            "description": "Missing required parameter"
          }
        ]
      }
order: 20000
