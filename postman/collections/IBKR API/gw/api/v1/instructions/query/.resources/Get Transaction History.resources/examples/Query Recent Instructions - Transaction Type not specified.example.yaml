$kind: http-example
request:
  url: "{{baseUrl}}/gw/api/v1/instructions/query"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "instructionType": "QUERY_RECENT_INSTRUCTIONS",
        "instruction": {
          "clientInstructionId": 7009001,
          "accountId": "U139838",
          "transactionHistory": {
            "daysToGoBack": 3
          }
        }
      }
response:
  statusCode: 202
  statusText: Accepted
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
        "instructionResult": {
          "ibReferenceId": 0,
          "clientInstructionId": 7009001,
          "instructionType": "QUERY_RECENT_INSTRUCTIONS",
          "instructionStatus": "PENDING",
          "instructionId": 43094002,
          "code": "PENDING",
          "description": "Query is being processed. Please poll for status 1 minutes later using FB status endpoint. No new queries will be allowed before this one is processed"
        },
        "instructionSetId": 3702,
        "status": 202
      }
order: 2000
