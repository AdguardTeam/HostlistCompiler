$kind: http-request
description: "Query list of recent transactions (up to 30 days) based on
  accountId.<br><br>**Scope**: `instructions.read`<br>**Security Policy**:
  `Signed JWT`"
url: "{{baseUrl}}/gw/api/v1/instructions/query"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: client-id
    value: abc123
    description: (Required) The client's clientId
body:
  type: json
  content: |-
    {
      "instructionType": "QUERY_RECENT_INSTRUCTIONS",
      "instruction": {
        "clientInstructionId": 7009001,
        "accountId": "U139838",
        "transactionHistory": {
          "daysToGoBack": 3,
          "transactionType": "ACH_INSTRUCTION"
        }
      }
    }
examples: ./.resources/Get Transaction History.resources/examples
order: 1000
