$kind: http-example
name: Query Recent Instructions - Transaction Type not specified
request:
  url: "{{baseUrl}}/gw/api/v1/instructions/query"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "QUERY_RECENT_INSTRUCTIONS",
        "instruction": {
          "clientInstructionId": 7009001,
          "accountId": "U139838",
          "transactionHistory": {
            "daysToGoBack": 3
          }
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 18000
