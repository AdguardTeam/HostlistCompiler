$kind: http-example
name: Client tried to reuse the same instructionId for more than one
  transaction. Returning the status for the first registered transaction under
  given instructionId (when there were no duplicates yet). Reconcile based on
  instructionSetId
request:
  url: "{{baseUrl}}/gw/api/v1/instructions/:instructionId"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    instructionId: ""
response:
  statusCode: 208
  statusText: Already Reported (WebDAV) (RFC 5842)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": 208,
        "instructionResult": {
          "clientInstructionId": 1013025,
          "instructionType": "INTERNAL_CASH_TRANSFER",
          "instructionStatus": "REJECTED",
          "instructionId": 43091799,
          "error": {
            "errorCode": "CORRUPT_DATA_INVALID_ACCT",
            "errorMessage": "Account U1 does not exist"
          }
        },
        "instructionSetId": 1686
      }
order: 11000
