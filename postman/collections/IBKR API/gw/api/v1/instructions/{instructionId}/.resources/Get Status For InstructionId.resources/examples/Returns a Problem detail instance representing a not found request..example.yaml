$kind: http-example
request:
  url: "{{baseUrl}}/gw/api/v1/instructions/:instructionId"
  method: GET
  headers:
    Accept: application/problem+json
  pathVariables:
    instructionId: ""
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/simple",
        "title": "Not found",
        "status": 404,
        "detail": "Funds & Banking: Could not get status for clientId: qatester, transactionId : 72308156"
      }
order: 8000
