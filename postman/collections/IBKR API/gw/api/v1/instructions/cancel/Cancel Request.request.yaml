  content: |-
    {
      "instructionType": "CANCEL_INSTRUCTION",
      "instruction": {
        "clientInstructionId": 12001810,
        "instructionId": 43085477,
        "reason": "Testing"
      }
    }
examples: ./.resources/Cancel Request.resources/examples
