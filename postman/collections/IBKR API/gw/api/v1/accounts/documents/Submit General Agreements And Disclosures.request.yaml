$kind: http-request
description: "Provides mechanism to submit Agreements and Disclosures to IBKR
  once a day instead of with each application. We store these documents on the
  servers and will use them for new application requests submitted that
  day.<ul><li>Documents will need to be submitted once a day (before the
  Applications are submitted). PDFs will be displayed and submitted as is- no
  changes/edits will be made to the actual PDF files.</li><li>This end-point
  will not process any Tax Form Documents. Tax Form document should be submitted
  with every application</li><li>If submitted in the morning, you only need to
  include the Tax Form attachment for each applicant. Otherwise, you will need
  to include PDFs with each application (Create
  Account).</li></ul><br><br>**Scope**: `accounts.write`<br>**Security Policy**:
  `Signed JWT`"
url: "{{baseUrl}}/gw/api/v1/accounts/documents"
method: POST
