$kind: http-request
description: "Generate URL address to complete real-time KYC verification using
  Au10Tix<br><br>**Scope**: `accounts.read`<br>**Security Policy**: `HTTPS`"
url: "{{baseUrl}}/gw/api/v1/accounts/:accountId/kyc"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: accountId
    value: minim
    description: "(Required) "
examples: ./.resources/Retrieve Au10Tix URL.resources/examples
order: 1000
