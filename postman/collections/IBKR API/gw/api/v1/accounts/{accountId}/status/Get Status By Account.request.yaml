$kind: http-request
description: "Query status of account by accountId<br><br>**Scope**:
  `accounts.read`<br>**Security Policy**: `HTTPS`"
url: "{{baseUrl}}/gw/api/v1/accounts/:accountId/status"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: accountId
    value: minim
    description: "(Required) "
examples: ./.resources/Get Status By Account.resources/examples
order: 1000
