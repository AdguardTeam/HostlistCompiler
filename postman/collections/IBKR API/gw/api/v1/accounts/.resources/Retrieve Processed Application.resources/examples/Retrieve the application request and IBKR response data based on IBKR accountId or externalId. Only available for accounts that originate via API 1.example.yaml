$kind: http-example
name: Retrieve the application request and IBKR response data based on IBKR
  accountId or externalId. Only available for accounts that originate via API
request:
  url: "{{baseUrl}}/gw/api/v1/accounts?accountId=minim&externalId=minim"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    accountId: minim
    externalId: minim
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "accountId": "culpa pariatur ea aliqu",
        "requestFileName": "deserunt est aliqui",
        "responseFileName": "cillum nul"
      }
order: 9000
