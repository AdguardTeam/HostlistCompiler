    type: json
    content: >-
      {
        "type": "/simple",
        "title": "Business Error",
        "status": 422,
        "detail": "Funds and Banking server cannot process your request because it contains invalid data",
        "instructionSetId": 1701,
        "instructionResult": {
          "clientInstructionId": 1013030,
          "instructionType": "ACCOUNT_CLOSE",
