$kind: http-example
name: Withdraw Funds - Recurring
request:
  url: "{{baseUrl}}/gw/api/v1/external-cash-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "WITHDRAWAL",
        "instruction": {
          "clientInstructionId": 7013050,
          "accountId": "U46377",
          "bankInstructionName": "Test Withdrawal",
          "bankInstructionMethod": "WIRE",
          "amount": 123.45,
          "currency": "GBP",
          "dateTimeToOccur": "2023-11-20T09:12:13Z",
          "iraWithdrawalDetail": {
            "fedIncomeTaxPercentage": 10,
            "stateIncomeTaxPercentage": 12,
            "stateCd": "TE",
            "iraWithholdType": "NORMAL"
          },
          "recurringInstructionDetail": {
            "instructionName": "Arkansas-Test-Instr",
            "startDate": "2023-10-16",
            "frequency": "MONTHLY"
          }
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 26000
