$kind: http-example
name: Query Withdrawable Funds Without Origination Hold
request:
  url: "{{baseUrl}}/gw/api/v1/external-cash-transfers/query"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "QUERY_WITHDRAWABLE_FUNDS",
        "instruction": {
          "clientInstructionId": 7009006,
          "accountId": "U139838",
          "currency": "USD",
          "bankRoutingNumber": "122199983",
          "bankAccountNumber": "9876543210"
        }
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/simple",
        "title": "Forbidden",
        "status": 403,
        "detail": "Permission denied- Insufficient rights for using resource",
        "instructionSetId": 2445,
        "instructionResult": {
          "clientInstructionId": 12000610,
          "instructionType": "QUERY_WITHDRAWABLE_FUNDS",
          "instructionStatus": "REJECTED",
          "instructionId": 43092429,
          "error": {
            "errorCode": "ERROR_PERMISSION_DENIED",
            "errorMessage": "Permission denied- Insufficient rights for using resource"
          }
        }
      }
order: 17000
