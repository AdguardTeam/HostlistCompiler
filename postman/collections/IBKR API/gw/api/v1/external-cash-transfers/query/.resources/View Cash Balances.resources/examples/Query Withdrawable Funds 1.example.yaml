$kind: http-example
name: Query Withdrawable Funds
request:
  url: "{{baseUrl}}/gw/api/v1/external-cash-transfers/query"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "QUERY_WITHDRAWABLE_FUNDS",
        "instruction": {
          "clientInstructionId": 7009005,
          "accountId": "U87440",
          "currency": "USD"
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 13000
