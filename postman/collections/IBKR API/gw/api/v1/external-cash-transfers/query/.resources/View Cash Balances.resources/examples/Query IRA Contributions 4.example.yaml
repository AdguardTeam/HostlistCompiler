$kind: http-example
name: Query IRA Contributions
request:
  url: "{{baseUrl}}/gw/api/v1/external-cash-transfers/query"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "QUERY_IRA_CONTRIBUTIONS",
        "instruction": {
          "clientInstructionId": 7009007,
          "accountId": "U68903",
          "year": "2003"
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 15000
