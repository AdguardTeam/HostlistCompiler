$kind: http-example
name: Query Withdrawable Funds Without Origination Hold
request:
  url: "{{baseUrl}}/gw/api/v1/external-cash-transfers/query"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "instructionType": "QUERY_WITHDRAWABLE_FUNDS",
        "instruction": {
          "clientInstructionId": 7009006,
          "accountId": "U139838",
          "currency": "USD",
          "bankRoutingNumber": "122199983",
          "bankAccountNumber": "9876543210"
        }
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": 201,
        "instructionSetId": 17791,
        "instructionResult": {
          "accountId": "U46377",
          "currency": "EUR",
          "withdrawableAmountWithoutOriginationHold": 0,
          "withdrawableAmountWithoutOriginationHoldNoBorrow": 0,
          "ibReferenceId": 0,
          "clientInstructionId": 7013230,
          "instructionType": "QUERY_WITHDRAWABLE_FUNDS",
          "instructionStatus": "PROCESSED",
          "instructionId": 43133309
        }
      }
order: 18000
