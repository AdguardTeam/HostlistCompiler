$kind: http-example
name: Query Withdrawable Funds Without Origination Hold
request:
  url: "{{baseUrl}}/gw/api/v1/external-cash-transfers/query"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "QUERY_WITHDRAWABLE_FUNDS",
        "instruction": {
          "clientInstructionId": 7009006,
          "accountId": "U139838",
          "currency": "USD",
          "bankRoutingNumber": "122199983",
          "bankAccountNumber": "9876543210"
        }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/invalid-argument",
        "title": "Bad Request",
        "status": 400,
        "detail": "Input is not a JSON Object or doesn't contain all expected fields",
        "invalidArguments": [
          {
            "field": "templateName",
            "description": "Missing required parameter"
          }
        ]
      }
order: 28000
