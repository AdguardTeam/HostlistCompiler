$kind: http-request
description: "Initiate request to deposit or withdrawal between IBKR account and
  bank account. More information on transfer methods can be found here -
  https://www.interactivebrokers.com/campus/trading-lessons/cash-and-position-t\
  ransfers<br><br>**Scope**: `transfers.write`<br>**Security Policy**: `Signed
  JWT`"
url: "{{baseUrl}}/gw/api/v1/external-cash-transfers"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: client-id
    value: abc123
    description: (Required) The client's clientId
body:
  type: json
  content: |-
    {
      "instructionType": "DEPOSIT",
      "instruction": {
        "clientInstructionId": 7013045,
        "accountId": "U46377",
        "currency": "USD",
        "amount": 100,
        "bankInstructionMethod": "WIRE",
        "sendingInstitution": "Sending Institution name",
        "identifier": "indentifier",
        "specialInstruction": "U46377",
        "bankInstructionName": "Instruction",
        "fromAccountNumber": "U46377",
        "senderInstitutionName": "Senders Institution name"
      }
    }
examples: ./.resources/Transfer Cash Externally.resources/examples
order: 2000
