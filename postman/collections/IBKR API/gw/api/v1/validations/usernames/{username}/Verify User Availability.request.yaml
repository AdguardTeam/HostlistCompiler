$kind: http-request
description: "Verify whether user is valid and available<br><br>**Scope**:
  `accounts.read` OR `validations.read`<br>**Security Policy**: `HTTPS`"
url: "{{baseUrl}}/gw/api/v1/validations/usernames/:username"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: username
    value: minim
    description: "(Required) "
examples: ./.resources/Verify User Availability.resources/examples
order: 1000
