$kind: http-example
request:
  url: "{{baseUrl}}/gw/api/v1/tax-documents"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "accountId": "UXXXX",
        "format": "HTML,CSV,PDF",
        "type": "ALL,1099,1099R,1042S,8949",
        "year": 2023,
        "gzip": false
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 401,
        "title": "Unauthorized",
        "type": "/simple",
        "detail": "The access token request is invalid"
      }
order: 3000
