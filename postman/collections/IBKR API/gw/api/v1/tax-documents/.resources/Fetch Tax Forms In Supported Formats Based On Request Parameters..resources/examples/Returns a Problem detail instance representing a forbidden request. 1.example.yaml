$kind: http-example
name: Returns a Problem detail instance representing a forbidden request.
request:
  url: "{{baseUrl}}/gw/api/v1/tax-documents"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "accountId": "UXXXX",
        "format": "HTML,CSV,PDF",
        "type": "ALL,1099,1099R,1042S,8949",
        "year": 2023,
        "gzip": false
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 403,
        "title": "Forbidden",
        "type": "/simple",
        "detail": "The access token fails to have sufficient scope"
      }
order: 11000
