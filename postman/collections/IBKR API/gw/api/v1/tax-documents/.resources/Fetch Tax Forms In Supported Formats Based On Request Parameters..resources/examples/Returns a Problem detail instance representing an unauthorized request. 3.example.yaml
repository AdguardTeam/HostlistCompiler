$kind: http-example
name: Returns a Problem detail instance representing an unauthorized request.
request:
  url: "{{baseUrl}}/gw/api/v1/tax-documents"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "accountId": "UXXXX",
        "format": "HTML,CSV,PDF",
        "type": "ALL,1099,1099R,1042S,8949",
        "year": 2023,
        "gzip": false
      }
response:
  statusCode: 402
  statusText: Payment Required
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 402,
        "title": "Unauthorized",
        "type": "/simple",
        "detail": "The request cannot be fulfilled for the account"
      }
order: 12000
