$kind: http-example
request:
  url: "{{baseUrl}}/gw/api/v1/tax-documents/available?accountId=UXXXX&year=2024"
  method: GET
  headers:
    Accept: application/problem+json
  queryParams:
    - key: accountId
      value: UXXXX
      description: (Required) Specifies the account id to retrieve information
    - key: year
      value: "2024"
      description: (Required) Specifies the tax year to retrieve information
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 403,
        "title": "Forbidden",
        "type": "/simple",
        "detail": "The access token fails to have sufficient scope"
      }
order: 5000
