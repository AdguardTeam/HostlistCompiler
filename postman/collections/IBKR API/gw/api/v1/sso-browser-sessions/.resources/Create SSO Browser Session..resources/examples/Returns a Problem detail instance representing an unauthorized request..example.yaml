$kind: http-example
request:
  url: "{{baseUrl}}/gw/api/v1/sso-browser-sessions"
  method: POST
  headers:
    Content-Type: application/jwt
    Accept: application/problem+json
  body:
    type: text
    content: |-
      {
        "credential": "ddowney2",
        "ip": "10.10.10.10"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 401,
        "title": "Unauthorized",
        "type": "/simple",
        "detail": "The access token request is invalid"
      }
order: 3000
