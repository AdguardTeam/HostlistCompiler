$kind: http-example
name: Create a Single Sign On (SSO) to access the IBKR hosted portal (White Branded).
request:
  url: "{{baseUrl}}/gw/api/v1/sso-browser-sessions"
  method: POST
  headers:
    Content-Type: application/jwt
    Accept: application/json
  body:
    type: text
    content: |-
      {
        "credential": "ddowney2",
        "ip": "10.10.10.10"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "active": true,
        "url": "https://www.interactivebrokers.com/sso/..."
      }
order: 7000
