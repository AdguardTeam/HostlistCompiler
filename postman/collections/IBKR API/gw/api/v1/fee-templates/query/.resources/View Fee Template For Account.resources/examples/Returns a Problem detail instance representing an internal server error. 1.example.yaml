$kind: http-example
name: Returns a Problem detail instance representing an internal server error.
request:
  url: "{{baseUrl}}/gw/api/v1/fee-templates/query"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "QUERY_FEE_TEMPLATE",
        "instruction": {
          "clientInstructionId": 1012983,
          "accountId": "U46377"
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 6000
