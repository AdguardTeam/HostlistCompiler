$kind: http-example
name: Returns a Problem detail instance representing a bad request.
request:
  url: "{{baseUrl}}/gw/api/v1/fee-templates"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "APPLY_FEE_TEMPLATE",
        "instruction": {
          "clientInstructionId": 1012983,
          "accountId": "U46377",
          "templateName": "Test template"
        }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/invalid-argument",
        "title": "Bad Request",
        "status": 400,
        "detail": "Input is not a JSON Object or doesn't contain all expected fields",
        "invalidArguments": [
          {
            "field": "templateName",
            "description": "Missing required parameter"
          }
        ]
      }
order: 10000
