$kind: http-example
request:
  url: "{{baseUrl}}/gw/api/v1/enumerations/complex-asset-transfer?instructionType\
    =COMPLEX_ASSET_TRANSFER"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: instructionType
      value: COMPLEX_ASSET_TRANSFER
      description: (Required) Asset transfer type to get the list of supported brokers
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "instructionType": "COMPLEX_ASSET_TRANSFER",
        "brokers": [
          "DONNER & REUSCHEL",
          "IBROKER GLOBAL MARKETS SOCIEDAD DE VALORES, S.A",
          "EQUATEX 4500",
          "IMAGI  BROKERAGE LIMITED",
          "V-BANK",
          "ADMIRAL MARKETS UK LTD",
          "ALFA BANK",
          "YICKO SECURITIES LIMITED",
          "BLACKWELL GLOBAL SECURITIES LIMITED",
          "EQUINITI",
          "KAISA FINANCIAL GROUP COMPANY LIMITED"
        ]
      }
order: 1000
