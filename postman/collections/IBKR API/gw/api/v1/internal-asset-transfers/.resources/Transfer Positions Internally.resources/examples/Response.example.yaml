$kind: http-example
request:
  url: "{{baseUrl}}/gw/api/v1/internal-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "instructionType": "INTERNAL_POSITION_TRANSFER",
        "instruction": {
          "clientInstructionId": 7013044,
          "sourceAccountId": "U399192",
          "targetAccountId": "U87440",
          "transferQuantity": 6,
          "tradingInstrument": {
            "tradingInstrumentDescription": {
              "securityIdType": "ISIN",
              "securityId": "459200101",
              "assetType": "STK"
            },
            "currency": "USD"
          }
        }
      }
response:
  statusCode: 202
  statusText: Accepted
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "instructionResult": {
          "clientInstructionId": 7008152,
          "instructionType": "INTERNAL_POSITION_TRANSFER",
          "instructionStatus": "PENDING",
          "instructionId": 43092590
        },
        "instructionSetId": 2614,
        "status": 202
      }
order: 1000
