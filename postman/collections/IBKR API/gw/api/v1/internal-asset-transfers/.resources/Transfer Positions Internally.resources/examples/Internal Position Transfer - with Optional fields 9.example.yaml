$kind: http-example
name: Internal Position Transfer - with Optional fields
request:
  url: "{{baseUrl}}/gw/api/v1/internal-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "INTERNAL_POSITION_TRANSFER",
        "instruction": {
          "clientInstructionId": 7013043,
          "sourceAccountId": "U399192",
          "targetAccountId": "U87440",
          "transferQuantity": 6,
          "tradingInstrument": {
            "conid": 21323,
            "currency": "USD"
          },
          "tradeDate": "2025-02-17",
          "settleDate": "2025-02-25",
          "transferPrice": 100.3456789
        }
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/simple",
        "title": "Forbidden",
        "status": 403,
        "detail": "Permission denied- Insufficient rights for using resource",
        "instructionSetId": 29365,
        "instructionResult": {
          "clientInstructionId": 7013589,
          "instructionType": "INTERNAL_POSITION_TRANSFER",
          "instructionStatus": "REJECTED",
          "instructionId": 43147081,
          "error": {
            "errorCode": "ERROR_PERMISSION_DENIED",
            "errorMessage": "Permission denied- Insufficient rights for using resource"
          }
        }
      }
order: 29000
