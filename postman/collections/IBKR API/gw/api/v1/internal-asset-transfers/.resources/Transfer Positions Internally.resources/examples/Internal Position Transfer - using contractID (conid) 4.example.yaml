$kind: http-example
name: Internal Position Transfer - using contractID (conid)
request:
  url: "{{baseUrl}}/gw/api/v1/internal-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "INTERNAL_POSITION_TRANSFER",
        "instruction": {
          "clientInstructionId": 7013043,
          "sourceAccountId": "U399192",
          "targetAccountId": "U87440",
          "transferQuantity": 6,
          "tradingInstrument": {
            "conid": 21323,
            "currency": "USD"
          }
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 14000
