$kind: http-example
name: Internal Position Transfer - with Optional fields
request:
  url: "{{baseUrl}}/gw/api/v1/internal-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "INTERNAL_POSITION_TRANSFER",
        "instruction": {
          "clientInstructionId": 7013043,
          "sourceAccountId": "U399192",
          "targetAccountId": "U87440",
          "transferQuantity": 6,
          "tradingInstrument": {
            "conid": 21323,
            "currency": "USD"
          },
          "tradeDate": "2025-02-17",
          "settleDate": "2025-02-25",
          "transferPrice": 100.3456789
        }
      }
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/simple",
        "title": "Business Error",
        "status": 422,
        "detail": "Funds and Banking server cannot process your request because it contains invalid data",
        "instructionSetId": 29367,
        "instructionResult": {
          "clientInstructionId": 7013593,
          "instructionType": "INTERNAL_POSITION_TRANSFER",
          "instructionStatus": "REJECTED",
          "instructionId": 43147085,
          "error": {
            "errorCode": "CORRUPT_DATA_INVALID_ACCT",
            "errorMessage": "Account U1969557 does not exist"
          }
        }
      }
order: 26000
