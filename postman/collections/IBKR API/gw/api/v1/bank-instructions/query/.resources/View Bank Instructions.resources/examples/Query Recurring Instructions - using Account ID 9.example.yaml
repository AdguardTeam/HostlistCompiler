$kind: http-example
name: Query Recurring Instructions - using Account ID
request:
  url: "{{baseUrl}}/gw/api/v1/bank-instructions/query"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "QUERY_RECURRING_INSTRUCTIONS",
        "instruction": {
          "clientInstructionId": 1012983,
          "accountId": "U399192"
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 35000
