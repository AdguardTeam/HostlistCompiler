$kind: http-example
name: ACH Instruction
request:
  url: "{{baseUrl}}/gw/api/v1/bank-instructions"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "ACH_INSTRUCTION",
        "instruction": {
          "clientInstructionId": 1012983,
          "bankInstructionCode": "USACH",
          "achType": "DEBIT_CREDIT",
          "bankInstructionName": "TestInstr",
          "currency": "USD",
          "accountId": "U223454",
          "clientAccountInfo": {
            "bankRoutingNumber": "202012983",
            "bankAccountNumber": "101267576983",
            "bankName": "JPM Chase",
            "bankAccountTypeCode": 0
          }
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 28000
