$kind: http-example
name: Traditional Bank Instruction Verification
request:
  url: "{{baseUrl}}/gw/api/v1/bank-instructions"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "TRADITIONAL_BANK_INSTRUCTION_VERIFICATION",
        "instruction": {
          "clientInstructionId": 7013057,
          "bankInstructionCode": "USACH",
          "bankInstructionName": "ACH-Tst1Random172",
          "accountId": "U117717",
          "pendingInstructionId": 43086786,
          "creditAmount1": 0.32,
          "creditAmount2": 0.46
        }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/invalid-argument",
        "title": "Bad Request",
        "status": 400,
        "detail": "Input is not a JSON Object or doesn't contain all expected fields",
        "invalidArguments": [
          {
            "field": "accountId",
            "description": "Missing required parameter"
          },
          {
            "field": "bankInstructionCode",
            "description": "Missing required parameter"
          },
          {
            "field": "achType",
            "description": "Missing required parameter"
          },
          {
            "field": "bankInstructionName",
            "description": "Missing required parameter"
          },
          {
            "field": "clientAccountInfo",
            "description": "Missing required parameter"
          }
        ]
      }
order: 30000
