$kind: http-example
name: eDDA Instruction
request:
  url: "{{baseUrl}}/gw/api/v1/bank-instructions"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "instructionType": "EDDA_INSTRUCTION",
        "instruction": {
          "clientInstructionId": 7012743,
          "bankInstructionName": "{instrution-name}",
          "currency": "CNH",
          "accountId": "U8072517",
          "bankBranchCode": "003",
          "bankAccountNumber": "132456",
          "bankClearingCode": "003",
          "debtorIdentificationDocumentType": "hkId"
        }
      }
response:
  statusCode: 202
  statusText: Accepted
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "status": 202,
        "instructionSetId": 6401,
        "instructionResult": {
          "clientInstructionId": 7012743,
          "instructionType": "EDDA_INSTRUCTION",
          "instructionStatus": "PENDING",
          "instructionId": 43098698
        }
      }
order: 45000
