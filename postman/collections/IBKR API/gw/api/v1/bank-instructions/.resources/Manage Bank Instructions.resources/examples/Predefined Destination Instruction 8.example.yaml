$kind: http-example
name: Predefined Destination Instruction
request:
  url: "{{baseUrl}}/gw/api/v1/bank-instructions"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "PREDEFINED_DESTINATION_INSTRUCTION",
        "instruction": {
          "clientInstructionId": 7013053,
          "bankInstructionName": "Test-ACH-Instr",
          "bankInstructionMethod": "ACH",
          "accountId": "U399192",
          "currency": "USD",
          "financialInstitution": {
            "name": "SBI Bank",
            "branchCode": "",
            "branchCodeType": "BSB_AUD",
            "identifier": "SBIN001000",
            "identifierType": "IFSC",
            "clientAccountId": "132456789"
          }
        }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/invalid-argument",
        "title": "Bad Request",
        "status": 400,
        "detail": "Input is not a JSON Object or doesn't contain all expected fields",
        "invalidArguments": [
          {
            "field": "accountId",
            "description": "Missing required parameter"
          },
          {
            "field": "bankInstructionCode",
            "description": "Missing required parameter"
          },
          {
            "field": "achType",
            "description": "Missing required parameter"
          },
          {
            "field": "bankInstructionName",
            "description": "Missing required parameter"
          },
          {
            "field": "clientAccountInfo",
            "description": "Missing required parameter"
          }
        ]
      }
order: 43000
