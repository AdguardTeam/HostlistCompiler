$kind: http-example
name: Traditional Bank Instruction Verification
request:
  url: "{{baseUrl}}/gw/api/v1/bank-instructions"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "TRADITIONAL_BANK_INSTRUCTION_VERIFICATION",
        "instruction": {
          "clientInstructionId": 7013057,
          "bankInstructionCode": "USACH",
          "bankInstructionName": "ACH-Tst1Random172",
          "accountId": "U117717",
          "pendingInstructionId": 43086786,
          "creditAmount1": 0.32,
          "creditAmount2": 0.46
        }
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/simple",
        "title": "Forbidden",
        "status": 403,
        "detail": "Permission denied- Insufficient rights for using resource",
        "instructionSetId": 2603,
        "instructionResult": {
          "clientInstructionId": 80140,
          "instructionType": "ACH_INSTRUCTION",
          "instructionStatus": "REJECTED",
          "instructionId": 43092579,
          "error": {
            "errorCode": "ERROR_PERMISSION_DENIED",
            "errorMessage": "Permission denied- Insufficient rights for using resource"
          }
        }
      }
order: 12000
