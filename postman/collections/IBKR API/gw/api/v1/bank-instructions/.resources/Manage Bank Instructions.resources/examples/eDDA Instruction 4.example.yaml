$kind: http-example
name: eDDA Instruction
request:
  url: "{{baseUrl}}/gw/api/v1/bank-instructions"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "EDDA_INSTRUCTION",
        "instruction": {
          "clientInstructionId": 7012743,
          "bankInstructionName": "{instrution-name}",
          "currency": "CNH",
          "accountId": "U8072517",
          "bankBranchCode": "003",
          "bankAccountNumber": "132456",
          "bankClearingCode": "003",
          "debtorIdentificationDocumentType": "hkId"
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 25000
