$kind: http-request
description: "Transfer cash internally between two accounts with Interactive
  Brokers.<br><br>**Scope**: `transfers.write`<br>**Security Policy**: `Signed
  JWT`"
url: "{{baseUrl}}/gw/api/v1/internal-cash-transfers"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: client-id
    value: abc123
    description: (Required) The client's clientId
body:
  type: json
  content: |-
    {
      "instructionType": "INTERNAL_CASH_TRANSFER",
      "instruction": {
        "clientInstructionId": 1012983,
        "sourceAccountId": "U46377",
        "targetAccountId": "U15667",
        "amount": 123.45,
        "currency": "GBP",
        "dateTimeToOccur": "2018-03-20T09:12:13Z"
      }
    }
examples: ./.resources/Transfer Cash Internally.resources/examples
order: 1000
