$kind: http-example
name: Internal Cash Transfer (2)
request:
  url: "{{baseUrl}}/gw/api/v1/internal-cash-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "instructionType": "INTERNAL_CASH_TRANSFER",
        "instruction": {
          "clientInstructionId": 1012983,
          "sourceAccountId": "U46377",
          "targetAccountId": "U15667",
          "amount": 123.45,
          "currency": "GBP"
        }
      }
response:
  statusCode: 202
  statusText: Accepted
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "instructionResult": {
          "clientInstructionId": 1013031,
          "instructionType": "INTERNAL_CASH_TRANSFER",
          "instructionStatus": "PENDING",
          "instructionId": 43091814
        },
        "instructionSetId": 1703,
        "status": 202
      }
order: 4000
