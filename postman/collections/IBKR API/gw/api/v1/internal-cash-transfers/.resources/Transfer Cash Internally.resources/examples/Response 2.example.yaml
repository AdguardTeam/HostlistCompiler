$kind: http-example
name: Response
request:
  url: "{{baseUrl}}/gw/api/v1/internal-cash-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "INTERNAL_CASH_TRANSFER",
        "instruction": {
          "clientInstructionId": 1012983,
          "sourceAccountId": "U46377",
          "targetAccountId": "U15667",
          "amount": 123.45,
          "currency": "GBP",
          "dateTimeToOccur": "2018-03-20T09:12:13Z"
        }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/invalid-argument",
        "title": "Bad Request",
        "status": 400,
        "detail": "Input is not a JSON Object or doesn't contain all expected fields",
        "invalidArguments": [
          {
            "field": "sourceAccountId",
            "description": "Missing required parameter"
          }
        ]
      }
order: 5000
