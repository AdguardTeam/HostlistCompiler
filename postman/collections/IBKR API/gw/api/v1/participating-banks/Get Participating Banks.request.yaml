$kind: http-request
description: "Get list of banks which support banking connection with
  Interactive Brokers.<br><br>**Scope**: `enumerations.read`<br>**Security
  Policy**: `HTTPS`"
url: "{{baseUrl}}/gw/api/v1/participating-banks?type=eDDA"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: type
    value: eDDA
    description: (Required) Parameter for which the list of participating banks is fetched
pathVariables:
  - key: client-id
    value: abc123
    description: (Required) The client's clientId
examples: ./.resources/Get Participating Banks.resources/examples
order: 1000
