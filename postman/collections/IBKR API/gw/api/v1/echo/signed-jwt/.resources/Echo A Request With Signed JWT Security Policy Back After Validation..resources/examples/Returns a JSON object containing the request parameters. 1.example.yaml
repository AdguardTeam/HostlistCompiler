$kind: http-example
name: Returns a JSON object containing the request parameters.
request:
  url: "{{baseUrl}}/gw/api/v1/echo/signed-jwt"
  method: POST
  headers:
    Content-Type: application/jwt
    Accept: application/json
  body:
    type: text
    content: |-
      {
        "iss": "prodtester"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "requestMethod": "GET",
        "securityPolicy": "HTTPS",
        "queryParameters": {}
      }
order: 6000
