$kind: http-example
name: Returns a Problem detail instance representing an internal server error.
request:
  url: "{{baseUrl}}/gw/api/v1/echo/https"
  method: GET
  headers:
    Accept: application/problem+json
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 8000
