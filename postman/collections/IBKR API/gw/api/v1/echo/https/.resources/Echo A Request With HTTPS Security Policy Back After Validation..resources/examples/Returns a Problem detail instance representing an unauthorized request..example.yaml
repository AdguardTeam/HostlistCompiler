$kind: http-example
request:
  url: "{{baseUrl}}/gw/api/v1/echo/https"
  method: GET
  headers:
    Accept: application/problem+json
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 401,
        "title": "Unauthorized",
        "type": "/simple",
        "detail": "The access token request is invalid"
      }
order: 2000
