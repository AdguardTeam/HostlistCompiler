$kind: http-example
name: DWAC - transfer using tradingInstrument.detail
request:
  url: "{{baseUrl}}/gw/api/v1/external-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "DWAC",
        "instruction": {
          "clientInstructionId": 7013037,
          "direction": "IN",
          "accountId": "U1001095",
          "contraBrokerAccountId": "12345678A",
          "contraBrokerTaxId": "123456789",
          "quantity": 1000,
          "accountTitle": "Special Company Holding LLC",
          "referenceId": "refId",
          "tradingInstrument": {
            "tradingInstrumentDescription": {
              "securityIdType": "ISIN",
              "securityId": "459200101",
              "assetType": "STK"
            },
            "currency": "USD"
          }
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 62000
