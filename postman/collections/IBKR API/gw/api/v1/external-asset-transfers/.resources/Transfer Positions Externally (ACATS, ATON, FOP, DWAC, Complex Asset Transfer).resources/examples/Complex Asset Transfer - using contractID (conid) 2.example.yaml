$kind: http-example
name: Complex Asset Transfer - using contractID (conid)
request:
  url: "{{baseUrl}}/gw/api/v1/external-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "COMPLEX_ASSET_TRANSFER",
        "instruction": {
          "clientInstructionId": 7013040,
          "direction": "IN",
          "accountId": "U399192",
          "quantity": 10,
          "contraBrokerInfo": {
            "accountType": "ORG",
            "brokerName": "JP MORGAN",
            "depositoryId": "1234",
            "brokerAccountId": "as3456567678578N",
            "country": "United States",
            "contactName": "as",
            "contactEmail": "a@gmail.com",
            "contactPhone": "2039126155"
          },
          "tradingInstrument": {
            "conid": 12123,
            "currency": "USD"
          }
        }
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/simple",
        "title": "Forbidden",
        "status": 403,
        "detail": "Permission denied- Insufficient rights for using resource",
        "instructionSetId": 2615,
        "instructionResult": {
          "clientInstructionId": 2611,
          "instructionType": "FOP",
          "instructionStatus": "REJECTED",
          "instructionId": 12000763,
          "error": {
            "errorCode": "ERROR_PERMISSION_DENIED",
            "errorMessage": "Permission denied- Insufficient rights for using resource"
          }
        }
      }
order: 25000
