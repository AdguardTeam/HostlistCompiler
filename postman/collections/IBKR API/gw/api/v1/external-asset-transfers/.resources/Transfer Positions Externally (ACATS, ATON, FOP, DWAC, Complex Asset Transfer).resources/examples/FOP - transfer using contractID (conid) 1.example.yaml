$kind: http-example
name: FOP - transfer using contractID (conid)
request:
  url: "{{baseUrl}}/gw/api/v1/external-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "FOP",
        "instruction": {
          "clientInstructionId": 7013038,
          "direction": "IN",
          "accountId": "U46377",
          "contraBrokerAccountId": "12345678A",
          "contraBrokerDtcCode": "534",
          "quantity": 1000,
          "tradingInstrument": {
            "conid": 12123,
            "currency": "USD"
          }
        }
      }
response:
  statusCode: 500
  statusText: Internal Server Error
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "status": 500,
        "title": "Internal Server Error",
        "type": "/simple"
      }
order: 88000
