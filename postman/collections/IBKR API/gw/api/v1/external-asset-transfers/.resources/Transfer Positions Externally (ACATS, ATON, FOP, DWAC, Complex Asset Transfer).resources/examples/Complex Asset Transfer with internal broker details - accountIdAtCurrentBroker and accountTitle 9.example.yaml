$kind: http-example
name: Complex Asset Transfer with internal broker details -
  accountIdAtCurrentBroker and accountTitle
request:
  url: "{{baseUrl}}/gw/api/v1/external-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "instructionType": "COMPLEX_ASSET_TRANSFER",
        "instruction": {
          "clientInstructionId": 7013041,
          "direction": "IN",
          "accountId": "U399192",
          "accountIdAtCurrentBroker": "8E90075",
          "quantity": 10,
          "contraBrokerInfo": {
            "accountType": "ORG",
            "brokerName": "JP MORGAN",
            "depositoryId": "1234",
            "brokerAccountId": "as3456567678578N",
            "country": "United States",
            "contactName": "as",
            "contactEmail": "a@gmail.com",
            "contactPhone": "2039126155",
            "accountTitle": "test"
          },
          "tradingInstrument": {
            "tradingInstrumentDescription": {
              "securityIdType": "ISIN",
              "securityId": "459200101",
              "assetType": "STK"
            },
            "currency": "USD"
          },
          "nonDisclosedDetail": {
            "tradeDate": "2018-03-20T09:12:13Z",
            "settleDate": "2018-03-20T09:12:13Z",
            "psetBic": "",
            "reagDeagBic": "",
            "buyerSellBic": "",
            "memberAccountId": "",
            "safeKeepingAccountId": ""
          }
        }
      }
response:
  statusCode: 202
  statusText: Accepted
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "instructionResult": {
          "clientInstructionId": 1013031,
          "instructionType": "FOP",
          "instructionStatus": "PENDING",
          "instructionId": 43091814
        },
        "instructionSetId": 1703,
        "status": 202
      }
order: 89000
