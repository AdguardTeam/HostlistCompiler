$kind: http-example
name: Complex Asset Transfer - using tradingInstrument.detail
request:
  url: "{{baseUrl}}/gw/api/v1/external-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "COMPLEX_ASSET_TRANSFER",
        "instruction": {
          "clientInstructionId": 7013042,
          "direction": "IN",
          "accountId": "U399192",
          "quantity": 10,
          "contraBrokerInfo": {
            "accountType": "ORG",
            "brokerName": "JP MORGAN",
            "depositoryId": "1234",
            "brokerAccountId": "as3456567678578N",
            "country": "United States",
            "contactName": "as",
            "contactEmail": "a@gmail.com",
            "contactPhone": "2039126155"
          },
          "tradingInstrument": {
            "tradingInstrumentDescription": {
              "securityIdType": "ISIN",
              "securityId": "459200101",
              "assetType": "STK"
            },
            "currency": "USD"
          }
        }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/invalid-argument",
        "title": "Bad Request",
        "status": 400,
        "detail": "Input is not a JSON Object or doesn't contain all expected fields",
        "invalidArguments": [
          {
            "field": "assetType",
            "description": "Missing required parameter"
          }
        ]
      }
order: 16000
