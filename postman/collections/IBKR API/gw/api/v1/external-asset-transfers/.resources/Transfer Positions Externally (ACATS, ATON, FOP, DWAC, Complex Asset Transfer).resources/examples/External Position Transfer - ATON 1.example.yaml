$kind: http-example
name: External Position Transfer - ATON
request:
  url: "{{baseUrl}}/gw/api/v1/external-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "EXTERNAL_POSITION_TRANSFER",
        "instruction": {
          "clientInstructionId": 7013060,
          "type": "FULL",
          "subType": "ATON",
          "brokerId": "3265",
          "brokerName": "Wall Street Financial Group",
          "accountAtBroker": "SOL12345",
          "accountId": "U1225448",
          "signature": "Marko Barr"
        }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/invalid-argument",
        "title": "Bad Request",
        "status": 400,
        "detail": "Input is not a JSON Object or doesn't contain all expected fields",
        "invalidArguments": [
          {
            "field": "assetType",
            "description": "Missing required parameter"
          }
        ]
      }
order: 20000
