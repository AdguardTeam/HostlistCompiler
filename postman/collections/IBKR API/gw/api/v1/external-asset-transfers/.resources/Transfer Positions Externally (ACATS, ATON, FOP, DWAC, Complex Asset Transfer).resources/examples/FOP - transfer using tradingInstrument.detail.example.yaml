$kind: http-example
request:
  url: "{{baseUrl}}/gw/api/v1/external-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "FOP",
        "instruction": {
          "clientInstructionId": 7013039,
          "direction": "IN",
          "accountId": "U46377",
          "contraBrokerAccountId": "12345678A",
          "contraBrokerDtcCode": "534",
          "quantity": 1000,
          "tradingInstrument": {
            "tradingInstrumentDescription": {
              "securityIdType": "ISIN",
              "securityId": "459200101",
              "assetType": "STK"
            },
            "currency": "USD"
          }
        }
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/invalid-argument",
        "title": "Bad Request",
        "status": 400,
        "detail": "Input is not a JSON Object or doesn't contain all expected fields",
        "invalidArguments": [
          {
            "field": "assetType",
            "description": "Missing required parameter"
          }
        ]
      }
order: 12000
