$kind: http-example
name: FOP - transfer using tradingInstrument.detail
request:
  url: "{{baseUrl}}/gw/api/v1/external-asset-transfers"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/problem+json
  body:
    type: json
    content: |-
      {
        "instructionType": "FOP",
        "instruction": {
          "clientInstructionId": 7013039,
          "direction": "IN",
          "accountId": "U46377",
          "contraBrokerAccountId": "12345678A",
          "contraBrokerDtcCode": "534",
          "quantity": 1000,
          "tradingInstrument": {
            "tradingInstrumentDescription": {
              "securityIdType": "ISIN",
              "securityId": "459200101",
              "assetType": "STK"
            },
            "currency": "USD"
          }
        }
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: >-
      {
        "type": "/simple",
        "title": "Forbidden",
        "status": 403,
        "detail": "Permission denied- Insufficient rights for using resource",
        "instructionSetId": 2615,
        "instructionResult": {
          "clientInstructionId": 2611,
          "instructionType": "FOP",
          "instructionStatus": "REJECTED",
          "instructionId": 12000763,
          "error": {
            "errorCode": "ERROR_PERMISSION_DENIED",
            "errorMessage": "Permission denied- Insufficient rights for using resource"
          }
        }
      }
order: 22000
