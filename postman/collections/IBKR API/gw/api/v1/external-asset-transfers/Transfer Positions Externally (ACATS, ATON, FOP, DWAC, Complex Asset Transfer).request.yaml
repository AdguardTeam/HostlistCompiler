$kind: http-request
description: "Initiate request to submit external position transfer. Methods-
  ACATS, ATON, Basic FOP, FOP, DWAC. More information on transfer methods can be
  found here -
  https://www.interactivebrokers.com/campus/trading-lessons/cash-and-position-t\
  ransfers/<br><br>**Scope**: `transfers.write`<br>**Security Policy**: `Signed
  JWT`"
url: "{{baseUrl}}/gw/api/v1/external-asset-transfers"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: client-id
    value: abc123
    description: (Required) The client's clientId
body:
  type: json
  content: |-
    {
      "instructionType": "FOP",
      "instruction": {
        "clientInstructionId": 7013038,
        "direction": "IN",
        "accountId": "U46377",
        "contraBrokerAccountId": "12345678A",
        "contraBrokerDtcCode": "534",
        "quantity": 1000,
        "tradingInstrument": {
          "conid": 12123,
          "currency": "USD"
        }
      }
    }
examples: ./.resources/Transfer Positions Externally (ACATS, ATON, FOP, DWAC,
  Complex Asset Transfer).resources/examples
order: 1000
