  method: POST
  headers:
    Content-Type: application/jwt
    Accept: application/problem+json
  body:
    type: text
    content: |-
      {
        "credential": "ddowney2",
        "ip": "10.10.10.10",
        "service": "officia dolore amet",
        "alternativeIps": [
          "10.10.10.11",
          "10.10.10.12"
        ]
      }
