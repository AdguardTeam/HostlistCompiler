$kind: http-request
description: Request a market scanner from our HMDS service. Can return a
  maximum of 250 contracts.
url: "{{baseUrl}}/hmds/scanner/run"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "instrument": "BOND",
      "locations": "BOND.US",
      "scanCode": "HIGH_BOND_ASK_YIELD_ALL",
      "secType": "BOND",
      "delayedLocations": "SMART",
      "maxItems": 25,
      "filters": [
        {
          "bondAskYieldBelow": 15.819
        }
      ]
    }
examples: ./.resources/HMDS Market Scanner.resources/examples
order: 1000
