$kind: http-example
name: success_stock
request:
  url: "{{baseUrl}}/hmds/scanner/run"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "instrument": "BOND",
        "locations": "BOND.US",
        "scanCode": "HIGH_BOND_ASK_YIELD_ALL",
        "secType": "BOND",
        "delayedLocations": "SMART",
        "maxItems": 25,
        "filters": [
          {
            "bondAskYieldBelow": 15.819
          }
        ]
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "scanTime": "20240403-20:31:23",
        "id": "scanner19",
        "warningText": "250 out of 6111 items retrieved",
        "Contracts": {
          "Contract": [
            {
              "inScanTime": "20240403-20:31:23",
              "contractID": 536918667
            },
            {
              "inScanTime": "20240403-20:31:23",
              "contractID": 359788451
            }
          ]
        }
      }
order: 11000
