$kind: http-example
name: bad request
request:
  url: "{{baseUrl}}/hmds/scanner/run"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "instrument": "BOND",
        "locations": "BOND.US",
        "scanCode": "HIGH_BOND_ASK_YIELD_ALL",
        "secType": "BOND",
