$kind: http-example
name: access denied
request:
  url: "{{baseUrl}}/hmds/scanner/run"
  method: POST
  headers:
    Content-Type: application/json
    Accept: text/plain; charset=utf-8
  body:
    type: json
    content: |-
      {
        "instrument": "BOND",
        "locations": "BOND.US",
        "scanCode": "HIGH_BOND_ASK_YIELD_ALL",
        "secType": "BOND",
        "delayedLocations": "SMART",
        "maxItems": 25,
        "filters": [
          {
            "bondAskYieldBelow": 15.819
          }
        ]
      }
