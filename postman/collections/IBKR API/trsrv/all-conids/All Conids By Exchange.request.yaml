$kind: http-request
description: Send out a request to retrieve all contracts made available on a
  requested exchange. This returns all contracts that are tradable on the
  exchange, even those that are not using the exchange as their primary listing.
url: https://api.ibkr.com/v1/api/trsrv/all-conids?exchange=AMEX&assetClass=STK
method: GET
headers:
  Accept: application/json
queryParams:
  - key: exchange
    value: AMEX
    description: "(Required) "
  - key: assetClass
    value: STK
examples: ./.resources/All Conids By Exchange.resources/examples
order: 1000
