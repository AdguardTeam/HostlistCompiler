$kind: http-example
name: >
  service is unavailable. For example if request takes more than 10s due to some
  internal service unavailability,  request aborted and this status returned
request:
  url: https://api.ibkr.com/v1/api/trsrv/all-conids?exchange=AMEX&assetClass=STK
  method: GET
  headers:
    Accept: application/json; charset=utf-8
  queryParams:
    - key: exchange
      value: AMEX
      description: "(Required) "
    - key: assetClass
      value: STK
response:
  statusCode: 503
  statusText: Service Unavailable
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "error": "aliqua cupidatat",
        "statusCode": "magna reprehenderit veniam"
      }
order: 6000
