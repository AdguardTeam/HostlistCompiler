$kind: http-request
description: Returns the trading schedule up to a month for the requested contract.
url: https://api.ibkr.com/v1/api/trsrv/secdef/schedule?assetClass=OPT&symbol=AAPL&exchange=NASDAQ&exchangeFilter=AMEX,NASDAQ,NYSE
method: GET
headers:
  Accept: application/json
queryParams:
  - key: assetClass
    value: OPT
    description: "(Required) "
  - key: symbol
    value: AAPL
    description: "(Required) "
  - key: exchange
    value: NASDAQ
  - key: exchangeFilter
    value: AMEX,NASDAQ,NYSE
examples: ./.resources/Trading Schedule By Symbol.resources/examples
order: 1000
