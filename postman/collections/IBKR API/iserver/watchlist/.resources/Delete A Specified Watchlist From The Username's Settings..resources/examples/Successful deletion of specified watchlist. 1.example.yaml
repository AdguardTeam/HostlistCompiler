$kind: http-example
name: Successful deletion of specified watchlist.
request:
  url: https://api.ibkr.com/v1/api/iserver/watchlist?id=1234
  method: DELETE
  headers:
    Accept: application/json
  queryParams:
    - key: id
      value: "1234"
      description: (Required) Watchlist ID of the watchlist to be deleted.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "data": {
          "deleted": "1234"
        },
        "action": "context",
        "MID": "2"
      }
order: 10000
