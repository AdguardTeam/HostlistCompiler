$kind: http-request
description: >
  Switch the active account for how you request data. Only available for
  financial advisors and multi-account structures.
url: "{{baseUrl}}/iserver/account"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "acctId": "U1234567"
    }
examples: ./.resources/Switch Account.resources/examples
order: 10000
