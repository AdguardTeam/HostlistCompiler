$kind: http-example
request:
  url: "{{baseUrl}}/iserver/account/allocation/presets"
  method: POST
  headers:
    Content-Type: application/json
    Accept: text/plain; charset=utf-8
  body:
    type: json
    content: |-
      {
        "group_auto_close_positions": true,
        "default_method_for_all": "AvailableEquity",
        "profiles_auto_close_positions": false,
        "strict_credit_check": true,
        "group_proportional_allocation": false
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain; charset=utf-8
  body:
    type: text
    content: pariatur deserunt mollit
order: 2000
