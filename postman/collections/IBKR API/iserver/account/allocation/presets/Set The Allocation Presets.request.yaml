$kind: http-request
description: Set the preset behavior for new allocation groups for specific events.
url: "{{baseUrl}}/iserver/account/allocation/presets"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "group_auto_close_positions": true,
      "default_method_for_all": "AvailableEquity",
      "profiles_auto_close_positions": false,
      "strict_credit_check": true,
      "group_proportional_allocation": false
    }
examples: ./.resources/Set The Allocation Presets.resources/examples
order: 2000
