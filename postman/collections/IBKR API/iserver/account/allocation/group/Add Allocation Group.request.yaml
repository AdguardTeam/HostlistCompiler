$kind: http-request
description: Add a new allocation group. This group can be used to trade in
  place of the {accountId} for the /iserver/account/{accountId}/orders endpoint.
url: "{{baseUrl}}/iserver/account/allocation/group"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "Group_1_Shares",
      "default_method": "S",
      "accounts": [
        {
          "name": "U456789",
          "amount": 4
        },
        {
          "name": "U123456",
          "amount": 1
        }
      ]
    }
examples: ./.resources/Add Allocation Group.resources/examples
order: 5000
