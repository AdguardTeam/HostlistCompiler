  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "name": "Group_1_Shares",
        "default_method": "S",
        "accounts": [
          {
            "name": "U456789",
            "amount": 4
          },
          {
            "name": "U123456",
            "amount": 1
          }
        ]
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
