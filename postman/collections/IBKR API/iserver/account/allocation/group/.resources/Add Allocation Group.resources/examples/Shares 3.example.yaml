  url: "{{baseUrl}}/iserver/account/allocation/group"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "name": "Group_1_Shares",
        "default_method": "S",
        "accounts": [
          {
            "name": "U456789",
            "amount": 4
          },
          {
            "name": "U123456",
            "amount": 1
          }
        ]
      }
