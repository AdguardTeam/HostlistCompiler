$kind: http-example
name: Orders for a specific account
request:
  url: https://api.ibkr.com/v1/api/iserver/account/orders?filters=Filled,SortByTime&force=true&accountId=DU123456
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: filters
      value: Filled,SortByTime
      description: Filter results using a comma-separated list of Order Status values.
        Also accepts a value to sort results by time.
    - key: force
      value: "true"
      description: Instructs IB to clear cache of orders and obtain updated view from
        brokerage backend. Response will be an empty array.
    - key: accountId
      value: DU123456
      description: Retrieve orders for a specific account in the structure.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
