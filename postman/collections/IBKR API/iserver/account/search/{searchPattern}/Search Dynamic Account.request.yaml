$kind: http-request
description: >
  Returns a list of accounts matching a query pattern set in the request. Broker
  accounts configured with the DYNACCT property will not receive account
  information at login. Instead, they must dynamically query then set their
  account number. Customers without the DYNACCT property will receive a 503
  error.
url: https://api.ibkr.com/v1/api/iserver/account/search/:searchPattern
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: searchPattern
    value: U123
    description: "(Required) "
examples: ./.resources/Search Dynamic Account.resources/examples
order: 1000
