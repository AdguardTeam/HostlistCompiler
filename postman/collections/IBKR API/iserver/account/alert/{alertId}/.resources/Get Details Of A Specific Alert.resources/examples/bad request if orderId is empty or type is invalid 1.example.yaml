$kind: http-example
name: bad request if orderId is empty or type is invalid
request:
  url: https://api.ibkr.com/v1/api/iserver/account/alert/:alertId?type=Q
  method: GET
  headers:
    Accept: application/json; charset=utf-8
  queryParams:
    - key: type
      value: Q
      description: "(Required) "
  pathVariables:
    alertId: ""
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "error": "Bad Request: orderId and type are required",
        "statusCode": 400
      }
order: 8000
