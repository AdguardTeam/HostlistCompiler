$kind: http-example
name: >
  service is unavailable. For example if request takes more than 10s due to some
  internal service unavailability,  request aborted and this status returned
request:
  url: https://api.ibkr.com/v1/api/iserver/account/alert/:alertId?type=Q
  method: GET
  headers:
    Accept: application/json; charset=utf-8
  queryParams:
    - key: type
      value: Q
      description: "(Required) "
  pathVariables:
    alertId: ""
response:
  statusCode: 503
  statusText: Service Unavailable
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "error": "aliqua cupidatat",
        "statusCode": "magna reprehenderit veniam"
      }
order: 7000
