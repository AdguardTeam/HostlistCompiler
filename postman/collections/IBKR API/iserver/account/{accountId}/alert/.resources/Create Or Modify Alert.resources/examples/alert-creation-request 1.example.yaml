$kind: http-example
name: alert-creation-request
request:
  url: https://api.ibkr.com/v1/api/iserver/account/:accountId/alert
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json; charset=utf-8
  pathVariables:
    accountId: ""
  body:
    type: json
    content: |-
      {
        "alertName": "AAPL_Price",
        "alertMessage": "AAPL Price Drop!",
        "alertRepeatable": 0,
        "email": "jonh.smith@example.com",
        "expireTime": "20231231-12:00:00",
        "iTWSOrdersOnly": 0,
        "outsideRth": 0,
        "sendMessage": 1,
        "showPopup": 1,
        "tif": "GTC",
        "conditions": [
          {
            "conidex": "265598@NYSE",
            "logicBind": "a",
            "operator": ">=",
            "timeZone": "US/Eastern",
            "triggerMethod": "0",
            "type": 1,
            "value": "500"
          }
        ]
      }
response:
  statusCode: 503
  statusText: Service Unavailable
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "error": "aliqua cupidatat",
        "statusCode": "magna reprehenderit veniam"
      }
order: 9000
