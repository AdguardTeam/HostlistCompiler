$kind: http-request
description: Retrieve a list of all alerts attached to the provided account.
url: https://api.ibkr.com/v1/api/iserver/account/:accountId/alerts
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: accountId
    value: U1234567
    description: "(Required) "
examples: ./.resources/Get A List Of Available Alerts.resources/examples
order: 1000
