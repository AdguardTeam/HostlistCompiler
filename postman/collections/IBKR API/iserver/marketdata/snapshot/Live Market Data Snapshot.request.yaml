$kind: http-request
description: >
  Get Market Data for the given conid(s). A pre-flight request must be made
  prior to ever receiving data. For some fields, it may take more than a few
  moments to receive information. See response fields for a list of available
  fields that can be request via fields argument. The endpoint /iserver/accounts
  must be called prior to /iserver/marketdata/snapshot. For derivative contracts
  the endpoint /iserver/secdef/search must be called first.
url: https://api.ibkr.com/v1/api/iserver/marketdata/snapshot?conids=265598&fields=7085
method: GET
headers:
  Accept: application/json
queryParams:
  - key: conids
    value: "265598"
    description: "(Required) "
  - key: fields
    value: "7085"
examples: ./.resources/Live Market Data Snapshot.resources/examples
order: 1000
