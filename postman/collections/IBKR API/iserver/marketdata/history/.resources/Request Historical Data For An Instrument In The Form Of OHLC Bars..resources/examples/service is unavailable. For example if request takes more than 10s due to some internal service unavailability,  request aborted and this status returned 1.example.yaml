$kind: http-example
name: >
  service is unavailable. For example if request takes more than 10s due to some
  internal service unavailability,  request aborted and this status returned
request:
  url: https://api.ibkr.com/v1/api/iserver/marketdata/history?conid=265598&exchange=NYSE&period=6d&bar=5mins&startTime=20231018-16:00:00&outsideRth=true
  method: GET
  headers:
    Accept: application/json; charset=utf-8
  queryParams:
    - key: conid
      value: "265598"
      description: (Required) IB contract ID of the requested instrument.
    - key: exchange
      value: NYSE
      description: Exchange (or SMART) from which data is requested.
    - key: period
      value: 6d
      description: (Required) A time duration away from startTime into the future to
        be divided into bars of the specified width.
    - key: bar
      value: 5mins
      description: (Required) The width of the bars into which the interval determined
        by period and startTime will be divided. It is not required that bar
        evenly divide period; partial bars can be returned.
    - key: startTime
      value: 20231018-16:00:00
      description: A fixed UTC date-time reference point for the historical data
        request, from which the specified period extends. Format is
        YYYYMMDD-hh:mm:ss. If omitted, the current time is used, and direction
        must be omitted or 1.
    - key: outsideRth
      value: "true"
      description: Indicates whether data outside of regular trading hours should be
        included in response.
response:
  statusCode: 503
  statusText: Service Unavailable
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "error": "aliqua cupidatat",
        "statusCode": "magna reprehenderit veniam"
      }
order: 7000
