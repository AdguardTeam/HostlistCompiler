$kind: http-request
description: Confirm an order reply message and continue with submission of order ticket.
url: https://api.ibkr.com/v1/api/iserver/reply/:replyId
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: replyId
    value: 99097238-9824-4830-84ef-46979aa22593
    description: (Required) The UUID of the reply message to be confirmed, obtained
      from an order submission response.
body:
  type: json
  content: |-
    {
      "confirmed": true
    }
examples: ./.resources/Confirm An Order Reply Message..resources/examples
order: 1000
