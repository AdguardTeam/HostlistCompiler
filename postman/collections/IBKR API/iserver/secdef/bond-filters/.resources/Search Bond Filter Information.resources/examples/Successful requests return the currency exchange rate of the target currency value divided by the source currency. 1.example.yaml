$kind: http-example
name: Successful requests return the currency exchange rate of the target
  currency value divided by the source currency.
request:
  url: https://api.ibkr.com/v1/api/iserver/secdef/bond-filters?symbol=BOND&issueId=e1400715
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: symbol
      value: BOND
      description: "(Required) "
    - key: issueId
      value: e1400715
      description: "(Required) "
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "bondFilters": [
          {
            "displayText": "Maturity Date",
            "columnId": 27,
            "options": [
              {
                "text": "Jan 2025",
                "value": "202501"
              },
              {
