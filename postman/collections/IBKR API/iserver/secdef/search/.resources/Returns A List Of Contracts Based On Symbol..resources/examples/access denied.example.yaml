$kind: http-example
request:
  url: https://api.ibkr.com/v1/api/iserver/secdef/search?symbol=AAPL&secType=STK&name=false&more=true&fund=true&fundFamilyConidEx=minim&pattern=true&referrer=minim
  method: GET
  headers:
    Accept: text/plain; charset=utf-8
  queryParams:
    - key: symbol
      value: AAPL
    - key: secType
      value: STK
      description: |
        Available underlying security types:
          * `STK` - Represents an underlying as a Stock security type.
          * `IND` - Represents an underlying as an Index security type.
          * `BOND` - Represents an underlying as a Bond security type.
    - key: name
      value: "false"
    - key: more
      value: "true"
    - key: fund
      value: "true"
    - key: fundFamilyConidEx
      value: minim
    - key: pattern
      value: "true"
    - key: referrer
      value: minim
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: text/plain; charset=utf-8
  body:
    type: text
    content: pariatur deserunt mollit
order: 3000
