$kind: http-request
name: Returns A List Of Contracts Based On Symbol.
description: Returns a list of contracts based on the search symbol provided as
  a query param.
url: "{{baseUrl}}/iserver/secdef/search"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "symbol": "AAPL",
      "secType": "STK",
      "name": true,
      "more": true,
      "fund": false,
      "fundFamilyConidEx": "n",
      "pattern": true,
      "referrer": "eiusmod"
    }
examples: ./.resources/Returns A List Of Contracts Based On Symbol. 1.resources/examples
order: 2000
