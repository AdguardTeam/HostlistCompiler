$kind: http-request
description: Returns a list of contracts based on the search symbol provided as
  a query param.
url: https://api.ibkr.com/v1/api/iserver/secdef/search?symbol=AAPL&secType=STK&name=false&more=true&fund=true&fundFamilyConidEx=minim&pattern=true&referrer=minim
method: GET
headers:
  Accept: application/json
queryParams:
  - key: symbol
    value: AAPL
  - key: secType
    value: STK
    description: |
      Available underlying security types:
        * `STK` - Represents an underlying as a Stock security type.
        * `IND` - Represents an underlying as an Index security type.
        * `BOND` - Represents an underlying as a Bond security type.
  - key: name
    value: "false"
  - key: more
    value: "true"
  - key: fund
    value: "true"
  - key: fundFamilyConidEx
    value: minim
  - key: pattern
    value: "true"
  - key: referrer
    value: minim
examples: ./.resources/Returns A List Of Contracts Based On Symbol..resources/examples
order: 1000
