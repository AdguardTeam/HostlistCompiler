$kind: http-example
name: access denied
request:
  url: "{{baseUrl}}/iserver/scanner/run"
  method: POST
  headers:
    Content-Type: application/json
    Accept: text/plain; charset=utf-8
  body:
    type: json
    content: |-
      {
        "instrument": "STK",
        "location": "STK.US.MAJOR",
        "type": "TOP_TRADE_COUNT",
        "filter": [
          {
            "code": "priceAbove",
            "value": 5
          }
        ]
      }
