$kind: http-example
request:
  url: "{{baseUrl}}/iserver/scanner/run"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "instrument": "STK",
        "location": "STK.US.MAJOR",
        "type": "TOP_TRADE_COUNT",
        "filter": [
          {
            "code": "priceAbove",
            "value": 5
          }
        ]
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "error": "aliqua cupidatat",
        "statusCode": "magna reprehenderit veniam"
      }
order: 2000
