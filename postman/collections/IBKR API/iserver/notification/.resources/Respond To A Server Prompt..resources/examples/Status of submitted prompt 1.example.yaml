$kind: http-example
name: Status of submitted prompt
request:
  url: "{{baseUrl}}/iserver/notification"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "orderId": 987654321,
        "reqId": "12345",
        "text": "Yes"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: tempor consequat am
order: 2000
