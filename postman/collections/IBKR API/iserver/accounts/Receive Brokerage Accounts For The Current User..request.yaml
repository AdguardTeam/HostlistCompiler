$kind: http-request
description: Returns a list of accounts the user has trading access to, their
  respective aliases and the currently selected account. Note this endpoint must
  be called before modifying an order or querying open orders.
url: "{{baseUrl}}/iserver/accounts"
method: GET
headers:
  Accept: application/json
examples: ./.resources/Receive Brokerage Accounts For The Current
  User..resources/examples
order: 1000
