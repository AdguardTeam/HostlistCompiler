$kind: http-request
description: Retrieve all saved watchlists stored on IB backend for the username
  in use in the current Web API session.
url: https://api.ibkr.com/v1/api/iserver/watchlists?SC=USER_WATCHLIST
method: GET
headers:
  Accept: application/json
queryParams:
  - key: SC
    value: USER_WATCHLIST
    description: Can only be used with value USER_WATCHLIST, which returns only
      user-created watchlists and excludes those created by IB.
examples: ./.resources/Retrieve All Saved Watchlists Stored On IB Backend For
  The Username In Use In The Current Web API Session..resources/examples
order: 1000
