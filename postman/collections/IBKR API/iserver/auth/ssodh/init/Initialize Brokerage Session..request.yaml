$kind: http-request
description: After retrieving the access token and subsequent Live Session
  Token, customers can initialize their brokerage session with the ssodh/init
  endpoint.
url: "{{baseUrl}}/iserver/auth/ssodh/init"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "publish": false,
      "compete": false
    }
examples: ./.resources/Initialize Brokerage Session..resources/examples
order: 1000
