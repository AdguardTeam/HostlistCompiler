$kind: http-example
name: Success response with temporary OAuth access token
request:
  url: https://api.ibkr.com/v1/api/oauth/request_token
  method: POST
  headers:
    Accept: application/json
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "oauth_token": "e0d75b4c5c1d2c0f2af7"
      }
order: 4000
