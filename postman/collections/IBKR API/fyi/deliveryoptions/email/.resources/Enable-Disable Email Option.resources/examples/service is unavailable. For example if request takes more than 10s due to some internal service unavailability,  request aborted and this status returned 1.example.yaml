$kind: http-example
name: >
  service is unavailable. For example if request takes more than 10s due to some
  internal service unavailability,  request aborted and this status returned
request:
  url: "https://api.ibkr.com/v1/api/fyi/deliveryoptions/email?enabled=Enable or
    disable your email. Value format: true: Enable; false: Disable"
  method: PUT
  headers:
    Accept: application/json; charset=utf-8
  queryParams:
    - key: enabled
      value: |
        Enable or disable your email. Value format: true: Enable; false: Disable
      description: "(Required) "
response:
  statusCode: 503
  statusText: Service Unavailable
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "error": "aliqua cupidatat",
        "statusCode": "magna reprehenderit veniam"
      }
order: 8000
