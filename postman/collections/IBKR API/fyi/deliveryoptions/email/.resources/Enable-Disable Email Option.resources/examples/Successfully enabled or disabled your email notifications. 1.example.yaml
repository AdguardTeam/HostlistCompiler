$kind: http-example
name: Successfully enabled or disabled your email notifications.
request:
  url: "https://api.ibkr.com/v1/api/fyi/deliveryoptions/email?enabled=Enable or
    disable your email. Value format: true: Enable; false: Disable"
  method: PUT
  headers:
    Accept: application/json
  queryParams:
    - key: enabled
      value: |
        Enable or disable your email. Value format: true: Enable; false: Disable
      description: "(Required) "
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "V": 1,
        "T": 10
      }
order: 5000
