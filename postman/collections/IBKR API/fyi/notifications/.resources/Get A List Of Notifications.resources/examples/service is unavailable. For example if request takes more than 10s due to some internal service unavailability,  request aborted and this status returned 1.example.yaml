$kind: http-example
name: >
  service is unavailable. For example if request takes more than 10s due to some
  internal service unavailability,  request aborted and this status returned
request:
  url: https://api.ibkr.com/v1/api/fyi/notifications?max=10&include=include&exclude=exclude&id=if
    more required, notifcationId of last notification should be used to define
    next batch border
  method: GET
  headers:
    Accept: application/json; charset=utf-8
  queryParams:
    - key: max
      value: "10"
      description: "(Required) "
    - key: include
      value: include
    - key: exclude
      value: exclude
    - key: id
      value: if more required, notifcationId of last notification should be used to
        define next batch border
response:
  statusCode: 503
  statusText: Service Unavailable
  headers:
    Content-Type: application/json; charset=utf-8
  body:
    type: json
    content: |-
      {
        "error": "aliqua cupidatat",
        "statusCode": "magna reprehenderit veniam"
      }
order: 10000
