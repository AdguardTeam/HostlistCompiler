$kind: http-request
description: Mark a particular notification message as read or unread.
url: https://api.ibkr.com/v1/api/fyi/notifications/:notificationID
method: PUT
headers:
  Accept: application/json
pathVariables:
  - key: notificationID
    value: "123456"
    description: "(Required) Code used to signify a specific notification to mark. Value received from /fyi/notifications."
examples: ./.resources/Mark Notification Read.resources/examples
order: 1000
