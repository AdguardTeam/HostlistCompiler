$kind: http-request
description: Mark a particular notification message as read or unread.
url: https://api.ibkr.com/v1/api/fyi/notifications/:notificationID
method: PUT
headers:
  Accept: application/json
pathVariables:
  - key: notificationID
    value: ""
  - key: notificationId
    value: Code used to signify a specific notification to mark. Value received from
      /fyi/notifications
    description: "(Required) "
examples: ./.resources/Mark Notification Read.resources/examples
order: 1000
