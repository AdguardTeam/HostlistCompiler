$kind: http-request
description: If the gateway has not received any requests for several minutes an
  open session will automatically timeout. The tickle endpoint pings the server
  to prevent the session from ending. It is expected to call this endpoint
  approximately every 60 seconds to maintain the connection to the brokerage
  session.
url: "{{baseUrl}}/tickle"
method: POST
headers:
  Accept: application/json
examples: ./.resources/Server Ping..resources/examples
order: 1000
