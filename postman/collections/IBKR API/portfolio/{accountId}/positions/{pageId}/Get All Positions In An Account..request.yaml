$kind: http-request
description: Get all positions in an account.
url: https://api.ibkr.com/v1/api/portfolio/:accountId/positions/:pageId
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: accountId
    value: DU123456
    description: "(Required) "
  - key: pageId
    value: "1"
  - key: model
    value: ""
    description: Name of model
  - key: sort
    value: ""
    description: sorting of result positions by specified field. Defaulted to "name" field.
  - key: direction
    value: ""
    description: Sorting direction. Possible values "a" - ascending, "d" -
      descending. Defaulted to "a"
  - key: waitForSecDef
    value: "true"
examples: ./.resources/Get All Positions In An Account..resources/examples
order: 1000
