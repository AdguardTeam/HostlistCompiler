$kind: http-request
description: Instructs IB to discard cached portfolio positions for a given
  account, so that the next request for positions delivers freshly obtained
  data.
url: https://api.ibkr.com/v1/api/portfolio/:accountId/positions/invalidate
method: POST
headers:
  Accept: application/json
pathVariables:
  - key: accountId
    value: DU123456
    description: "(Required) "
examples: ./.resources/Instructs IB To Discard Cached Portfolio Positions For A
  Given Account..resources/examples
order: 1000
