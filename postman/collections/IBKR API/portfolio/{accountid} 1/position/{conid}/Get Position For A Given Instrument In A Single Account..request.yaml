$kind: http-request
description: Get position for a given instrument in a single account. WaitSecDef
  attribute is always defaulted to false. It is possible to get position without
  security definition.
url: https://api.ibkr.com/v1/api/portfolio/:accountid/position/:conid
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: accountid
    value: ""
  - key: conid
    value: "265598"
    description: "(Required) "
  - key: accountId
    value: DU123456
    description: "(Required) "
examples: ./.resources/Get Position For A Given Instrument In A Single
  Account..resources/examples
order: 1000
