$kind: http-request
description: Create a new transaction between the `fromAccount` and `toAccount`
url: "{{baseUrl}}/api/v1/transactions"
method: POST
headers:
  Content-Type: application/json
  api-key: "1234"
body:
  type: text
  content: |-
    {
        "fromAccountId": {{e2e_user_account_id_from}},
        "toAccountId": {{e2e_user_account_id_to}},
        "amount": 20,
        "currency": "COSMIC_COINS"
    }
scripts:
  - type: afterResponse
    code: |-
      const response = pm.response.json();

      pm.test("Should display a successful transaction message", function () {
          pm.expect(response.success).to.be.true;
      });
    language: text/javascript
examples: ./.resources/[5] Create A New Transaction Between The Users.resources/examples
order: 5000
