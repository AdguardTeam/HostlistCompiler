$kind: http-example
request:
  url: https://template.postman-echo.com/api/v1/transactions
  method: POST
  headers:
    Content-Type: application/json
    api-key: "1234"
  body:
    type: text
    content: |-
      {
          "fromAccountId": {{e2e_user_account_id_from}},
          "toAccountId": {{e2e_user_account_id_to}},
          "amount": 20,
          "currency": "COSMIC_COINS"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Date: Mon, 11 Mar 2024 01:10:52 GMT
    Content-Type: application/json; charset=utf-8
    Content-Length: "101"
    Connection: keep-alive
    uWebSockets: "20"
  body:
    type: json
    content: >-
      {
          "name": "invalidBody",
          "message": "Insufficient balance in fromAccountId to initiate the transaction."
      }
order: 1000
