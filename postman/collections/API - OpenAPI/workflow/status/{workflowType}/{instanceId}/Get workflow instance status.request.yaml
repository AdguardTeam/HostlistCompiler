$kind: http-request
url: http://{{baseUrl}}:/workflow/status/:workflowType/:instanceId
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: workflowType
    value: health-monitoring
    description: Type of workflow
  - key: instanceId
    value: string
    description: Workflow instance ID
body:
  type: text
  content: ""
examples: ./.resources/Get workflow instance status.resources/examples
order: 1000
