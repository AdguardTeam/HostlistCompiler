$kind: http-example
request:
  url: http://{{baseUrl}}:/workflow/status/:workflowType/:instanceId
  method: GET
  pathVariables:
    - key: workflowType
      value: health-monitoring
      description: Type of workflow
    - key: instanceId
      value: string
      description: Workflow instance ID
  body:
    type: text
    content: ""
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 3000
