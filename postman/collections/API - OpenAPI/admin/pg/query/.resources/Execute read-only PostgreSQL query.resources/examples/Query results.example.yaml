$kind: http-example
request:
  url: http://{{baseUrl}}/admin/pg/query
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: X-Admin-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "sql": "string"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "rows": [
          {
            "key_0": 5798
          },
          {
            "key_0": 5787.915143782007
          }
        ],
        "rowCount": 3310,
        "meta": {
          "key_0": 5716.442347227177
        }
      }
order: 1000
