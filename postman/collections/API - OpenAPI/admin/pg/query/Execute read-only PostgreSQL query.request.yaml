$kind: http-request
description: Executes a SELECT-only SQL query against PostgreSQL for debugging
  (mirrors /admin/storage/query for D1)
url: http://{{baseUrl}}/admin/pg/query
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "sql": "string"
    }
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Execute read-only PostgreSQL query.resources/examples
order: 1000
