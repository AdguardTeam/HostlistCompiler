$kind: http-example
request:
  url: http://{{baseUrl}}/admin/storage/stats
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: X-Admin-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: text
    content: ""
response:
  statusCode: 503
  statusText: Service Unavailable
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "error": "string"
      }
order: 3000
