$kind: http-example
request:
  url: http://{{baseUrl}}/admin/storage/query
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: X-Admin-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "sql": "string"
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: text
    content: ""
order: 2000
