$kind: http-request
url: http://{{baseUrl}}/admin/storage/query
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: ""
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Execute read-only SQL query.resources/examples
order: 1000
