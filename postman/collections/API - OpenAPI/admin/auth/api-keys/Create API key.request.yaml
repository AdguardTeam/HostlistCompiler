$kind: http-request
url: http://{{baseUrl}}/admin/auth/api-keys
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: ""
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Create API key.resources/examples
order: 3000
