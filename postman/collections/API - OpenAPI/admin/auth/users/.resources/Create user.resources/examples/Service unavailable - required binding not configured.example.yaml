$kind: http-example
request:
  url: http://{{baseUrl}}/admin/auth/users
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: X-Admin-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "email": "TZ8M-7XXUYaS@aDP.ex",
        "displayName": "string",
        "role": "user"
      }
response:
  statusCode: 503
  statusText: Service Unavailable
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "error": "string"
      }
order: 5000
