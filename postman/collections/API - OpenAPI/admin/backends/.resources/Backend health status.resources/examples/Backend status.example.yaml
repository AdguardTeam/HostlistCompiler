              "error": "string"
            },
            "postgresql": {
              "available": false,
              "latencyMs": 1864,
              "host": "string",
              "error": "string"
            }
          },
          "primary": "d1",
          "timestamp": "1990-06-15T23:00:07.624Z"
        }
      }
order: 1000
