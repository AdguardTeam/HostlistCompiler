$kind: http-request
url: http://{{baseUrl}}:/admin/migrate/d1-to-pg?dryRun=false&tables=storage_entries,filter_cache
method: POST
headers:
  Accept: application/json
queryParams:
  - key: dryRun
    value: "false"
    description: Count rows without writing (dry run)
  - key: tables
    value: storage_entries,filter_cache
    description: "Comma-separated list of tables to migrate (default: all)"
body:
  type: text
  content: ""
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Migrate D1 data to PostgreSQL.resources/examples
order: 1000
