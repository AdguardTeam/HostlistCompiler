$kind: http-example
request:
  url: http://{{baseUrl}}/api/browser/monitor
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "urls": [
          "https://example.com/filter-list.txt",
          "https://another.example.com/rules.txt"
        ],
        "captureScreenshots": false,
        "screenshotPrefix": "2025-07-01",
        "timeout": 30000,
        "waitUntil": "networkidle"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: >-
      {
