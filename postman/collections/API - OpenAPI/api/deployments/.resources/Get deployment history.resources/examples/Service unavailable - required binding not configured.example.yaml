$kind: http-example
request:
  url: http://{{baseUrl}}:/api/deployments?limit=50&version=string&status=string&branch=string
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: limit
      value: "50"
      description: Maximum number of records to return
    - key: version
      value: string
      description: Filter by version
    - key: status
      value: string
      description: Filter by deployment status
    - key: branch
      value: string
      description: Filter by branch name
  body:
    type: text
    content: ""
response:
  statusCode: 503
  statusText: Service Unavailable
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "error": "string"
      }
order: 2000
