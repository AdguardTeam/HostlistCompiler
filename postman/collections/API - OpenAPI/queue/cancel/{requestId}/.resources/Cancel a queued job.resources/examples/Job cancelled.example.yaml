$kind: http-example
request:
  url: http://{{baseUrl}}:/queue/cancel/:requestId
  method: POST
  headers:
    Accept: application/json
  pathVariables:
    - key: requestId
      value: string
      description: Request ID of the job to cancel
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "message": "string",
        "note": "string"
      }
order: 1000
