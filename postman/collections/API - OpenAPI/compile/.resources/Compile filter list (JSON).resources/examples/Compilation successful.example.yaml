$kind: http-example
request:
  url: http://{{baseUrl}}/compile
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "configuration": {
          "name": "My Filter List",
          "sources": [
            {
              "source": "https://example.com/filters.txt",
              "transformations": [
                "RemoveComments",
                "Validate"
              ]
            }
          ],
          "transformations": [
            "Deduplicate"
          ]
        }
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: application/json
    - key: X-Cache
      value: MISS
      description: Cache hit/miss status
    - key: X-Request-Deduplication
      value: HIT
      description: Present if request was deduplicated
  body:
    type: json
    content: |-
      {
        "success": false,
        "rules": [
          "string",
          "string"
        ],
        "ruleCount": 8950,
        "metrics": {
