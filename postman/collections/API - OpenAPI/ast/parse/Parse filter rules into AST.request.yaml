$kind: http-request
description: Parses adblock filter rules into an Abstract Syntax Tree representation
url: http://{{baseUrl}}/ast/parse
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "rules": [
        "string",
        "string"
      ],
      "text": "string"
    }
examples: ./.resources/Parse filter rules into AST.resources/examples
order: 1000
