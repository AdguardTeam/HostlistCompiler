$kind: collection
description: >-
  **Compiler-as-a-Service** for adblock filter lists. Transform, optimize, and
  combine filter lists from multiple sources with real-time progress tracking.


  ## Features

  - 🎯 Multi-Source Compilation

  - ⚡ Performance (Gzip compression, caching, request deduplication)

  - 🔄 Circuit Breaker with retry logic

  - 📊 Visual Diff between compilations

  - 📡 Real-time progress via SSE and WebSocket

  - 🎪 Batch Processing


  ## Authentication

  Admin endpoints require the `X-Admin-Key` header. Set the `adminKey`
  collection variable to your admin key.


  ## Servers

  - **Production**: https://adblock-compiler.jayson-knight.workers.dev

  - **Local Dev**: http://localhost:8787
