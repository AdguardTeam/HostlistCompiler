$kind: collection
name: Adblock Compiler API
description: |-
  **Compiler-as-a-Service** for adblock filter lists. Transform, optimize, and combine filter lists from multiple sources with real-time progress tracking.

  ## Features
  - 🎯 Multi-Source Compilation
  - ⚡ Performance (Gzip compression, caching, request deduplication)
  - 🔄 Circuit Breaker with retry logic
  - 📊 Visual Diff between compilations
  - 📡 Real-time progress via SSE and WebSocket
  - 🎪 Batch Processing

  ## Authentication
  Admin endpoints require the `X-Admin-Key` header. Set the `adminKey` collection variable to your admin key.

  ## Servers
  - **Production**: https://adblock-compiler.jayson-knight.workers.dev
  - **Local Dev**: http://localhost:8787

variables:
  - key: baseUrl
    value: 'https://adblock-compiler.jayson-knight.workers.dev'
    description: 'Base URL for the API. Switch to http://localhost:8787 for local dev.'
  - key: adminKey
    value: ''
    description: Admin key for X-Admin-Key header (required for /admin/* endpoints)
  - key: requestId
    value: ''
    description: Async job request ID (populated by async compile endpoints)
  - key: workflowInstanceId
    value: ''
    description: Workflow instance ID (populated by workflow start endpoints)
