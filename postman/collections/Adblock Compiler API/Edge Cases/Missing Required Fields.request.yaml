$kind: http-request
description: Test with missing required sources field
url: "{{baseUrl}}/compile"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "configuration": {
        "name": "Missing Sources"
      }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 500', function () {
          pm.response.to.have.status(500);
      });
    language: text/javascript
order: 2000
