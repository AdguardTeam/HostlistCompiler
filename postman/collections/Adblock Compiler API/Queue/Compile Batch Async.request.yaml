$kind: http-request
method: POST
url: '{{baseUrl}}/compile/batch/async'
order: 2000
description: Queue multiple compilations for async processing. Returns a request ID to poll for results.
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "requests": [
        {
          "id": "async-list-1",
          "configuration": {
            "name": "EasyList Async",
            "sources": [
              {
                "source": "https://easylist.to/easylist/easylist.txt",
                "transformations": ["RemoveComments", "Validate"]
              }
            ],
            "transformations": ["Deduplicate"]
          }
        }
      ]
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 202", function () {
          pm.response.to.have.status(202);
      });

      pm.test("Response has requestId", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("requestId");
          pm.collectionVariables.set("requestId", json.requestId);
      });
