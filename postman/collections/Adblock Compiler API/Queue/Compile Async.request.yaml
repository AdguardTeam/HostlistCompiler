$kind: http-request
method: POST
url: '{{baseUrl}}/compile/async'
order: 1000
description: |-
  Queue a compilation job for asynchronous processing. Returns immediately with a request ID.
  Use **Get Queue Results** to poll for completion.
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "configuration": {
        "name": "Async Compile Job",
        "sources": [
          {
            "source": "https://easylist.to/easylist/easylist.txt",
            "transformations": ["RemoveComments", "Validate"]
          }
        ],
        "transformations": ["Deduplicate"]
      },
      "priority": "standard"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 202", function () {
          pm.response.to.have.status(202);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Response has requestId", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("requestId");
          pm.expect(json.requestId).to.be.a("string");
          // Save for use in Get Queue Results
          pm.collectionVariables.set("requestId", json.requestId);
      });
