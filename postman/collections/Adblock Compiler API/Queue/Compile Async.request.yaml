$kind: http-request
url: "{{baseUrl}}/compile/async"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 202", function () {
          pm.response.to.have.status(202);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Response has requestId", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("requestId");
          pm.expect(json.requestId).to.be.a("string");
          // Save for use in Get Queue Results
          pm.collectionVariables.set("requestId", json.requestId);
      });
    language: text/javascript
order: 1000
