$kind: http-request
description: Retrieve results from queued job
url: "{{baseUrl}}/queue/results/{{requestId}}"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200 or 404', function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });
    language: text/javascript
order: 4000
