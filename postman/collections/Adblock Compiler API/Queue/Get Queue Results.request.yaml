$kind: http-request
url: "{{baseUrl}}:/queue/results/{{requestId}}"
method: GET
pathVariables:
  - key: requestId
    value: "{{requestId}}"
    description: Request ID returned from async compile endpoints
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200 or 404", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 404]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      if (pm.response.code === 200) {
          pm.test("Response has status or success field", function () {
              const json = pm.response.json();
              const hasStatus = json.hasOwnProperty("status");
              const hasSuccess = json.hasOwnProperty("success");
              pm.expect(hasStatus || hasSuccess).to.be.true;
          });
      }
    language: text/javascript
order: 4000
