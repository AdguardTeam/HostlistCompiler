$kind: http-request
description: Queue a batch async compilation
url: "{{baseUrl}}/compile/batch/async"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "requests": [
        {
          "id": "async-batch-1",
          "configuration": {
            "name": "Async Batch 1",
            "sources": [{"source": "ab1"}]
          },
          "preFetchedContent": {"ab1": "||async1.com^"}
        }
      ]
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 202 or 500', function () {
          pm.expect(pm.response.code).to.be.oneOf([202, 500]);
      });
    language: text/javascript
order: 2000
