$kind: http-request
method: GET
url: '{{baseUrl}}/api/turnstile-config'
order: 6000
description: Returns the Cloudflare Turnstile site key and whether it is enabled
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Response has turnstile config", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("enabled");
      });
