$kind: http-request
url: "{{baseUrl}}:/api/deployments?limit=50"
method: GET
queryParams:
  - key: limit
    value: "50"
    description: Maximum number of records to return (1-1000)
  - key: version
    value: ""
    disabled: true
    description: Filter by version
  - key: status
    value: ""
    disabled: true
    description: Filter by deployment status
  - key: branch
    value: ""
    disabled: true
    description: Filter by branch name
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200 or 503", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 503]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      if (pm.response.code === 200) {
          pm.test("Response has deployments array", function () {
              const jsonData = pm.response.json();
              pm.expect(jsonData).to.have.property("success");
              pm.expect(jsonData).to.have.property("deployments");
              pm.expect(jsonData.deployments).to.be.an("array");
          });
      }
    language: text/javascript
order: 4000
