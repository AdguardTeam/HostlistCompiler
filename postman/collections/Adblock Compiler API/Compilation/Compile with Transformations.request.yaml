$kind: http-request
description: Test multiple transformations with benchmarking
url: "{{baseUrl}}/compile"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: >-
    {
      "configuration": {
        "name": "Advanced Filter List",
        "description": "Test with multiple transformations",
        "sources": [
          {
            "source": "rules1",
            "transformations": ["RemoveComments", "Validate"]
          }
        ],
        "transformations": ["Deduplicate", "RemoveEmptyLines"]
      },
      "preFetchedContent": {
        "rules1": "! Comment line\n||example.com^\n||ads.example.com^\n\n||tracking.com^"
      },
      "benchmark": true
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });


      pm.test('Response is successful', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.success).to.be.true;
      });


      pm.test('Rules are deduplicated', function () {
          const jsonData = pm.response.json();
          const uniqueRules = new Set(jsonData.rules.filter(r => !r.startsWith('!')));
          pm.expect(uniqueRules.size).to.equal(jsonData.rules.filter(r => !r.startsWith('!')).length);
      });
    language: text/javascript
order: 2000
