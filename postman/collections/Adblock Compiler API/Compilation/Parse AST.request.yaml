$kind: http-request
method: POST
url: '{{baseUrl}}/ast/parse'
order: 3000
description: Parses adblock filter rules into an Abstract Syntax Tree (AST) representation.
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "rules": [
        "||ads.example.com^",
        "||tracking.example.com^$third-party",
        "@@||safe.example.com^",
        "##.ad-banner"
      ]
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Response has AST nodes", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("success");
          pm.expect(json).to.have.property("nodes");
          pm.expect(json.nodes).to.be.an("array");
      });
