$kind: http-request
description: Compile a simple filter list with pre-fetched content
url: "{{baseUrl}}/compile"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: >-
    {
      "configuration": {
        "name": "Test Filter List",
        "sources": [
          {
            "source": "test-rules"
          }
        ],
        "transformations": ["Deduplicate"]
      },
      "preFetchedContent": {
        "test-rules": "||ads.example.com^\n||tracking.example.com^\n||ads.example.com^"
      }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Response is successful', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData.success).to.be.true;
      });

      pm.test('Has rules array', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('rules');
          pm.expect(jsonData.rules).to.be.an('array');
      });

      pm.test('Has ruleCount', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('ruleCount');
          pm.expect(jsonData.ruleCount).to.be.a('number');
      });

      pm.test('Has compiledAt timestamp', function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('compiledAt');
      });
    language: text/javascript
order: 1000
