$kind: http-request
description: Test Server-Sent Events streaming
url: "{{baseUrl}}/compile/stream"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "configuration": {
        "name": "Streaming Test",
        "sources": [
          {
            "source": "stream-test"
          }
        ]
      },
      "preFetchedContent": {
        "stream-test": "||ads.stream.com^\n||tracking.stream.com^"
      }
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });


      pm.test('Content-Type is event-stream', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.include('text/event-stream');
      });


      pm.test('Response contains SSE events', function () {
          const responseText = pm.response.text();
          pm.expect(responseText).to.include('event:');
          pm.expect(responseText).to.include('data:');
      });
    language: text/javascript
order: 1000
