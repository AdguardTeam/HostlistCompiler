$kind: http-request
method: GET
url: '{{baseUrl}}/admin/pg/stats'
order: 1000
description: Returns storage statistics from the PostgreSQL backend. Mirrors /admin/storage/stats for D1. Requires X-Admin-Key header.
auth:
  type: apikey
  credentials:
    - key: key
      value: X-Admin-Key
    - key: value
      value: '{{adminKey}}'
    - key: in
      value: header
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200, 401, or 503", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 401, 503]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });
