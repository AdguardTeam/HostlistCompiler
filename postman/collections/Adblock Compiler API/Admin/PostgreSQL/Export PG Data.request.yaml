$kind: http-request
url: "{{baseUrl}}/admin/pg/export"
method: GET
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{adminKey}}"
    in: header
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200, 401, or 503", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 401, 503]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });
    language: text/javascript
order: 2000
