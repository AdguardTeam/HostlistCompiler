$kind: http-request
method: POST
url: '{{baseUrl}}/admin/pg/query'
order: 5000
description: Executes a SELECT-only SQL query against PostgreSQL for debugging. Mirrors /admin/storage/query for D1. Requires X-Admin-Key header.
auth:
  type: apikey
  credentials:
    - key: key
      value: X-Admin-Key
    - key: value
      value: '{{adminKey}}'
    - key: in
      value: header
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "sql": "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' ORDER BY table_name"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200, 400, 401, or 503", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 400, 401, 503]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      if (pm.response.code === 200) {
          pm.test("Response has results", function () {
              const json = pm.response.json();
              pm.expect(json).to.have.property("results");
          });
      }
