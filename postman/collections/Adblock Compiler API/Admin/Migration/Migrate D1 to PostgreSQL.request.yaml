$kind: http-request
url: "{{baseUrl}}:/admin/migrate/d1-to-pg?dryRun=true"
method: POST
queryParams:
  - key: dryRun
    value: "true"
    description: Count rows without writing (safe preview)
  - key: tables
    value: ""
    disabled: true
    description: "Comma-separated list of tables to migrate (default: all). E.g.
      storage_entries,filter_cache"
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{adminKey}}"
    in: header
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200, 400, 401, or 503", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 400, 401, 503]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      if (pm.response.code === 200) {
          pm.test("Response has migration result", function () {
              const json = pm.response.json();
              pm.expect(json).to.have.property("success");
          });
      }
    language: text/javascript
order: 1000
