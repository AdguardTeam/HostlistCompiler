$kind: http-request
url: "{{baseUrl}}:/admin/auth/api-keys?userId=00000000-0000-0000-0000-000000000000"
method: GET
queryParams:
  - key: userId
    value: 00000000-0000-0000-0000-000000000000
    description: User ID (UUID) to list API keys for
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{adminKey}}"
    in: header
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200, 400, 401, or 503", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 400, 401, 503]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      if (pm.response.code === 200) {
          pm.test("Response has apiKeys array", function () {
              const json = pm.response.json();
              pm.expect(json).to.have.property("apiKeys");
              pm.expect(json.apiKeys).to.be.an("array");
          });
      }
    language: text/javascript
order: 3000
