$kind: http-request
method: GET
url: '{{baseUrl}}/admin/auth/api-keys'
order: 3000
description: Lists API keys for a user (without key hashes). Requires Hyperdrive (PostgreSQL) binding and X-Admin-Key header.
auth:
  type: apikey
  credentials:
    - key: key
      value: X-Admin-Key
    - key: value
      value: '{{adminKey}}'
    - key: in
      value: header
queryParams:
  - key: userId
    value: '00000000-0000-0000-0000-000000000000'
    description: User ID (UUID) to list API keys for
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200, 400, 401, or 503", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 400, 401, 503]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      if (pm.response.code === 200) {
          pm.test("Response has apiKeys array", function () {
              const json = pm.response.json();
              pm.expect(json).to.have.property("apiKeys");
              pm.expect(json.apiKeys).to.be.an("array");
          });
      }
