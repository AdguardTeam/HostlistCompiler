$kind: http-request
url: "{{baseUrl}}/admin/auth/api-keys"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: ""
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{adminKey}}"
    in: header
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 201, 400, 401, 404, or 503", function () {
          pm.expect(pm.response.code).to.be.oneOf([201, 400, 401, 404, 503]);
      });


      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });


      if (pm.response.code === 201) {
          pm.test("Response has rawKey (store it — shown only once)", function () {
              const json = pm.response.json();
              pm.expect(json).to.have.property("rawKey");
          });
      }
    language: text/javascript
order: 2000
