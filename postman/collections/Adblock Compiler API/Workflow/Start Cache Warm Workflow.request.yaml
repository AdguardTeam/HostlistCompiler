$kind: http-request
url: "{{baseUrl}}/workflow/cache-warm"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 202", function () {
          pm.response.to.have.status(202);
      });

      pm.test("Response has instanceId", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("instanceId");
      });
    language: text/javascript
order: 3000
