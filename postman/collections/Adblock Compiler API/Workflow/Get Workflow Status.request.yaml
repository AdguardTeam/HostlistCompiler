$kind: http-request
url: "{{baseUrl}}:/workflow/status/{{workflowType}}/{{workflowInstanceId}}"
method: GET
pathVariables:
  - key: workflowType
    value: compilation
    description: "One of: compilation, batch-compilation, cache-warming, health-monitoring"
  - key: workflowInstanceId
    value: "{{workflowInstanceId}}"
    description: Workflow instance ID (set by Start Workflow requests)
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200, 400, or 404", function () {
          pm.expect(pm.response.code).to.be.oneOf([200, 400, 404]);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      if (pm.response.code === 200) {
          pm.test("Response has status field", function () {
              const json = pm.response.json();
              pm.expect(json).to.have.property("status");
          });
      }
    language: text/javascript
order: 5000
