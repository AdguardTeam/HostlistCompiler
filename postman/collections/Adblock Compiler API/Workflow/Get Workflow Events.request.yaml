$kind: http-request
url: "{{baseUrl}}:/workflow/events/{{workflowInstanceId}}"
method: GET
queryParams:
  - key: since
    value: ""
    disabled: true
    description: Return only events after this ISO 8601 timestamp
pathVariables:
  - key: workflowInstanceId
    value: "{{workflowInstanceId}}"
    description: Workflow instance ID
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Response has events array", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("events");
          pm.expect(json.events).to.be.an("array");
      });
    language: text/javascript
order: 7000
