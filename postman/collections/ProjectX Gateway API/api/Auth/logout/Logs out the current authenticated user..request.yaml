$kind: http-request
url: "{{baseUrl}}/api/Auth/logout"
method: POST
headers:
  Accept: text/plain
scripts:
  - type: afterResponse
    code: >-
      pm.test("Response status code is 200", function () {
          pm.expect(pm.response.code).to.eql(200);
      });



      pm.test("Response has required fields", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData).to.have.all.keys('success', 'errorCode', 'errorMessage');
      });



      pm.test("Success field should be true", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.success).to.be.true;
      });



      pm.test("Error code is a non-negative integer", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.errorCode).to.be.a('number').and.to.be.at.least(0);
      });



      pm.test("Error message should be null or a non-empty string", function ()
      {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.errorMessage).to.satisfy(function(value) {
              return value === null || (typeof value === 'string' && value.length > 0);
          }, "Error message must be null or a non-empty string");
      });
    language: text/javascript
examples: ./.resources/Logs out the current authenticated user..resources/examples
order: 1000
