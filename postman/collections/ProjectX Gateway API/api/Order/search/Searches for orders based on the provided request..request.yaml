$kind: http-request
url: "{{baseUrl}}/api/Order/search"
method: POST
headers:
  Content-Type: application/json
  Accept: text/plain
body:
  type: text
  content: |-
    {
      "accountId": 4356,
      "startTimestamp": "2023-09-09T20:57:15.224Z",
      "endTimestamp": "1959-02-05T02:00:03.169Z"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test("Response status code is 200", function () {
          pm.expect(pm.response.code).to.equal(200);
      });



      pm.test("Response contains success field and it is true", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData).to.have.property('success').that.equals(true);
      });



      pm.test("Error code indicates no errors occurred", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.success).to.be.true;
          pm.expect(responseData.errorCode).to.equal(0);
      });



      pm.test("The orders field should be either an array or null", function ()
      {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.orders).to.satisfy(function(value) {
              return Array.isArray(value) || value === null;
          }, "orders field must be an array or null");
      });



      pm.test("Response time is less than 200ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(200);
      });
    language: text/javascript
examples: ./.resources/Searches for orders based on the provided
  request..resources/examples
order: 1000
