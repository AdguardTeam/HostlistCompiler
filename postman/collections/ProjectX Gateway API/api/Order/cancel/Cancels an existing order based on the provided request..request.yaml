$kind: http-request
url: "{{baseUrl}}/api/Order/cancel"
method: POST
headers:
  Content-Type: application/json
  Accept: text/plain
body:
  type: text
  content: |-
    {
      "accountId": 3169,
      "orderId": 8931
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test("Response status code is 200", function () {
          pm.expect(pm.response.code).to.eql(200);
      });



      pm.test("Response contains success field that is true", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData).to.have.property('success', true);
      });



      pm.test("Error code is a non-negative integer", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.errorCode).to.exist.and.to.be.a('number').and.to.be.at.least(0);
      });



      pm.test("Error message should be null or an empty string", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.have.property('errorMessage');
          pm.expect(responseData.errorMessage).to.satisfy(function(value) {
              return value === null || value === "";
          });
      });



      pm.test("Response time is less than 200ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(200);
      });
    language: text/javascript
examples: ./.resources/Cancels an existing order based on the provided
  request..resources/examples
order: 1000
