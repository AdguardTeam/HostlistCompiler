$kind: http-request
url: "{{baseUrl}}/api/Trade/search"
method: POST
headers:
  Content-Type: application/json
  Accept: text/plain
body:
  type: text
  content: |-
    {
      "accountId": 764,
      "startTimestamp": "1962-08-13T06:20:38.946Z",
      "endTimestamp": "2011-12-29T15:47:07.723Z"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test("Response status code is 200", function () {
          pm.expect(pm.response.code).to.equal(200);
      });



      pm.test("Response contains success field and it is true", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.have.property('success').that.is.true;
      });



      pm.test("Verify that errorCode is 0", function () {
          const responseData = pm.response.json();
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.errorCode).to.equal(0);
      });



      pm.test("Error message should be null", function () {
          const responseData = pm.response.json();
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.errorMessage).to.be.null;
      });



      pm.test("The 'trades' field should be either null or an empty array",
      function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData.trades).to.satisfy(function(value) {
              return value === null || (Array.isArray(value) && value.length === 0);
          }, "The 'trades' field must be either null or an empty array");
      });
    language: text/javascript
examples: ./.resources/Searches for half-turn trades based on the provided
  request parameters..resources/examples
order: 1000
