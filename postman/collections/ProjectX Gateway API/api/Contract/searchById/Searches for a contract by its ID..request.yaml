$kind: http-request
url: "{{baseUrl}}/api/Contract/searchById"
method: POST
headers:
  Content-Type: application/json
  Accept: text/plain
body:
  type: text
  content: |-
    {
      "contractId": "string"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test("Response status code is 200", function () {
          pm.expect(pm.response.code).to.equal(200);
      });



      pm.test("Response contains a success field that is true", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.success).to.exist.and.to.be.true;
      });



      pm.test("Error code is 0 indicating no errors occurred", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.success).to.exist;
          pm.expect(responseData.errorCode).to.equal(0);
      });



      pm.test("Error message should be null indicating no error details are
      present", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.errorMessage).to.be.null;
      });



      pm.test("Response time is less than 200ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(200);
      });
    language: text/javascript
examples: ./.resources/Searches for a contract by its ID..resources/examples
order: 1000
