$kind: http-request
url: "{{baseUrl}}/api/Position/partialCloseContract"
method: POST
headers:
  Content-Type: application/json
  Accept: text/plain
body:
  type: text
  content: |-
    {
      "accountId": 4215,
      "contractId": "string",
      "size": 3843
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Response status code is 200", function () {
          pm.expect(pm.response.code).to.eql(200);
      });


      pm.test("Response contains a success field that is true", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.have.property('success', true);
      });


      pm.test("Error code is 0 indicating no errors occurred", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData).to.have.property('errorCode', 0);
      });


      pm.test("Error message should be null or an empty string", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.errorMessage).to.satisfy(function(value) {
              return value === null || value === "";
          });
      });


      pm.test("Response time is less than 200ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(200);
      });
    language: text/javascript
examples: ./.resources/Partially closes a contract position based on the
  provided request..resources/examples
order: 1000
