$kind: http-request
url: "{{baseUrl}}/api/Position/searchOpen"
method: POST
headers:
  Content-Type: application/json
  Accept: text/plain
body:
  type: text
  content: |-
    {
      "accountId": 6913
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test("Response status code is 200", function () {
          pm.expect(pm.response.code).to.equal(200);
      });



      pm.test("Response contains success field and it is true", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.have.property('success').that.is.true;
      });



      pm.test("Positions is either null or an array", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData.positions).to.satisfy(function(value) {
              return value === null || Array.isArray(value);
          });
      });



      pm.test("Error code should be 0 indicating no errors occurred", function
      () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.success).to.exist.and.to.be.true;
          pm.expect(responseData.errorCode).to.exist.and.to.equal(0);
      });



      pm.test("Ensure 'errorMessage' is null when 'success' is true", function
      () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.success).to.be.true;
          pm.expect(responseData.errorMessage).to.be.null;
      });
    language: text/javascript
examples: ./.resources/Searches for open positions based on the provided
  request..resources/examples
order: 1000
