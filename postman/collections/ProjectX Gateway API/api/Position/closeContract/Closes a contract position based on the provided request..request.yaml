$kind: http-request
url: "{{baseUrl}}/api/Position/closeContract"
method: POST
headers:
  Content-Type: application/json
  Accept: text/plain
body:
  type: text
  content: |-
    {
      "accountId": 2175,
      "contractId": "string"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test("Response status code is 200", function () {
          pm.expect(pm.response.code).to.eql(200);
      });



      pm.test("Response contains required fields", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData).to.have.all.keys('success', 'errorCode', 'errorMessage');
      });



      pm.test("Success is a boolean value", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.success).to.be.a('boolean');
      });



      pm.test("ErrorCode is a non-negative integer", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.be.an('object');
          pm.expect(responseData.errorCode).to.exist.and.to.be.a('number').and.to.be.at.least(0);
      });



      pm.test("ErrorMessage is either null or a non-empty string", function () {
          const responseData = pm.response.json();
          
          pm.expect(responseData).to.have.property('errorMessage');
          pm.expect(responseData.errorMessage).to.satisfy(function(value) {
              return value === null || (typeof value === 'string' && value.trim().length > 0);
          });
      });
    language: text/javascript
examples: ./.resources/Closes a contract position based on the provided
  request..resources/examples
order: 1000
