$kind: http-request
description: |-
  The HTTP `DELETE` method is used to delete resources on a server. The exact
  use of `DELETE` requests depends on the server implementation. In general, 
  `DELETE` requests support both, Query String parameters as well as a Request 
  Body.

  This endpoint accepts an HTTP `DELETE` request and provides debug information
  such as the HTTP headers, Query String arguments, and the Request Body.
url: https://echo.getpostman.com/delete
method: DELETE
body:
  type: text
  content: >-
    Donec fermentum, nisi sed cursus eleifend, nulla tortor ultricies tellus, ut
    vehicula orci arcu ut velit. In volutpat egestas dapibus. 

    Morbi condimentum vestibulum sapien. Etiam dignissim diam quis eros lobortis
    gravida vel lobortis est. Etiam gravida sed.
scripts:
  - type: afterResponse
    code: >-
      tests["Body contains files"] = responseBody.has("files");

      tests["Body contains args"] = responseBody.has("args");

      tests["Body contains form"] = responseBody.has("form");

      tests["Body contains headers"] = responseBody.has("headers");

      tests["Body contains url"] = responseBody.has("url");


      var responseJSON;


      try { responseJSON = JSON.parse(responseBody); }

      catch (e) { }


      tests["Data has been passed"] = (responseJSON && responseJSON.data &&
      responseJSON.data.length)
    language: text/javascript
order: 5000
