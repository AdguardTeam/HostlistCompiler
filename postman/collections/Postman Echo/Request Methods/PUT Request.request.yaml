$kind: http-request
description: >+
  The HTTP `PUT` request method is similar to HTTP `POST`. It too is meant to 

  transfer data to a server (and elicit a response). What data is returned
  depends on the implementation

  of the server.


  A `PUT` request can pass parameters to the server using "Query String 

  Parameters", as well as the Request Body. For example, in the following 

  raw HTTP request,


  > PUT /hi/there?hand=wave

  >

  > <request-body>


url: https://echo.getpostman.com/put
method: PUT
body:
  type: text
  content: >-
    Etiam mi lacus, cursus vitae felis et, blandit pellentesque neque.
    Vestibulum eget nisi a tortor commodo dignissim.

    Quisque ipsum ligula, faucibus a felis a, commodo elementum nisl. Mauris
    vulputate sapien et tincidunt viverra. Donec vitae velit nec metus.
scripts:
  - type: afterResponse
    code: >-
      var data;


      try { responseJSON = JSON.parse(responseBody); }

      catch (e) {}


      tests["Body contains files"] = responseBody.has("files");

      tests["Body contains args"] = responseBody.has("args");

      tests["Body contains form"] = responseBody.has("form");

      tests["Body contains headers"] = responseBody.has("headers");

      tests["Body contains url"] = responseBody.has("url");




      tests["Data has been passed"] = (responseJSON && responseJSON.data &&
      responseJSON.data.length)
    language: text/javascript
order: 3000
