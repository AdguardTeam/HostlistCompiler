$kind: http-request
description: >-
  The HTTP `POST` request method is meant to transfer data to a server 

  (and elicit a response). What data is returned depends on the implementation

  of the server.


  A `POST` request can pass parameters to the server using "Query String 

  Parameters", as well as the Request Body. For example, in the following
  request,


  > POST /hi/there?hand=wave

  >

  > <request-body>


  The parameter "hand" has the value "wave". The request body can be in multiple

  formats. These formats are defined by the MIME type of the request. The MIME 

  Type can be set using the ``Content-Type`` HTTP header. The most commonly
  used 

  MIME types are:


  * `multipart/form-data`

  * `application/x-www-form-urlencoded`

  * `application/json`


  This endpoint echoes the HTTP headers, request parameters, the contents of

  the request body and the complete URI requested.
url: https://echo.getpostman.com/post
method: POST
headers:
  Content-Type: text/plain
body:
  type: text
  content: >-
    Duis posuere augue vel cursus pharetra. In luctus a ex nec pretium. Praesent
    neque quam, tincidunt nec leo eget, rutrum vehicula magna.

    Maecenas consequat elementum elit, id semper sem tristique et. Integer
    pulvinar enim quis consectetur interdum volutpat.
scripts:
  - type: afterResponse
    code: >-
      var responseJSON;


      try { responseJSON = JSON.parse(responseBody); }

      catch (e) { }



      tests["response has data"] = responseJSON && responseJSON.data &&
      (responseJSON.data.length === 256);

      tests["content-type equals text/plain"] = responseJSON &&
      responseJSON.headers && (responseJSON.headers["content-type"] ===
      'text/plain');
    language: text/javascript
order: 2000
