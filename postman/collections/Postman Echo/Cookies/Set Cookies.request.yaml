$kind: http-request
description: >-
  The cookie setter endpoint accepts a list of cookies and their values as part
  of URL parameters of a `GET` request. These cookies are saved and can be
  subsequently retrieved or deleted. The response of this request returns a JSON
  with all cookies listed.


  To set your own set of cookies, simply replace the URL parameters
  "foo1=bar1&foo2=bar2" with your own set of key-value pairs.
url: https://echo.getpostman.com/cookies/set?foo1=bar1&foo2=bar2
method: GET
queryParams:
  foo1: bar1
  foo2: bar2
body:
  type: formdata
  content: []
scripts:
  - type: afterResponse
    code: >+
      var responseJSON;

      try {
          tests["Body contains cookies"] = responseBody.has("cookies");
          responseJSON = JSON.parse(responseBody);
          tests["Body contains cookie foo1"] = 'foo1' in responseJSON.cookies;
          tests["Body contains cookie foo2"] = 'foo2' in responseJSON.cookies;    
      }

      catch (e) { }


      tests["Status code is 200"] = responseCode.code === 200;

    language: text/javascript
examples: ./.resources/Set Cookies.resources/examples
order: 1000
