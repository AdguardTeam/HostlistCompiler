$kind: collection
description: >-
  The cookie related endpoints allow one to get, set and delete simple cookies.


  Cookies are small snippets of information that is stored in the browser and
  sent back to the server with every subsequent requests in order to store
  useful information between requests.

  If you want to know more about cookies, read the [HTTP
  Cookie](https://en.wikipedia.org/wiki/HTTP_cookie) article on wikipedia.
order: 3000
