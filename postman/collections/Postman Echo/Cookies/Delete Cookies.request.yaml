$kind: http-request
description: One or more cookies that has been set for this domain can be
  deleted by providing the cookie names as part of the URL parameter. The
  response of this request is a JSON containing the list of currently set
  cookies.
url: https://echo.getpostman.com/cookies/delete?foo1&foo2
method: GET
queryParams:
  foo1: ""
  foo2: ""
body:
  type: formdata
  content: []
scripts:
  - type: afterResponse
    code: >
      var responseJSON;

      try {
          tests["Body contains cookies"] = responseBody.has("cookies");
          responseJSON = JSON.parse(responseBody);
          tests["Body contains cookie foo2"] = !('foo2' in responseJSON.cookies);
          tests["Body does not contain cookie foo2"] = !('foo1' in responseJSON.cookies);
      }

      catch (e) { }


      tests["Status code is 200"] = responseCode.code === 200;
    language: text/javascript
examples: ./.resources/Delete Cookies.resources/examples
order: 2000
