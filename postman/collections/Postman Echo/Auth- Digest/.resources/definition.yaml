$kind: collection
name: "Auth: Digest"
description: >-
  Digest authentication protects an endpoint with a username and password
  without actually transmitting the password over network.

  One has to apply a hash function (like MD5, etc) to the username and password
  before sending them over the network.


  > Username: `postman`

  >

  > Password: `password`


  Unlike Basic-Auth, authentication happens using two consecutive requests where
  the first request returns `401 Unauthorised` along with `WWW-Authenticate`
  header containing information that needs to be used to authenticate subsequent
  calls.


  To know more about digest authentication, refer to the [Digest Access
  Authentication](https://en.wikipedia.org/wiki/Digest_access_authentication)
  wikipedia article.

  The article on [authentication
  helpers](https://www.getpostman.com/docs/helpers#digest-auth) elaborates how
  to use the same within the Postman app.
order: 1000
