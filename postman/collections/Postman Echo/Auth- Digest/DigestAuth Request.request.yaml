$kind: http-request
description: |-
  Performing a simple `GET` request to this endpoint returns status code `401 Unauthorized` with `WWW-Authenticate` header containing information to successfully authenticate subsequent requests.
  The `WWW-Authenticate` header must be processed to extract `realm` and `nonce` values to hash subsequent requests.

  When this request is executed within Postman, the script attached with this request does the hard work of extracting realm and nonce from the header and set it as [global variables](https://www.getpostman.com/docs/environments#global-variables?source=echo-collection-app-onboarding) named `echo_digest_nonce` and `echo_digest_realm`.
  These variables are re-used in subsequent request for seamless integration of the two requests.
url: https://echo.getpostman.com/digest-auth
method: GET
body:
  type: formdata
  content:
    - type: text
      key: code
      value: xWnkliVQJURqB2x1
    - type: text
      key: grant_type
      value: authorization_code
    - type: text
      key: redirect_uri
      value: https://www.getpostman.com/oauth2/callback
    - type: text
      key: client_id
      value: abc123
    - type: text
      key: client_secret
      value: ssh-secret
scripts:
  - type: afterResponse
    code: >-
      tests["response code is 401"] = responseCode.code === 401;

      tests["response has WWW-Authenticate header"] =
      (postman.getResponseHeader('WWW-Authenticate'));


      var authenticateHeader = postman.getResponseHeader('WWW-Authenticate'),
          realmStart = authenticateHeader.indexOf('"',authenticateHeader.indexOf("realm")) + 1 ,
          realmEnd = authenticateHeader.indexOf('"',realmStart),
          realm = authenticateHeader.slice(realmStart,realmEnd),
          nonceStart = authenticateHeader.indexOf('"',authenticateHeader.indexOf("nonce")) + 1,
          nonceEnd = authenticateHeader.indexOf('"',nonceStart),
          nonce = authenticateHeader.slice(nonceStart,nonceEnd);

          
      postman.setGlobalVariable('echo_digest_realm', realm);

      postman.setGlobalVariable('echo_digest_nonce', nonce);
    language: text/javascript
order: 1000
