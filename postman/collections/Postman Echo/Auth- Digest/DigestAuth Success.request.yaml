$kind: http-request
description: |-
  This endpoint sends a hashed Digest Authorization header to gain access to a valid `200 Ok` response code. In Postman, it uses the stored [global variables](https://www.getpostman.com/docs/environments#gloval-variables?source=echo-collection-app-onboarding), `echo_digest_realm` and `echo_digest_nonce`, to generate the hashed authorisation header.

  Within Postman, for this request to successfully authenticate, running the previous request "DigestAuth Request" stores the relevant information within the global variables.
url: https://echo.getpostman.com/digest-auth
method: GET
headers:
  Authorization: Digest username="postman", realm="Users",
    nonce="ni1LiL0O37PRRhofWdCLmwFsnEtH1lew", uri="/digest-auth",
    response="254679099562cf07df9b6f5d8d15db44", opaque=""
body:
  type: formdata
  content: []
auth:
  type: digest
  credentials:
    algorithm: MD5
    username: postman
    realm: "{{echo_digest_realm}}"
    password: password
    nonce: "{{echo_digest_nonce}}"
    nonceCount: ""
    clientNonce: ""
    opaque: ""
    qop: ""
scripts:
  - type: afterResponse
    code: |-
      tests["response code is 200"] = responseCode.code === 200;
      tests["body contains authenticated"] = responseBody.has("authenticated");
    language: text/javascript
examples: ./.resources/DigestAuth Success.resources/examples
order: 2000
