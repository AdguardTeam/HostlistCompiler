$kind: http-request
description: >-
  This endpoint allows one to instruct the server which status code to respond
  with.


  Every response is accompanied by a status code. The status code provides a
  summary of the nature of response sent by the server. For example, a status
  code of `200` means everything is okay with the response and a code of `404`
  implies that the requested URL does not exist on server. 

  A list of all valid HTTP status code can be found at the [List of Status
  Codes](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes) wikipedia
  article. When using Postman, the response status code is described for easy
  reference.


  Note that if an invalid status code is requested to be sent, the server
  returns a status code of `400 Bad Request`.
url: https://echo.getpostman.com/status/200
method: GET
body:
  type: formdata
  content: []
scripts:
  - type: afterResponse
    code: |+
      var responseJSON;
      try {
          responseJSON = JSON.parse(responseBody); 
          tests["Status equals 200"] = responseJSON.status === 200;
      }
      catch (e) { }
      tests["Body contains status"] = responseBody.has("status");

    language: text/javascript
order: 1000
