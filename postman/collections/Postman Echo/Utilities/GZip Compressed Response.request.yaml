$kind: http-request
description: >-
  This endpoint returns the response using [gzip compression
  algoritm](https://en.wikipedia.org/wiki/Gzip).

  The uncompressed response is a JSON string containing the details of the
  request sent by the client. For this endpoint to work, one should request with
  `Accept-encoding` header containing `gzip` as part of its value. Postman
  supports gzip, deflate and SDCH decoding and automatically sends them as part
  of the request.


  HTTP Compression allows the server to send responses in a compressed format,
  which is uncompressed by the client before processing. This reduces network
  bandwidth consumption at the cost of increase in CPU usage.

  To know more about this, refer the [HTTP
  Compression](https://en.wikipedia.org/wiki/HTTP_compression) wikipedia
  article.
url: https://echo.getpostman.com/gzip
method: GET
body:
  type: formdata
  content: []
scripts:
  - type: afterResponse
    code: |-
      try {
          var data = JSON.parse(responseBody);
          tests["Body contains gzipped"] = responseBody.has("gzipped");
          tests["Body contains headers"] = responseBody.has("headers");
          tests["Body contains method"] = responseBody.has("method");
      }
      catch(e) {
          console.log('Cannot parse response,probably not a JSON');
      }
      tests["response code is 200"] = responseCode.code === 200;
    language: text/javascript
order: 5000
