$kind: http-request
description: >-
  This endpoint allows one to recieve streaming http response using [chunked
  transfer encoding](https://en.wikipedia.org/wiki/Chunked_transfer_encoding) of
  a configurable length.


  A streaming response does not wait for the entire response to be generated on
  server before flushing it out. This implies that for a fairly large response,
  parts of it can be streamed to the requestee as and when it is generated on
  server. The client can then take actions of processing this partially received
  data.
url: https://echo.getpostman.com/stream/10
method: GET
body:
  type: formdata
  content: []
scripts:
  - type: afterResponse
    code: >
      tests["response code is 200"] = responseCode.code === 200;

      tests["response is sent in chunks"] =
      (postman.getResponseHeader('Transfer-Encoding') === 'chunked')
    language: text/javascript
order: 2000
