$kind: http-request
description: |-
  A `GET` request to this endpoint returns the list of all request headers as part of the response JSON.
  In Postman, sending your own set of headers through the [Headers tab](https://www.getpostman.com/docs/requests#headers?source=echo-collection-app-onboarding) will reveal the headers as part of the response.
url: https://echo.getpostman.com/headers
method: GET
headers:
  my-sample-header: Lorem ipsum dolor sit amet
body:
  type: formdata
  content: []
scripts:
  - type: afterResponse
    code: >+
      var responseJSON;

      try {
          tests["Body contains headers"] = responseBody.has("headers");
          responseJSON = JSON.parse(responseBody);
          tests["Header contains host"] = "host" in responseJSON.headers;
          tests["Header contains test parameter sent as part of request header"] = "my-sample-header" in responseJSON.headers;
      }

      catch (e) { }



    language: text/javascript
order: 1000
