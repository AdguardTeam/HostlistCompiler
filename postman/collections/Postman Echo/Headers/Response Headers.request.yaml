$kind: http-request
description: >-
  This endpoint causes the server to send custom set of response headers.
  Providing header values as part of the URL parameters of a `GET` request to
  this endpoint returns the same as part of response header.


  To send your own set of headers, simply add or replace the the URL parameters
  with your own set.
url: https://echo.getpostman.com/response-headers?Content-Type=text/html&test=response_headers
method: GET
queryParams:
  Content-Type: text/html
  test: response_headers
body:
  type: formdata
  content: []
scripts:
  - type: afterResponse
    code: >-
      tests["Body contains Content-Type"] = responseBody.has("Content-Type");

      tests["response headers have key sent as part of request"] =
      (postman.getResponseHeader('test') == 'response_headers')
    language: text/javascript
order: 2000
