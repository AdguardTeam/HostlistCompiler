$kind: http-example
name: ErrorResponse
request:
  url: "{{baseUrl}}/v3/marketdata/options/strikes/:underlying?spreadType=Single&s\
    trikeInterval=1&expiration=<dateTime>&expiration2=<dateTime>"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: spreadType
      value: Single
      description: The name of the spread type to get the strikes for. This value can
        be obtained from the [Get Option Spread
        Types](#operation/GetOptionSpreadTypes) endpoint.
    - key: strikeInterval
      value: "1"
      description: Specifies the desired interval between the strike prices in a
        spread. It must be greater than or equal to 1. A value of 1 uses
        consecutive strikes; a value of 2 skips one between strikes; and so on.
    - key: expiration
      value: <dateTime>
      description: Date on which the option contract expires; must be a valid
        expiration date. Defaults to the next contract expiration date.
    - key: expiration2
      value: <dateTime>
      description: Second contract expiration date required for Calendar and Diagonal
        spreads.
  pathVariables:
    underlying: ""
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "Error": "<string>",
        "Message": "<string>"
      }
order: 5000
