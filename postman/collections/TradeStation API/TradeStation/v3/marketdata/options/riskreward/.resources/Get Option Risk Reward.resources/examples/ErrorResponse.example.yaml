$kind: http-example
request:
  url: "{{baseUrl}}/v3/marketdata/options/riskreward"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "SpreadPrice": "<double>",
        "Legs": [
          {
            "Symbol": "<string>",
            "Quantity": "<integer>",
            "TradeAction": "BUY"
          },
          {
            "Symbol": "<string>",
            "Quantity": "<integer>",
            "TradeAction": "BUY"
          }
        ]
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "Error": "<string>",
        "Message": "<string>"
      }
order: 2000
