$kind: http-example
request:
  url: "{{baseUrl}}/v3/marketdata/options/spreadtypes"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "Error": "<string>",
        "Message": "<string>"
      }
order: 2000
