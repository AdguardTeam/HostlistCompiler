$kind: http-example
request:
  url: "{{baseUrl}}/v3/marketdata/barcharts/:symbol?interval=<string>&unit=<strin\
    g>&barsback=<string>&firstdate=<string>&lastdate=<string>&sessiontemplate=<\
    string>&startdate=<string>"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: interval
      value: <string>
      description: "Default: `1`.  Interval that each bar will consist of -  for
        minute bars, the number of minutes aggregated in a single bar.  For bar
        units other than minute, value must be `1`.  For unit `Minute` the max
        allowed `Interval` is 1440."
    - key: unit
      value: <string>
      description: "Default: `Daily`. The unit of time for each bar interval. Valid
        values are: `Minute, Daily, Weekly, Monthly`."
    - key: barsback
      value: <string>
      description: "Default: `1`.  Number of bars back to fetch (or retrieve). The
        maximum number of intraday bars back that a user can query is 57,600.
        There is no limit on daily, weekly, or monthly bars. This parameter is
        mutually exclusive with `firstdate`"
    - key: firstdate
      value: <string>
      description: Does not have a default value. The first date formatted as
        `YYYY-MM-DD`,`2020-04-20T18:00:00Z`. This parameter is mutually
        exclusive with `barsback`.
    - key: lastdate
      value: <string>
      description: Defaults to current timestamp. The last date formatted as
        `YYYY-MM-DD`,`2020-04-20T18:00:00Z`. This parameter is mutually
        exclusive with `startdate` and should be used instead of that parameter,
        since `startdate` is now deprecated.
    - key: sessiontemplate
      value: <string>
      description: >-
        United States (US) stock market session templates, that extend bars
        returned to include 

        those outside of the regular trading session. Ignored for non-US equity
        symbols. Valid values are:

        `USEQPre`, `USEQPost`, `USEQPreAndPost`, `USEQ24Hour`,`Default`.
    - key: startdate
      value: <string>
      description: Defaults to current timestamp. The last date formatted as
        `YYYY-MM-DD`,`2020-04-20T18:00:00Z`. This parameter is mutually
        exclusive with `lastdate`. This parameter is deprecated; use `lastdate`
        instead of `startdate`.
  pathVariables:
    symbol: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "Bars": [
          {
            "Close": "<string>",
            "DownTicks": "<integer>",
            "DownVolume": "<integer>",
            "Epoch": "<long>",
            "High": "<string>",
            "IsEndOfHistory": "<boolean>",
            "IsRealtime": "<boolean>",
            "Low": "<string>",
            "Open": "<string>",
            "OpenInterest": "<string>",
            "TimeStamp": {},
            "TotalTicks": "<integer>",
            "TotalVolume": "<string>",
            "UnchangedTicks": "<integer>",
            "UnchangedVolume": "<integer>",
            "UpTicks": "<integer>",
            "UpVolume": "<integer>",
            "BarStatus": "<string>"
          },
          {
            "Close": "<string>",
            "DownTicks": "<integer>",
            "DownVolume": "<integer>",
            "Epoch": "<long>",
            "High": "<string>",
            "IsEndOfHistory": "<boolean>",
            "IsRealtime": "<boolean>",
            "Low": "<string>",
            "Open": "<string>",
            "OpenInterest": "<string>",
            "TimeStamp": {},
            "TotalTicks": "<integer>",
            "TotalVolume": "<string>",
            "UnchangedTicks": "<integer>",
            "UnchangedVolume": "<integer>",
            "UpTicks": "<integer>",
            "UpVolume": "<integer>",
            "BarStatus": "<string>"
          }
        ]
      }
order: 1000
