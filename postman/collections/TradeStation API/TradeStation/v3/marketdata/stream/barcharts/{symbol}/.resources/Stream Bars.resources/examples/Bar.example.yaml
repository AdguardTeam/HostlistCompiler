$kind: http-example
request:
  url: "{{baseUrl}}/v3/marketdata/stream/barcharts/:symbol?interval=1&unit=Daily&\
    barsback=<string>&sessiontemplate=<string>"
  method: GET
  headers:
    - key: Accept
      value: application/vnd.tradestation.streams.v2+json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: interval
      value: "1"
      description: >-
        Interval that each bar will consist of -  for minute bars, the number of

        minutes aggregated in a single bar. For bar units other than minute,
        value must be `1`.
    - key: unit
      value: Daily
      description: "Unit of time for each bar interval. Valid values are: `minute`,
        `daily`, `weekly`, and `monthly`."
    - key: barsback
      value: <string>
      description: The bars back - the max value is 57600.
    - key: sessiontemplate
      value: <string>
      description: >-
        United States (US) stock market session templates, that extend bars
        returned to include 

        those outside of the regular trading session. Ignored for non-US equity
        symbols. Valid values are:

        `USEQPre`, `USEQPost`, `USEQPreAndPost`, `USEQ24Hour`, `Default`.
  pathVariables:
    symbol: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/vnd.tradestation.streams.v2+json
  body:
    type: json
    content: |-
      {
        "Close": "<string>",
        "DownTicks": "<integer>",
        "DownVolume": "<integer>",
        "Epoch": "<long>",
        "High": "<string>",
        "IsEndOfHistory": "<boolean>",
        "IsRealtime": "<boolean>",
        "Low": "<string>",
        "Open": "<string>",
        "OpenInterest": "<string>",
        "TimeStamp": {},
        "TotalTicks": "<integer>",
        "TotalVolume": "<string>",
        "UnchangedTicks": "<integer>",
        "UnchangedVolume": "<integer>",
        "UpTicks": "<integer>",
        "UpVolume": "<integer>",
        "BarStatus": "<string>"
      }
order: 1000
