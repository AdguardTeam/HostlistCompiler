$kind: http-request
description: Streams marketdata bars for the given symbol, interval, and timeframe.
url: "{{baseUrl}}/v3/marketdata/stream/barcharts/:symbol?interval=1&unit=Daily&\
  barsback=<string>&sessiontemplate=<string>"
method: GET
headers:
  Accept: application/vnd.tradestation.streams.v2+json
queryParams:
  - key: interval
    value: "1"
    description: >-
      Interval that each bar will consist of -  for minute bars, the number of

      minutes aggregated in a single bar. For bar units other than minute, value
      must be `1`.
  - key: unit
    value: Daily
    description: "Unit of time for each bar interval. Valid values are: `minute`,
      `daily`, `weekly`, and `monthly`."
  - key: barsback
    value: <string>
    description: The bars back - the max value is 57600.
  - key: sessiontemplate
    value: <string>
    description: >-
      United States (US) stock market session templates, that extend bars
      returned to include 

      those outside of the regular trading session. Ignored for non-US equity
      symbols. Valid values are:

      `USEQPre`, `USEQPost`, `USEQPreAndPost`, `USEQ24Hour`, `Default`.
pathVariables:
  - key: symbol
    value: <string>
    description: (Required) The valid symbol string.
examples: ./.resources/Stream Bars.resources/examples
order: 1000
