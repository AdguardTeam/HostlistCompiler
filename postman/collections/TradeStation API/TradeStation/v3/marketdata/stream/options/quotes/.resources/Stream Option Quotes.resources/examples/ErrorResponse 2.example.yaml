$kind: http-example
name: ErrorResponse
request:
  url: "{{baseUrl}}/v3/marketdata/stream/options/quotes?legs[0].Symbol=<string>&l\
    egs[0].Ratio=1&riskFreeRate=<double>&enableGreeks=true"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: legs[0].Symbol
      value: <string>
      description: >-
        (Required) * `legs`: Individual components of a multi-part trade.

        * `[0]`: Represents the position in the legs array.

        * `Symbol`: Option contract symbol or underlying symbol to be traded for
        this leg. In some cases, the space in an option symbol may need to be
        explicitly URI encoded as %20, such as `MSFT%20220916C305`.
    - key: legs[0].Ratio
      value: "1"
      description: >-
        * `legs`: Individual components of a multi-part trade.

        * `[0]`: Represents the position in the legs array.

        * `Ratio`: The number of option contracts or underlying shares for this
        leg, relative to the other legs. Use a positive number to represent a
        buy trade and a negative number to represent a sell trade. For example,
        a quote for a Butterfly spread can be requested using ratios of 1, -2,
        and 1: buy 1 contract of the first leg, sell 2 contracts of the second
        leg, and buy 1 contract of the third leg.
    - key: riskFreeRate
      value: <double>
      description: The theoretical rate of return of an investment with zero risk.
        Defaults to the current quote for $IRX.X. The percentage rate should be
        specified as a decimal value. For example, to use 2% for the rate, pass
        in 0.02.
    - key: enableGreeks
      value: "true"
      description: Specifies whether or not greeks properties are returned.
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "Error": "<string>",
        "Message": "<string>"
      }
order: 4000
