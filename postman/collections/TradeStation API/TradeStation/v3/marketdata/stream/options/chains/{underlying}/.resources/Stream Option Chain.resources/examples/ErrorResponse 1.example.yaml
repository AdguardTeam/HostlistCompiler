$kind: http-example
name: ErrorResponse
request:
  url: "{{baseUrl}}/v3/marketdata/stream/options/chains/:underlying?expiration=<d\
    ateTime>&expiration2=<dateTime>&strikeProximity=5&spreadType=Single&riskFre\
    eRate=<double>&priceCenter=<double>&strikeInterval=1&enableGreeks=true&stri\
    keRange=All&optionType=All"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: expiration
      value: <dateTime>
      description: Date on which the option contract expires; must be a valid
        expiration date. Defaults to the next contract expiration date.
    - key: expiration2
      value: <dateTime>
      description: Second contract expiration date required for Calendar and Diagonal
        spreads.
    - key: strikeProximity
      value: "5"
      description: Specifies the number of spreads to display above and below the
        priceCenter.
    - key: spreadType
      value: Single
      description: Specifies the name of the spread type to use.
    - key: riskFreeRate
      value: <double>
      description: The theoretical rate of return of an investment with zero risk.
        Defaults to the current quote for $IRX.X. The percentage rate should be
        specified as a decimal value. For example, to use 2% for the rate, pass
        in 0.02.
    - key: priceCenter
      value: <double>
      description: Specifies the strike price center. Defaults to the last quoted
        price for the underlying security.
    - key: strikeInterval
      value: "1"
      description: Specifies the desired interval between the strike prices in a
        spread. It must be greater than or equal to 1. A value of 1 uses
        consecutive strikes; a value of 2 skips one between strikes; and so on.
    - key: enableGreeks
      value: "true"
      description: Specifies whether or not greeks properties are returned.
    - key: strikeRange
      value: All
      description: >-
        * If the filter is `ITM` (in-the-money), the chain includes only spreads
        that have an intrinsic value greater than zero.

        * If the filter is `OTM` (out-of-the-money), the chain includes only
        spreads that have an intrinsic value equal to zero.
    - key: optionType
      value: All
      description: Filters the spreads by a specific option type. Valid values are
        `All`, `Call`, and `Put`.
  pathVariables:
    underlying: ""
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "Error": "<string>",
        "Message": "<string>"
      }
order: 3000
