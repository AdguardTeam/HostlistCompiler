$kind: http-example
request:
  url: "{{baseUrl}}/v3/marketdata/symbollists/cryptopairs/symbolnames"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "SymbolNames": [
          "<string>",
          "<string>"
        ]
      }
order: 1000
