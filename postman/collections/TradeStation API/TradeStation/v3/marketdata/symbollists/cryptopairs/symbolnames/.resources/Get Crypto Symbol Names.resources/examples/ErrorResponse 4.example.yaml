$kind: http-example
name: ErrorResponse
request:
  url: "{{baseUrl}}/v3/marketdata/symbollists/cryptopairs/symbolnames"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "Error": "<string>",
        "Message": "<string>"
      }
order: 6000
