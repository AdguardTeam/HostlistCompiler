$kind: http-request
description: >-
  Replaces an active order with a modified version of that order. You cannot
  update an order that has been filled.

  Request valid for `Cash`, `Margin`, `Futures`, and `DVP` account types.
url: "{{baseUrl}}/v3/orderexecution/orders/:orderID"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: orderID
    value: <string>
    description: (Required) OrderID for order to replace. Equity, option or future
      orderIDs should not include dashes (E.g. `1-2345-6789`). Valid format
      orderId=`123456789`
body:
  type: json
  content: |-
    {
      "LimitPrice": "<string>",
      "StopPrice": "<string>",
      "OrderType": "<string>",
      "Quantity": "<string>",
      "AdvancedOptions": {
        "ShowOnlyQuantity": "<string>",
        "TrailingStop": {
          "Amount": "<string>",
          "Percent": "<string>"
        },
        "MarketActivationRules": {
          "ClearAll": "<boolean>",
          "Rules": [
            {
              "RuleType": "<string>",
              "Symbol": "<string>",
              "Predicate": "<string>",
              "TriggerKey": "DTTN",
              "Price": "<string>",
              "LogicOperator": "Or"
            },
            {
              "RuleType": "<string>",
              "Symbol": "<string>",
              "Predicate": "<string>",
              "TriggerKey": "DAB",
              "Price": "<string>",
              "LogicOperator": "Or"
            }
          ]
        },
        "TimeActivationRules": {
          "ClearAll": "<boolean>",
          "Rules": [
            {
              "TimeUtc": {}
            },
            {
              "TimeUtc": {}
            }
          ]
        }
      }
    }
examples: ./.resources/Replace Order.resources/examples
order: 1000
