$kind: http-request
description: >-
  Returns estimated cost and commission information for an order without the
  order actually being placed. Request valid for `Market`, `Limit`, `Stop
  Market`, `Stop Limit`, `Options`, and

  `Order Sends Order (OSO)` order types.

  The fields that are returned in the response depend on the order type. The
  following shows the different fields that will be returned.


  **Base Confirmation**  (All confirmations will have these fields)

  * Route

  * Duration

  * Account

  * SummaryMessage


  **Equity Confirmation** (Base Confirmation fields + the following)

  * EstimatedPrice

  * EstimatedPriceDisplay

  * EstimatedCost

  * EstimatedCostDisplay

  * EstimatedCommission

  * EstimatedCommissionDisplay

  * DebitCreditEstimatedCost

  * DebitCreditEstimatedCostDisplay

  * OrderConfirmId


  **Futures Confirmation** (Base Confirmation fields + the following)

  * ProductCurrency

  * AccountCurrency

  * EstimatedCost

  * EstimatedPrice

  * EstimatedPriceDisplay

  * InitialMarginDisplay

  * EstimatedCommission

  * EstimatedCommissionDisplay

  * OrderConfirmId
url: "{{baseUrl}}/v3/orderexecution/orderconfirm"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
