$kind: http-example
request:
  url: "{{baseUrl}}/v3/brokerage/stream/accounts/:accounts/positions?changes=false"
  method: GET
  headers:
    - key: Accept
      value: application/vnd.tradestation.streams.v3+json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: changes
      value: "false"
      description: A boolean value that specifies whether or not position updates are
        streamed as changes. When a stream is first opened with
        `"changes=true"`, streaming positions will return the full snapshot
        first for all positions, and then any changes after that. When
        `"changes=true"`, the PositionID field is returned with each change,
        along with the fields that changed.
  pathVariables:
    accounts: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/vnd.tradestation.streams.v3+json
  body:
    type: json
    content: |-
      {
        "AccountID": "<string>",
        "AssetType": "FUTURE",
        "AveragePrice": "<string>",
        "Bid": "<string>",
        "Ask": "<string>",
        "ConversionRate": "<string>",
        "Deleted": "<boolean>",
        "DayTradeRequirement": "<string>",
        "ExpirationDate": "<string>",
        "InitialRequirement": "<string>",
        "MaintenanceMargin": "<string>",
        "Last": "<string>",
        "LongShort": "Long",
        "MarkToMarketPrice": "<string>",
        "MarketValue": "<string>",
        "PositionID": "<string>",
        "Quantity": "<string>",
        "Symbol": "<string>",
        "Timestamp": "<dateTime>",
        "TodaysProfitLoss": "<string>",
        "TotalCost": "<string>",
        "UnrealizedProfitLoss": "<string>",
        "UnrealizedProfitLossPercent": "<string>",
        "UnrealizedProfitLossQty": "<string>"
      }
order: 1000
