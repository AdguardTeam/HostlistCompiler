$kind: http-request
description: Stream orders for the given accounts and orders. Request valid for
  `Cash`, `Margin`, `Futures`, and `DVP` account types.
url: "{{baseUrl}}/v3/brokerage/stream/accounts/:accounts/orders/:ordersIds"
method: GET
headers:
  Accept: application/vnd.tradestation.streams.v3+json
pathVariables:
  - key: accounts
    value: <string>
    description: (Required) List of valid Account IDs for the authenticated user in
      comma separated format; for example `"61999124,68910124"`. 1 to 25 account
      IDs can be specified, comma separated.
  - key: ordersIds
    value: <string>
    description: (Required) List of valid Order IDs for the account IDs in comma
      separated format; for example `"812767578,812941051"`. 1 to 50 order IDs
      can be specified, comma separated.
examples: ./.resources/Stream Orders by Order Id.resources/examples
order: 1000
