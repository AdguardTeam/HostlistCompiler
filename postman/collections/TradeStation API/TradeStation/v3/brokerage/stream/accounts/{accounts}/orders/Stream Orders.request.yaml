$kind: http-request
description: Stream orders for the given accounts. Request valid for `Cash`,
  `Margin`, `Futures`, and `DVP` account types.
url: "{{baseUrl}}/v3/brokerage/stream/accounts/:accounts/orders"
method: GET
headers:
  Accept: application/vnd.tradestation.streams.v3+json
pathVariables:
  - key: accounts
    value: <string>
    description: (Required) List of valid Account IDs for the authenticated user in
      comma separated format; for example `"61999124,68910124"`. 1 to 25 Account
      IDs can be specified, comma separated.
examples: ./.resources/Stream Orders.resources/examples
order: 2000
