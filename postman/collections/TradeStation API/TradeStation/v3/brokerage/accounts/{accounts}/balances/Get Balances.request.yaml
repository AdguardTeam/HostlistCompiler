$kind: http-request
description: Fetches the brokerage account `Balances` for one or more given
  accounts. Request valid for `Cash`, `Margin`, `Futures`, and `DVP` account
  types.
url: "{{baseUrl}}/v3/brokerage/accounts/:accounts/balances"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: accounts
    value: <string>
    description: (Required) List of valid Account IDs for the authenticated user in
      comma separated format; for example `"61999124,68910124"`. 1 to 25 Account
      IDs can be specified, comma separated. Recommended batch size is 10.
examples: ./.resources/Get Balances.resources/examples
order: 1000
