$kind: http-example
name: ErrorResponse
request:
  url: "{{baseUrl}}/v3/brokerage/accounts/:accounts/historicalorders/:orderIds?si\
    nce=<string>"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: since
      value: <string>
      description: (Required) Historical orders since date. For example
        `"2006-01-13","01-13-2006","2006/01/13","01/13/2006"`. Limited to 90
        days prior to the current date.
  pathVariables:
    accounts: ""
    orderIds: ""
response:
  statusCode: 504
  statusText: Gateway Timeout
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "Error": "<string>",
        "Message": "<string>"
      }
order: 8000
