$kind: http-example
name: ErrorResponse
request:
  url: "{{baseUrl}}/v3/brokerage/accounts/:accounts/historicalorders?since=<strin\
    g>&pageSize=600&nextToken=<string>"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: since
      value: <string>
      description: (Required) Historical orders since date. For example
        `"2006-01-13","01-13-2006","2006/01/13","01/13/2006"`. Limited to 90
        days prior to the current date.
    - key: pageSize
      value: "600"
      description: The number of requests returned per page when paginating responses.
        If not provided, results will not be paginated and a maximum of 600
        orders is returned.
    - key: nextToken
      value: <string>
      description: An encrypted token with a lifetime of 1 hour for use with paginated
        order responses. This is returned with paginated results, and used in
        only the subsequent request which will return a new nextToken until
        there are fewer returned orders than the requested pageSize. If the
        number of returned orders equals the pageSize, and there are no
        additional orders, the nextToken will not be generated.
  pathVariables:
    accounts: ""
response:
  statusCode: 504
  statusText: Gateway Timeout
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "Error": "<string>",
        "Message": "<string>"
      }
order: 8000
