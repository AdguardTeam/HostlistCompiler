$kind: http-example
name: ErrorResponse
request:
  url: "{{baseUrl}}/v3/brokerage/accounts/:accounts/bodbalances"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    accounts: ""
response:
  statusCode: 504
  statusText: Gateway Timeout
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "Error": "<string>",
        "Message": "<string>"
      }
order: 8000
