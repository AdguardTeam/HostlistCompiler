$kind: http-request
description: Fetches Historical Orders for the given Accounts except open
  orders, sorted in descending order of time closed. Request valid for all
  account types.
url: "{{baseUrl}}/v3/brokerage/accounts/:accounts/historicalorders?since=<strin\
  g>&pageSize=600&nextToken=<string>"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: since
    value: <string>
    description: (Required) Historical orders since date. For example
      `"2006-01-13","01-13-2006","2006/01/13","01/13/2006"`. Limited to 90 days
      prior to the current date.
  - key: pageSize
    value: "600"
    description: The number of requests returned per page when paginating responses.
      If not provided, results will not be paginated and a maximum of 600 orders
      is returned.
  - key: nextToken
    value: <string>
    description: An encrypted token with a lifetime of 1 hour for use with paginated
      order responses. This is returned with paginated results, and used in only
      the subsequent request which will return a new nextToken until there are
      fewer returned orders than the requested pageSize. If the number of
      returned orders equals the pageSize, and there are no additional orders,
      the nextToken will not be generated.
pathVariables:
  - key: accounts
    value: <string>
    description: (Required) List of valid Account IDs for the authenticated user in
      comma separated format; for example `"61999124,68910124"`. 1 to 25 Account
      IDs can be specified, comma separated. Recommended batch size is 10.
examples: ./.resources/Get Historical Orders.resources/examples
order: 2000
