$kind: http-request
description: Fetches Historical Orders for the given Accounts except open
  orders, filtered by given Order IDs prior to current date, sorted in
  descending order of time closed. Request valid for all account types.
url: "{{baseUrl}}/v3/brokerage/accounts/:accounts/historicalorders/:orderIds?si\
  nce=<string>"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: since
    value: <string>
    description: (Required) Historical orders since date. For example
      `"2006-01-13","01-13-2006","2006/01/13","01/13/2006"`. Limited to 90 days
      prior to the current date.
pathVariables:
  - key: accounts
    value: <string>
    description: (Required) List of valid Account IDs for the authenticated user in
      comma separated format; for example `"61999124,68910124"`. 1 to 25 Account
      IDs can be specified, comma separated. Recommended batch size is 10.
  - key: orderIds
    value: <string>
    description: (Required) List of valid Order IDs for the authenticated user for
      given accounts in comma separated format; for example
      `"123456789,286179863"`. 1 to 50 Order IDs can be specified, comma
      separated.
examples: ./.resources/Get Historical Orders By Order ID.resources/examples
order: 1000
