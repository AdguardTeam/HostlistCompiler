$kind: http-example
request:
  url: {{baseUrl}}/workflow/status/:workflowType/:instanceId
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: workflowType
      value: batch-compilation
      description: Type of workflow
    - key: instanceId
      value: string
      description: Workflow instance ID
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": true,
        "workflowId": "string",
        "workflowType": "string",
        "status": "paused",
        "output": {},
        "error": "string"
      }
order: 1000
