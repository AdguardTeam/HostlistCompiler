$kind: http-request
description: Deletes all cache entries from storage tables
url: {{baseUrl}}/admin/storage/clear-cache
method: POST
headers:
  Accept: application/json
body:
  type: text
  content: ""
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Clear cache entries.resources/examples
order: 1000
