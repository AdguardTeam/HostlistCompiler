$kind: http-example
request:
  url: http://{{baseUrl}}/admin/auth/users
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: X-Admin-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "email": "uCtjq1Fo@zlfebvCyvh.pk",
        "displayName": "string",
        "role": "user"
      }
response:
  statusCode: 409
  statusText: Conflict
  body:
    type: text
    content: ""
order: 4000
