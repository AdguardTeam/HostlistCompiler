$kind: http-example
request:
  url: {{baseUrl}}/admin/auth/users
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: X-Admin-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "email": "uCtjq1Fo@zlfebvCyvh.pk",
        "displayName": "string",
        "role": "user"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "error": "Invalid request body"
      }
order: 2000
