$kind: http-example
request:
  url: http://{{baseUrl}}/admin/auth/api-keys
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: X-Admin-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "userId": "a87249ae-4d1e-96e4-01e7-d8b2402b48b7",
        "name": "string",
        "scopes": [
          "string",
          "string"
        ],
        "rateLimitPerMinute": 8826,
        "expiresAt": "1950-10-17T03:27:36.037Z"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "error": "string"
      }
order: 3000
