$kind: http-example
request:
  url: {{baseUrl}}/admin/auth/api-keys/revoke
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: X-Admin-Key
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "apiKeyId": "5e60927e-5a7b-7fa6-5f0d-9ff69e523ef7",
        "keyPrefix": "string"
      }
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 4000
