$kind: http-request
description: Validates an API key without authenticating a full request. Useful
  for the admin UI to test keys.
url: {{baseUrl}}/admin/auth/api-keys/validate
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "apiKey": "string"
    }
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Validate API key.resources/examples
order: 1000
