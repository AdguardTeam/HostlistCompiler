$kind: http-request
description: |
  Creates a new API key for a user. Requires Hyperdrive (PostgreSQL) binding.

  **Important:** The raw API key is only returned once. Store it securely.
url: {{baseUrl}}/admin/auth/api-keys
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "userId": "a87249ae-4d1e-96e4-01e7-d8b2402b48b7",
      "name": "string",
      "scopes": [
        "string",
        "string"
      ],
      "rateLimitPerMinute": 8826,
      "expiresAt": "1950-10-17T03:27:36.037Z"
    }
auth:
  type: apikey
  credentials:
    key: X-Admin-Key
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Create API key.resources/examples
order: 1000
