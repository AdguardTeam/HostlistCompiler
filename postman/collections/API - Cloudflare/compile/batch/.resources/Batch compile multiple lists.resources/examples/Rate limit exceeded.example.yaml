$kind: http-example
request:
  url: {{baseUrl}}/compile/batch
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "requests": [
          {
            "id": "string",
            "configuration": {
              "name": "string",
              "sources": [
                {
                  "source": "string",
                  "name": "string",
                  "type": "adblock",
                  "transformations": [
                    "RemoveComments",
                    "Validate"
                  ],
                  "exclusions": [
                    "string",
                    "string"
                  ],
                  "inclusions": [
                    "string",
                    "string"
                  ]
                }
              ],
              "description": "string",
              "homepage": "http://asfXpWQCbDKhQBtiTAqWxxnRD.egdFswh-E2qG",
              "license": "string",
              "version": "string",
              "transformations": [
                "RemoveModifiers",
                "InsertFinalNewLine"
              ],
              "exclusions": [
                "string",
                "string"
              ],
              "exclusions_sources": [
                "string",
                "string"
              ],
              "inclusions": [
                "string",
                "string"
              ],
              "inclusions_sources": [
                "string",
                "string"
              ]
            },
            "preFetchedContent": {
              "key_0": "string",
              "key_1": "string",
              "key_2": "string"
            },
            "benchmark": true
          }
        ]
      }
response:
  statusCode: 429
  statusText: Too Many Requests
  headers:
    - key: Content-Type
      value: application/json
    - key: Retry-After
      value: "370"
      description: Seconds until retry allowed
  body:
    type: json
    content: |-
      {
        "success": false,
        "error": "Rate limit exceeded. Maximum 10 requests per minute."
      }
order: 3000
