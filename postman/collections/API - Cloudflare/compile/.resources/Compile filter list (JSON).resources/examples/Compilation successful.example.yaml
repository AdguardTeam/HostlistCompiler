    content: |-
      {
        "configuration": {
          "name": "My Filter List",
          "sources": [
            {
              "source": "https://example.com/filters.txt",
              "transformations": [
                "RemoveComments",
                "Validate"
              ]
            }
          ],
          "transformations": [
            "Deduplicate"
          ]
        }
      }
