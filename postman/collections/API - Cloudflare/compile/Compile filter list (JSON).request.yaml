$kind: http-request
description: >
  Compile filter lists and return results as JSON. Results are cached for 1
  hour.

  Supports request deduplication for concurrent identical requests.
url: {{baseUrl}}/compile
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "configuration": {
        "name": "My Filter List",
        "sources": [
          {
            "source": "https://example.com/filters.txt",
            "transformations": [
              "RemoveComments",
              "Validate"
            ]
          }
        ],
        "transformations": [
          "Deduplicate"
        ]
      }
    }
examples: ./.resources/Compile filter list (JSON).resources/examples
order: 1000
