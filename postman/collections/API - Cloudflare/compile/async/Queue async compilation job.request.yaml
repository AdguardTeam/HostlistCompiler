$kind: http-request
description: >
  Queue a compilation job for asynchronous processing. Returns immediately with
  a request ID.

  Use GET /queue/results/{requestId} to retrieve results when complete.
url: http://{{baseUrl}}/compile/async
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "configuration": {
        "name": "string",
        "sources": [
          {
            "source": "string",
            "name": "string",
            "type": "adblock",
            "transformations": [
              "ConvertToAscii",
              "RemoveComments"
            ],
            "exclusions": [
              "string",
              "string"
            ],
            "inclusions": [
              "string",
              "string"
            ]
          }
        ],
        "description": "string",
        "homepage": "http://cBxpuDUXQbpLbhcOekpOXDHq.fjdyf01Kpoy8eHBbtlQ",
        "license": "string",
        "version": "string",
        "transformations": [
          "Compress",
          "Validate"
        ],
        "exclusions": [
          "string",
          "string"
        ],
        "exclusions_sources": [
          "string",
          "string"
        ],
        "inclusions": [
          "string",
          "string"
        ],
        "inclusions_sources": [
          "string",
          "string"
        ]
      },
      "preFetchedContent": {
        "key_0": "string",
        "key_1": "string"
      },
      "benchmark": false,
      "turnstileToken": "string",
      "priority": "standard"
    }
examples: ./.resources/Queue async compilation job.resources/examples
order: 1000
