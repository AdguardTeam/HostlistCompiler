$kind: http-example
request:
  url: http://{{baseUrl}}/compile/stream
  method: POST
  headers:
    Content-Type: application/json
    Accept: text/event-stream
  body:
    type: json
    content: |-
      {
        "configuration": {
          "name": "string",
          "sources": [
            {
              "source": "string",
              "name": "string",
              "type": "adblock",
              "transformations": [
                "ConvertToAscii",
                "RemoveComments"
              ],
              "exclusions": [
                "string",
                "string"
              ],
              "inclusions": [
                "string",
                "string"
              ]
            }
          ],
          "description": "string",
          "homepage": "http://cBxpuDUXQbpLbhcOekpOXDHq.fjdyf01Kpoy8eHBbtlQ",
          "license": "string",
          "version": "string",
          "transformations": [
            "Compress",
            "Validate"
          ],
          "exclusions": [
            "string",
            "string"
          ],
          "exclusions_sources": [
            "string",
            "string"
          ],
          "inclusions": [
            "string",
            "string"
          ],
          "inclusions_sources": [
            "string",
            "string"
          ]
        },
        "preFetchedContent": {
          "key_0": "string",
          "key_1": "string"
        },
        "benchmark": false,
        "turnstileToken": "string",
        "priority": "standard"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: text/event-stream
  body:
    type: text
    content: |
      event: log
      data: {"level":"info","message":"Fetching source..."}
order: 1000
