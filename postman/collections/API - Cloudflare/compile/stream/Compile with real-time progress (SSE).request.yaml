            ],
            "exclusions": [
              "string",
              "string"
            ],
            "inclusions": [
              "string",
              "string"
            ]
          }
        ],
        "description": "string",
        "homepage": "http://cBxpuDUXQbpLbhcOekpOXDHq.fjdyf01Kpoy8eHBbtlQ",
        "license": "string",
        "version": "string",
        "transformations": [
          "Compress",
          "Validate"
        ],
        "exclusions": [
          "string",
          "string"
        ],
        "exclusions_sources": [
          "string",
          "string"
        ],
        "inclusions": [
          "string",
