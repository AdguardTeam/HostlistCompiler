$kind: http-request
description: >
  Compile filter lists with real-time progress updates via Server-Sent Events.

  Streams events including source downloads, transformations, diagnostics, cache
  operations, network events, and metrics.
url: http://{{baseUrl}}/compile/stream
method: POST
headers:
  Content-Type: application/json
  Accept: text/event-stream
