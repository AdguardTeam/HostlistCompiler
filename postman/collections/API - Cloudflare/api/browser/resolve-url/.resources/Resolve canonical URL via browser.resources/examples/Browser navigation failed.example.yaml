$kind: http-example
request:
  url: http://{{baseUrl}}/api/browser/resolve-url
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "url": "https://example.com/redirect-me",
        "waitUntil": "networkidle"
      }
response:
  statusCode: 502
  statusText: Bad Gateway
  body:
    type: text
    content: ""
order: 3000
