$kind: http-example
request:
  url: http://{{baseUrl}}/api/browser/resolve-url
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "url": "https://example.com/redirect-me",
        "waitUntil": "networkidle"
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: text
    content: ""
order: 2000
