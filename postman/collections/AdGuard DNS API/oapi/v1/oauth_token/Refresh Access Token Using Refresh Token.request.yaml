$kind: http-request
description: >-
  The HTTP POST request to `/oapi/v1/oauth_token` is used to obtain a new access
  token using a refresh token. The request should be sent with the
  x-www-form-urlencoded body type.


  ### Request Body


  - `refresh_token` (text): The refresh token to use to get a new access token.
      

  ### Response


  The response to this request will include the new access token along with any
  additional relevant information.
url: "{{baseUrl}}/oapi/v1/oauth_token"
method: POST
body:
  type: urlencoded
  content:
    - key: refresh_token
      value: "{{vault:adguard-refresh_token}}"
      description: |-
        
        The refresh token to use to get new access token
order: 2000
