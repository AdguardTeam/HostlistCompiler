$kind: http-example
request:
  url: "{{baseUrl}}/oapi/v1/oauth_token"
  method: POST
  headers:
    - key: Content-Type
      value: application/x-www-form-urlencoded
    - key: Accept
      value: "*/*"
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: urlencoded
    content:
      - key: mfa_token
        value: <string>
        description: Two-Factor authentication token
      - key: password
        value: <string>
        description: Account password
      - key: refresh_token
        value: <string>
        description: Refresh Token using which a new access token has to be generated
      - key: username
        value: <string>
        description: Account email
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "error": "<string>",
        "error_code": "<string>",
        "error_description": "<string>"
      }
order: 3000
