$kind: http-request
description: >-
  This endpoint allows the user to reset the DNS over HTTPS (DoH) password for a
  specific device by sending an HTTP PUT request to the specified URL. The
  request should include the device ID in the URL.


  ### Request Body


  The request does not require a request body.


  ### Response


  The response for this request can be null, indicating that the password reset
  operation was successful.
url: "{{baseUrl}}/oapi/v1/devices/:device_id/doh_password/reset"
method: PUT
pathVariables:
  - key: device_id
    value: <string>
    description: "(Required) "
examples: ./.resources/Generate and set new DNS-over-HTTPS password.resources/examples
order: 1000
