$kind: http-request
description: >-
  This endpoint retrieves a mobile configuration file for a specific device,
  excluding specified Wi-Fi networks and domains. The HTTP GET request should be
  made to {{baseUrl}}/oapi/v1/devices/:device_id/dot.mobileconfig, with optional
  query parameters to exclude_wifi_networks and exclude_domain.


  ### Response


  The response for this request is expected to be in the form of a JSON schema.
  Here are some examples of the response:


