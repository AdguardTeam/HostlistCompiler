$kind: http-example
request:
  url: "{{baseUrl}}/oapi/v1/devices/:device_id/dedicated_addresses"
  method: GET
  headers:
    - key: Accept
      value: "*/*"
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    device_id: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "ipv4": [
          "<string>",
          "<string>"
        ],
        "ipv4_limit": {
          "limit": "<integer>",
          "used": "<long>"
        },
        "ipv6": [
          "<string>",
          "<string>"
        ]
      }
order: 1000
