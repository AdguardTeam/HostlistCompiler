$kind: http-example
request:
  url: "{{baseUrl}}/oapi/v1/devices/:device_id"
  method: PUT
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    device_id: ""
  body:
    type: json
    content: |-
      {
        "device_type": "ANDROID",
        "dns_server_id": "<string>",
        "name": "<string>"
      }
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 3000
