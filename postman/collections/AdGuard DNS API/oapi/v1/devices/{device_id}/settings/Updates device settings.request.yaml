$kind: http-request
description: >-
  ### Update Device Settings


  This endpoint allows the client to update the settings for a specific device.


  #### Request Body Parameters


  - `detect_doh_auth_only` (boolean): Indicates whether to detect DNS-over-HTTPS
  (DoH) authentication only.
      
  - `protection_enabled` (boolean): Indicates whether the protection is enabled
  for the device.
      

  #### Response


  The response for this request is a JSON schema.


  ``` csharp

  null

   ```
url: "{{baseUrl}}/oapi/v1/devices/:device_id/settings"
method: PUT
