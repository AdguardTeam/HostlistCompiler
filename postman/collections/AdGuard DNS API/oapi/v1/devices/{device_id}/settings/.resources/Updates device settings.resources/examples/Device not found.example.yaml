$kind: http-example
request:
  url: "{{baseUrl}}/oapi/v1/devices/:device_id/settings"
  method: PUT
  headers:
    - key: Content-Type
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    device_id: ""
  body:
    type: json
    content: |-
      {
        "detect_doh_auth_only": "<boolean>",
        "protection_enabled": "<boolean>"
      }
response:
  statusCode: 404
  statusText: Not Found
  body:
    type: text
    content: ""
order: 3000
