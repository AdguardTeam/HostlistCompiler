$kind: http-request
description: >-
  ### Get Device Details


  This endpoint retrieves details of a specific device identified by the
  `device_id`.


  #### Request


  - Method: GET
      
  - URL: `{{baseUrl}}/oapi/v1/devices/:device_id`
      

  #### Response


  The response contains the details of the device including its type, DNS
  addresses, server ID, name, and settings.


  Example response body:


  ``` json

  {
      "device_type": "",
      "dns_addresses": {
          "adguard_dns_over_https_url": "",
          "adguard_dns_over_quic_url": "",
          "adguard_dns_over_tls_url": "",
          "adguard_vpn_dns_over_https_url": "",
          "adguard_vpn_dns_over_quic_url": "",
          "adguard_vpn_dns_over_tls_url": "",
          "dns_over_https_url": "",
          "dns_over_quic_url": "",
          "dns_over_tls_url": "",
          "adguard_dns_over_https_with_auth_url": "",
          "adguard_vpn_dns_over_https_with_auth_url": "",
          "dns_over_https_with_auth_url": "",
          "ip_addresses": [
              {
                  "ip_address": "",
                  "type": ""
              }
          ]
      },
      "dns_server_id": "",
      "id": "",
      "name": "",
      "settings": {
          "detect_doh_auth_only": "",
          "protection_enabled": ""
      }
  }

   ```
url: "{{baseUrl}}/oapi/v1/devices/:device_id"
method: GET
headers:
  Accept: "*/*"
pathVariables:
  - key: device_id
    value: <string>
    description: "(Required) "
examples: ./.resources/Gets an existing device by ID.resources/examples
order: 7000
