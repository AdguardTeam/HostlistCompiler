  orks=<string>&exclude_wifi_networks=<string>&exclude_domain=<string>&exclude_\
  domain=<string>"
method: GET
queryParams:
  - key: exclude_wifi_networks
    value: <string>
    description: List Wi-Fi networks by their SSID in which you want AdGuard DNS to
      be disabled
  - key: exclude_wifi_networks
    value: <string>
    description: List Wi-Fi networks by their SSID in which you want AdGuard DNS to
      be disabled
  - key: exclude_domain
