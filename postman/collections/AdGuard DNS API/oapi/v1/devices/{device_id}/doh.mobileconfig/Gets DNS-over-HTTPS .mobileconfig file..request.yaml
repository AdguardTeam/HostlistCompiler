$kind: http-request
description: >-
  This endpoint retrieves a mobile configuration file for a specific device,
  with options to exclude specific Wi-Fi networks and domains. The request
  parameters include the device ID, and optional parameters to exclude Wi-Fi
  networks and domains. The response for this request is expected to be null.


  ``` json

  {
    "type": "object",
    "properties": {},
    "additionalProperties": true
  }

   ```
