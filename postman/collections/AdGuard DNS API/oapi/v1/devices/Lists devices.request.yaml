$kind: http-request
description: >-
  ### Retrieve Devices


  This endpoint makes an HTTP GET request to retrieve a list of devices.


  #### Request Body


  This request does not require a request body.


  #### Response


  The response will include an array of objects, where each object represents a
  device. Each device object contains information such as device type, DNS
  addresses, DNS server ID, name, and settings. The DNS addresses object
  includes various DNS URLs and IP addresses associated with the device.


  Example response:


  ``` json

  [
      {
          "device_type": "",
          "dns_addresses": {
              "adguard_dns_over_https_url": "",
              "adguard_dns_over_quic_url": "",
              "adguard_dns_over_tls_url": "",
              "adguard_vpn_dns_over_https_url": "",
              "adguard_vpn_dns_over_quic_url": "",
              "adguard_vpn_dns_over_tls_url": "",
              "dns_over_https_url": "",
              "dns_over_quic_url": "",
              "dns_over_tls_url": "",
              "adguard_dns_over_https_with_auth_url": "",
              "adguard_vpn_dns_over_https_with_auth_url": "",
              "dns_over_https_with_auth_url": "",
              "ip_addresses": [
                  {
                      "ip_address": "",
                      "type": ""
                  }
              ]
          },
          "dns_server_id": "",
          "id": "",
          "name": "",
          "settings": {
              "detect_doh_auth_only": "",
              "protection_enabled": ""
          }
      }
  ]

   ```
url: "{{baseUrl}}/oapi/v1/devices"
method: GET
headers:
  Accept: "*/*"
examples: ./.resources/Lists devices.resources/examples
order: 2000
