$kind: http-example
request:
  url: "{{baseUrl}}/oapi/v1/web_services"
  method: GET
  headers:
    - key: Accept
      value: "*/*"
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      [
        {
          "icon_svg": "<string>",
          "id": "<string>",
          "name": "<string>"
        },
        {
          "icon_svg": "<string>",
          "id": "<string>",
          "name": "<string>"
        }
      ]
order: 1000
