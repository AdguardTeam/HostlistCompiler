$kind: http-request
description: >-
  ### Retrieve Web Services


  This endpoint makes an HTTP GET request to retrieve a list of web services.


  #### Request Body


  This request does not require a request body.


  #### Response Body


  The response will contain an array of objects, each representing a web
  service. Each object includes the following properties:


  - `icon_svg` (string): The SVG icon for the web service.
      
  - `id` (string): The unique identifier for the web service.
      
  - `name` (string): The name of the web service.
      

  Example response:


  ``` json

  [
      {
          "icon_svg": "",
          "id": "",
          "name": ""
      }
  ]

   ```
url: "{{baseUrl}}/oapi/v1/web_services"
method: GET
headers:
  Accept: "*/*"
examples: ./.resources/Lists web services.resources/examples
order: 1000
