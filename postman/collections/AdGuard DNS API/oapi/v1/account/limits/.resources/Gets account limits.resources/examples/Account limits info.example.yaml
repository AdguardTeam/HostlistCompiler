$kind: http-example
request:
  url: "{{baseUrl}}/oapi/v1/account/limits"
  method: GET
  headers:
    - key: Accept
      value: "*/*"
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "access_rules": {
          "limit": "<integer>",
          "used": "<long>"
        },
        "dedicated_ipv4": {
          "limit": "<integer>",
          "used": "<long>"
        },
        "devices": {
          "limit": "<integer>",
          "used": "<long>"
        },
        "dns_servers": {
          "limit": "<integer>",
          "used": "<long>"
        },
        "requests": {
          "limit": "<integer>",
          "used": "<long>"
        },
        "user_rules": {
          "limit": "<integer>",
          "used": "<long>"
        }
      }
order: 1000
