$kind: http-request
description: Removes a DNS server. All devices attached to this DNS server will
  be moved to the default DNS server. Deleting the default DNS server is
  forbidden.
url: "{{baseUrl}}/oapi/v1/dns_servers/:dns_server_id"
method: DELETE
pathVariables:
  - key: dns_server_id
    value: "{{dnsServerId}}"
    description: AdGuard DNS server instance ID (DEV, PROD)
settings:
  protocolVersion: auto
examples: ./.resources/Removes a DNS server.resources/examples
order: 2000
