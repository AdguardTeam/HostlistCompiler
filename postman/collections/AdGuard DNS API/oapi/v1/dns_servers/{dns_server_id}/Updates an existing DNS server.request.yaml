$kind: http-request
description: >-
  ### Update DNS Server Name


  This endpoint allows the user to update the name of a specific DNS server.


  #### Request


  - Method: PUT
      
  - URL: {{baseUrl}}/oapi/v1/dns_servers/:dns_server_id
      
  - Body:
      
      - name (string, required): The new name for the DNS server.

          

  #### Response


  The response for this request is a JSON schema. Examples of possible responses
  include:


  - null
url: "{{baseUrl}}/oapi/v1/dns_servers/:dns_server_id"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: dns_server_id
    value: "{{dnsServerId}}"
    description: AdGuard DNS server instance ID (DEV, PROD)
body:
  type: json
  content: |-
    {
        "name": "<string>"
    }
examples: ./.resources/Updates an existing DNS server.resources/examples
order: 4000
