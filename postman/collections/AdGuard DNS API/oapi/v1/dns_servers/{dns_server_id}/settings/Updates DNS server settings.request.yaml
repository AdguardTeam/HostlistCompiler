$kind: http-request
description: >-
  ### Update DNS Server Settings


  This endpoint allows the user to update the settings for a specific DNS
  server.


  #### Request Body


  - `access_settings` (object)
      
      - `allowed_clients` (array of strings): List of allowed client IP addresses.
          
      - `block_known_scanners` (boolean): Indicates whether known scanners should be blocked.
          
      - `blocked_clients` (array of strings): List of blocked client IP addresses.
          
      - `blocked_domain_rules` (array of strings): List of blocked domain rules.
          
      - `enabled` (boolean): Indicates whether the access settings are enabled.

          
  - `auto_connect_devices_enabled` (boolean): Indicates whether auto-connect
  devices are enabled.
      
  - `block_chrome_prefetch` (boolean): Indicates whether Chrome prefetch should
  be blocked.
      
  - `block_firefox_canary` (boolean): Indicates whether Firefox canary should be
  blocked.
      
  - `block_private_relay` (boolean): Indicates whether private relay should be
  blocked.
      
  - `block_ttl_seconds` (integer): Number of seconds to block Time-to-Live
  (TTL).
      
  - `blocking_mode_settings` (object)
      
      - `blocking_mode` (string): The blocking mode (e.g., CUSTOM_IP).
          
      - `ipv4_blocking_address` (string): IPv4 blocking address.
          
      - `ipv6_blocking_address` (string): IPv6 blocking address.

          
  - `filter_lists_settings` (object)
      
      - `enabled` (boolean): Indicates whether filter lists are enabled.
          
      - `filter_list` (array of objects)
          
          - `filter_id` (string): The ID of the filter.
              
          - `enabled` (boolean): Indicates whether the filter is enabled.

              
  - `ip_log_enabled` (boolean): Indicates whether IP logging is enabled.
      
  - `parental_control_settings` (object)
      
      - `block_adult_websites_enabled` (boolean): Indicates whether adult websites should be blocked.
          
      - `blocked_services` (array of objects)
          
          - `id` (string): The ID of the blocked service.
              
          - `enabled` (boolean): Indicates whether the service is enabled.
              
      - `enabled` (boolean): Indicates whether parental controls are enabled.
          
      - `engines_safe_search_enabled` (boolean): Indicates whether safe search engines are enabled.
          
      - `screen_time_schedule` (object)
          
          - `daily_schedule` (array of objects)
              
              - `day_of_week` (string): The day of the week (e.g., TUESDAY).
                  
              - `enabled` (boolean): Indicates whether the schedule is enabled.
                  
              - `from_time` (object)
                  
                  - `hours` (integer): The starting hour.
                      
                  - `minutes` (integer): The starting minute.
                      
              - `to_time` (object)
                  
                  - `hours` (integer): The ending hour.
                      
                  - `minutes` (integer): The ending minute.
                      
      - `youtube_safe_search_enabled` (boolean): Indicates whether YouTube safe search is enabled.

          
  - `protection_enabled` (boolean): Indicates whether protection is enabled.
      
  - `safebrowsing_settings` (object)
      
      - `block_dangerous_domains` (boolean): Indicates whether dangerous domains should be blocked.
          
      - `block_nrd` (boolean): Indicates whether NRD should be blocked.
          
      - `enabled` (boolean): Indicates whether safe browsing is enabled.

          
  - `user_rules_settings` (object)
      
      - `enabled` (boolean): Indicates whether user rules are enabled.
          
      - `rules` (array of strings): List of user rules.

          

  #### Response


  The response for this request is `null`.
url: "{{baseUrl}}/oapi/v1/dns_servers/:dns_server_id/settings"
