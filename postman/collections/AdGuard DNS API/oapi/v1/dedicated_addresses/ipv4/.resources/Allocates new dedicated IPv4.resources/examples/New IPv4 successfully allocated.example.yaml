$kind: http-example
request:
  url: "{{baseUrl}}/oapi/v1/dedicated_addresses/ipv4"
  method: POST
  headers:
    - key: Accept
      value: "*/*"
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "ip": "<string>",
        "device_id": "<string>"
      }
order: 1000
