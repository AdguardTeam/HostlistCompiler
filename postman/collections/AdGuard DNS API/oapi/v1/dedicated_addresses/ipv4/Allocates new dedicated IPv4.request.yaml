$kind: http-request
description: >-
  This endpoint allows you to allocate a dedicated IPv4 address. Upon a
  successful request, the response will include the allocated IP address and the
  associated device ID in JSON format.


  ### Response


  The response for this request can be documented as a JSON schema:


  ``` json

  {
    "type": "object",
    "properties": {
      "ip": {
        "type": "string"
      },
      "device_id": {
        "type": "string"
      }
    }
  }

   ```
url: "{{baseUrl}}/oapi/v1/dedicated_addresses/ipv4"
method: POST
headers:
  Accept: "*/*"
examples: ./.resources/Allocates new dedicated IPv4.resources/examples
order: 2000
