$kind: http-example
request:
  url: "{{baseUrl}}/oapi/v1/revoke_token?refresh_token=<string>"
  method: POST
  headers:
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: refresh_token
      value: <string>
      description: (Required) Refresh Token
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: ""
order: 1000
