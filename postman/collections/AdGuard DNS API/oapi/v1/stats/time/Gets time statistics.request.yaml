$kind: http-request
description: |-
  # Get Time Stats

  This endpoint retrieves time-based statistics for specified devices and countries.

  ## Request

  ### Query Parameters

  - `time_from_millis` (required, long): The start time in milliseconds.
      
  - `time_to_millis` (required, long): The end time in milliseconds.
      
  - `devices` (required, string): The list of devices for which statistics are requested.
      
  - `countries` (required, string): The list of countries for which statistics are requested.
      

  Example:

  ```
  {{baseUrl}}/oapi/v1/stats/time?time_from_millis=<long>&time_to_millis=<long>&devices=<string>&devices=<string>&countries=<string>&countries=<string>

   ```

  ## Response

  The response is a JSON object with the following schema:

  ``` json
  {
      "stats": [
          {
              "time_millis": "",
              "value": {
                  "blocked": "",
                  "companies": "",
                  "queries": ""
              }
          }
      ]
  }

   ```

  - `stats` (array): An array of time-based statistics.
      
      - `time_millis` (string): The time in milliseconds.
          
      - `value` (object): The statistics values.
          
          - `blocked` (string): The number of blocked requests.
              
          - `companies` (string): The number of companies.
              
          - `queries` (string): The number of queries.
url: "{{baseUrl}}/oapi/v1/stats/time?time_from_millis=<long>&time_to_millis=<lo\
