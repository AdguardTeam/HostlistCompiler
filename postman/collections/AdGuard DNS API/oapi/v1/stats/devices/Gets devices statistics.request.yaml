$kind: http-request
description: >-
  This endpoint retrieves statistics for devices based on the specified time
  range, devices, and countries. The request should include the
  time_from_millis, time_to_millis, devices, and countries as query parameters.


  ### Response


  The response for this request will be in the form of a JSON object with a
  "stats" array. Each element in the "stats" array contains the following
  properties:


  - "device_id": (string) The ID of the device.
      
  - "value": An object containing the following properties:
      
      - "blocked": (string) The number of blocked items on the device.
          
      - "companies": (string) The number of companies associated with the device.
          
      - "queries": (string) The number of queries made by the device.

          
  - "last_activity_time_millis": (string) The timestamp of the last activity on
  the device in milliseconds.
      

  #### JSON Schema


  ``` json

  {
    "type": "object",
    "properties": {
      "stats": {
        "type": "array",
        "items": {
          "type": "object",
          "properties": {
            "device_id": {
              "type": "string"
            },
            "value": {
              "type": "object",
              "properties": {
                "blocked": {
                  "type": "string"
                },
                "companies": {
                  "type": "string"
                },
                "queries": {
                  "type": "string"
                }
              }
            },
            "last_activity_time_millis": {
              "type": "string"
            }
          }
        }
      }
    }
  }

   ```
url: "{{baseUrl}}/oapi/v1/stats/devices?time_from_millis=<long>&time_to_millis=\
  <long>&devices=<string>&devices=<string>&countries=<string>&countries=<string\
  >"
method: GET
headers:
  Accept: "*/*"
queryParams:
  - key: time_from_millis
    value: <long>
    description: (Required) Time from in milliseconds (inclusive)
  - key: time_to_millis
    value: <long>
    description: (Required) Time to in milliseconds (inclusive)
  - key: devices
    value: <string>
    description: Filter by devices
  - key: devices
    value: <string>
    description: Filter by devices
  - key: countries
    value: <string>
    description: Filter by countries
  - key: countries
    value: <string>
    description: Filter by countries
examples: ./.resources/Gets devices statistics.resources/examples
order: 1000
