$kind: http-example
request:
  url: "{{baseUrl}}/oapi/v1/stats/devices?time_from_millis=<long>&time_to_millis=\
    <long>&devices=<string>&countries=<string>"
  method: GET
  headers:
    - key: Accept
      value: "*/*"
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: time_from_millis
      value: <long>
      description: (Required) Time from in milliseconds (inclusive)
    - key: time_to_millis
      value: <long>
      description: (Required) Time to in milliseconds (inclusive)
    - key: devices
      value: <string>
      description: Filter by devices
    - key: countries
      value: <string>
      description: Filter by countries
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: "*/*"
  body:
    type: text
    content: |-
      {
        "stats": [
          {
            "device_id": "<string>",
            "value": {
              "blocked": "<long>",
              "companies": "<integer>",
              "queries": "<long>"
            },
            "last_activity_time_millis": "<long>"
          },
          {
            "device_id": "<string>",
            "value": {
              "blocked": "<long>",
              "companies": "<integer>",
              "queries": "<long>"
            },
            "last_activity_time_millis": "<long>"
          }
        ]
      }
order: 1000
