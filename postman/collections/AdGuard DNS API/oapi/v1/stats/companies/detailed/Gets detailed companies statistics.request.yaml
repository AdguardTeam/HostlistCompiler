$kind: http-request
description: >-
  The endpoint retrieves detailed statistics for companies based on the
  specified time range, devices, countries, and cursor. The response is in the
  form of a JSON schema.


  ``` json

  {
      "type": "object",
      "properties": {
          "pages": {
              "type": "array",
              "items": {
                  "type": "object",
                  "properties": {
                      "current": {"type": "string"},
                      "page_cursor": {"type": "string"},
                      "page_number": {"type": "string"}
                  }
              }
          },
          "stats": {
              "type": "array",
              "items": {
                  "type": "object",
                  "properties": {
                      "company_name": {"type": "string"},
                      "domains_count": {"type": "string"},
                      "top_queries_domain": {"type": "string"},
                      "value": {
                          "type": "object",
                          "properties": {
                              "blocked": {"type": "string"},
                              "companies": {"type": "string"},
                              "queries": {"type": "string"}
                          }
                      },
                      "top_blocked_domain": {"type": "string"}
                  }
              }
          }
      }
  }

   ```
