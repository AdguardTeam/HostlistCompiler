      value: "*/*"
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: time_from_millis
      value: <long>
      description: (Required) Time from in milliseconds (inclusive)
    - key: time_to_millis
