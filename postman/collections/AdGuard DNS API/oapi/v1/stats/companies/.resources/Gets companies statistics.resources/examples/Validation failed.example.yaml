$kind: http-example
request:
  url: "{{baseUrl}}/oapi/v1/stats/companies?time_from_millis=<long>&time_to_milli\
    s=<long>&devices=<string>&countries=<string>"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: time_from_millis
      value: <long>
      description: (Required) Time from in milliseconds (inclusive)
    - key: time_to_millis
      value: <long>
      description: (Required) Time to in milliseconds (inclusive)
    - key: devices
      value: <string>
      description: Filter by devices
    - key: countries
      value: <string>
      description: Filter by countries
