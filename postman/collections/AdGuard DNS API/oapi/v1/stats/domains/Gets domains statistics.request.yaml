$kind: http-request
description: >-
  This endpoint makes an HTTP GET request to retrieve statistics for domains.
  The request includes query parameters for time range, devices, and countries.
  The `time_from_millis` and `time_to_millis` parameters specify the time range
  in milliseconds. The `devices` and `countries` parameters allow filtering
  based on device types and countries respectively.


  ### Request Body


  This request does not require a request body.


  ### Response Body


  The response returns an array of statistics objects, where each object
  contains the `domain` and `value` fields. The `value` field further includes
  the statistics for `blocked`, `companies`, and `queries`.


  #### Example Response


  ``` json

  {
      "stats": [
          {
              "domain": "",
              "value": {
                  "blocked": "",
                  "companies": "",
                  "queries": ""
              }
          }
      ]
  }

   ```
url: "{{baseUrl}}/oapi/v1/stats/domains?time_from_millis=<long>&time_to_millis=\
  <long>&devices=<string>&devices=<string>&countries=<string>&countries=<string\
  >"
method: GET
headers:
  Accept: "*/*"
queryParams:
  - key: time_from_millis
    value: <long>
    description: (Required) Time from in milliseconds (inclusive)
  - key: time_to_millis
    value: <long>
    description: (Required) Time to in milliseconds (inclusive)
  - key: devices
    value: <string>
    description: Filter by devices
  - key: devices
    value: <string>
    description: Filter by devices
  - key: countries
    value: <string>
    description: Filter by countries
  - key: countries
    value: <string>
    description: Filter by countries
examples: ./.resources/Gets domains statistics.resources/examples
order: 1000
