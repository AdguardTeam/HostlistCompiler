$kind: http-example
request:
  url: "{{baseUrl}}/oapi/v1/query_log?time_from_millis=<long>&time_to_millis=<lon\
    g>&devices=<string>&countries=<string>&companies=<string>&statuses=UNKNOWN&\
    categories=OTHERS&search=<string>&limit=20&cursor=<string>"
  method: GET
  headers:
    - key: Accept
      value: "*/*"
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: time_from_millis
      value: <long>
      description: (Required) Time from in milliseconds (inclusive)
    - key: time_to_millis
      value: <long>
      description: (Required) Time to in milliseconds (inclusive)
    - key: devices
      value: <string>
      description: Filter by devices
    - key: countries
      value: <string>
      description: Filter by countries
    - key: companies
      value: <string>
      description: Filter by companies
    - key: statuses
      value: UNKNOWN
      description: Filter by statuses
    - key: categories
      value: OTHERS
      description: Filter by categories
    - key: search
      value: <string>
      description: Filter by domain name
    - key: limit
      value: "20"
      description: Limit the number of records to be returned
    - key: cursor
      value: <string>
      description: Pagination cursor. Use cursor from response to paginate through the
        pages.
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: "*/*"
  body:
