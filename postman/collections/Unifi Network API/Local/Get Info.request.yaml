description: >-
  ## Endpoint Description


  This endpoint retrieves information about a specific network integration and
  version.


  ## Request


  - Path Parameters:
      
      - `network` (string): The network for which information is being retrieved.
          
      - `integration` (string): The integration for which information is being retrieved.
          
      - `version` (string): The version for which information is being retrieved.
          
      - `info` (string): The type of information being retrieved.

          

  ## Response


  The response for this request is a JSON object conforming to the specified
  schema.


