$kind: http-request
description: >-
  This endpoint retrieves the latest statistics for a specific device at a
  particular site. The response for this request is documented below as a JSON
  schema.


  ``` json

  {
    "type": "object",
    "properties": {
      "timestamp": {
        "type": "string",
        "format": "date-time",
        "description": "The timestamp of the statistics data"
      },
      "temperature": {
        "type": "number",
        "description": "The temperature recorded by the device"
      },
      "humidity": {
        "type": "number",
        "description": "The humidity recorded by the device"
      },
      "status": {
        "type": "string",
        "description": "The status of the device"
      }
    }
  }

   ```
url: "{{https}}{{local-base-url}}/{{proxy}}/{{network}}/{{integration}}/{{versi\
  on}}/{{sites}}/{{site-id}}/{{devices}}/{{device-id}}/{{statistics}}/{{latest}\
  }"
method: GET
order: 6000
