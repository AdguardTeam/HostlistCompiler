description: |-
  ### GET /{{proxy}}/{{network}}/{{integration}}/{{version}}/{{sites}}/{{site-id}}/{{clients}}

  This endpoint retrieves information about clients associated with a specific site.

  #### Request

  No request body parameters are required for this endpoint.

  - `{{proxy}}` (path): The proxy identifier.
      
  - `{{network}}` (path): The network identifier.
      
  - `{{integration}}` (path): The integration identifier.
      
  - `{{version}}` (path): The version of the API.
      
  - `{{sites}}` (path): The sites identifier.
      
  - `{{site-id}}` (path): The specific site ID.
      

  #### Response

  The response is in JSON format and follows the schema below:

  ``` json
  {
    "type": "object",
    "properties": {
      "offset": {
        "type": "integer"
      },
      "limit": {
        "type": "integer"
      },
      "count": {
        "type": "integer"
      },
      "totalCount": {
        "type": "integer"
      },
      "data": {
        "type": "array",
        "items": {
          "type": "object",
          "properties": {
            "type": {
              "type": "string"
            },
            "id": {
              "type": "string"
            },
            "name": {
              "type": "string"
            },
            "connectedAt": {
              "type": "string"
            },
            "ipAddress": {
              "type": "string"
            },
            "macAddress": {
              "type": "string"
            },
            "uplinkDeviceId": {
              "type": "string"
            }
          }
        }
      }
    }
  }

   ```

