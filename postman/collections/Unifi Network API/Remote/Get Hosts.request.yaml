$kind: http-request
description: >-
  ### GET /{{ea}}/{{hosts}}


  This endpoint retrieves information about hosts.


  #### Request


  No specific request body is required for this GET request.


  #### Response


  The response will be in JSON format and will contain the following fields:


  - `data` (array): An array of objects containing information about hosts,
  including hardware details, IP address, registration time, reported state,
  firmware update, location, and more.
      
      - `hardwareId` (string): The hardware ID of the host.
          
      - `id` (string): The ID of the host.
          
      - `ipAddress` (string): The IP address of the host.
          
      - `isBlocked` (boolean): Indicates whether the host is blocked.
          
      - `lastConnectionStateChange` (string): Timestamp of the last connection state change.
          
      - `latestBackupTime` (string): Timestamp of the latest backup time.
          
      - `owner` (boolean): Indicates whether the user is the owner of the host.
          
      - `registrationTime` (string): Timestamp of the registration time.
          
      - `reportedState` (object): Object containing reported state details.
          
          - `anonid` (string): Anonymized ID.
              
          - `apps` (array): An array of objects containing information about applications.
              
              - `controllerStatus` (string): Status of the controller.
                  
              - `name` (string): Name of the application.
                  
              - `port` (number): Port number.
                  
              - `swaiVersion` (number): SWAI version.
                  
              - `type` (string): Type of the application.
                  
              - `uiVersion` (string): UI version.
                  
              - `version` (string): Version of the application.
                  
          - `autoUpdate` (object): Object containing auto-update details.
              
              - `includeApplications` (boolean): Indicates whether applications are included in auto-update.
                  
              - `preferencesPrompt` (null): Preferences prompt value.
                  
              - `schedule` (null): Auto-update schedule.
                  
          - `availableChannels` (array): An array of available channels.
              
          - `consolesOnSameLocalNetwork` (array): An array of consoles on the same local network.
              
          - `controller_uuid` (string): UUID of the controller.
              
          - `controllers` (array): An array of objects containing information about controllers.
              
              - ... (and so on, for other nested fields)
                  
      - `type` (string): Type of the host.
          
      - `userData` (object): Object containing user data.
          
          - `apps` (array): An array of applications.
              
          - `consoleGroupMembers` (array): An array of objects containing console group members.
              
          - `controllers` (array): An array of controllers.
              
          - `email` (string): Email of the user.
              
          - `features` (object): Object containing features details.
              
              - ... (and so on, for other nested fields)
                  
      - `httpStatusCode` (number): The HTTP status code.
          
      - `traceId` (string): The trace ID.

          

  This response can be used as a JSON schema for the response of the GET request
  to retrieve information about hosts.
url: "{{https}}{{remote-base-url}}/{{ea}}/{{hosts}}"
method: GET
headers:
  Accept: application/json
  X-API-KEY: 3wGLEhKuo243R40mUMhQYj7mZqb0M80g
