$kind: http-request
description: >-
  This endpoint makes an HTTP GET request to retrieve information about a
  specific host identified by the 'host-id' parameter.


  ### Request Body


  This request does not require a request body.


  ### Response Body


  The response will contain the details of the host, including its attributes
  and associated data.
url: "{{https}}{{remote-base-url}}/{{ea}}/{{hosts}}/{{host-id}}"
method: GET
