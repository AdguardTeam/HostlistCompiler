$kind: http-request
description: >-
  ### Get Devices by Host ID


  This endpoint retrieves device information based on the provided host ID.


  #### Request


  - Method: GET
      
  - URL: `{{https}}{{remote-base-url}}/{{ea}}/{{devices}}`
      
  - Query Parameters:
      
      - `hostIds[0]`: The host ID for which device information is requested.

          

  #### Response


  The response will include the details of the devices associated with the
  provided host ID.
url: "{{https}}{{remote-base-url}}/{{ea}}/{{devices}}?hostIds[0]={{host-id}}"
method: GET
headers:
  X-API-KEY: 3wGLEhKuo243R40mUMhQYj7mZqb0M80g
queryParams:
  hostIds[0]: "{{host-id}}"
scripts:
