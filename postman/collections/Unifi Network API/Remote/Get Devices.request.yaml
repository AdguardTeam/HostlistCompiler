      \    });\r

      });\r

      \r

      \r

      pm.test(\"Device ID is a non-empty string\", function () {\r

      \  const responseData = pm.response.json();\r

      \r

      \  pm.expect(responseData).to.be.an('object');\r

      \ 
      pm.expect(responseData.deviceId).to.be.a('string').and.to.have.lengthOf.a\
