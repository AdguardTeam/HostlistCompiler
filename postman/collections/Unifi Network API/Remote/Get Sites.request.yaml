$kind: http-request
description: >-
  # Retrieve Site Information


  This endpoint makes an HTTP GET request to retrieve information about sites.


  ### Request


  No request body is required for this endpoint.


  ### Response


  The response will be a JSON object containing information about the sites. You
  can refer to the JSON schema for the detailed structure of the response.
url: "{{https}}{{remote-base-url}}/{{ea}}/{{sites}}"
method: GET
scripts:
  - type: afterResponse
    code: "pm.test(\"Response status code is 401\", function () {\r

      \    pm.expect(pm.response.code).to.equal(401);\r

      });\r

      \r

      \r

      pm.test(\"Response time is within an acceptable range\", function () {\r

      \  pm.expect(pm.response.responseTime).to.be.below(200);\r

      });\r

      \r

      \r

      pm.test(\"Verify that the response has the required fields - code,
      httpStatusCode, message, and traceId\", function () {\r

      \    const responseData = pm.response.json();\r

      \    \r

      \    pm.expect(responseData).to.be.an('object');\r

      \    pm.expect(responseData.code).to.exist;\r

      \    pm.expect(responseData.httpStatusCode).to.exist;\r

      \    pm.expect(responseData.message).to.exist;\r

      \    pm.expect(responseData.traceId).to.exist;\r

      });\r

      \r

      \r

      pm.test(\"Validate the JSON schema of the response object\", function ()
      {\r

      \    const responseData = pm.response.json();\r

      \r

      \    pm.expect(responseData).to.be.an('object');\r

      \    // Add more specific checks for the JSON schema here\r

      });\r

      var template = `\r

      <style type=\"text/css\">\r

      \    .tftable {font-size:14px;color:#333333;width:100%;border-width:
      1px;border-color: #87ceeb;border-collapse: collapse;}\r

      \    .tftable th {font-size:18px;background-color:#87ceeb;border-width:
      1px;padding: 8px;border-style: solid;border-color:
      #87ceeb;text-align:left;}\r

      \    .tftable tr {background-color:#ffffff;}\r

      \    .tftable td {font-size:14px;border-width: 1px;padding:
      8px;border-style: solid;border-color: #87ceeb;}\r

      \    .tftable tr:hover {background-color:#e0ffff;}\r

      </style>\r

      \r

      <table class=\"tftable\" border=\"1\">\r

      \    <tr>\r

      \        <th>Code</th>\r

      \        <th>HTTP Status Code</th>\r

      \        <th>Message</th>\r

      \        <th>Trace ID</th>\r

      \    </tr>\r

      \    <tr>\r

      \        <td>{{response.code}}</td>\r

      \        <td>{{response.httpStatusCode}}</td>\r

      \        <td>{{response.message}}</td>\r

      \        <td>{{response.traceId}}</td>\r

      \    </tr>\r

      </table>\r

      `;\r

      \r

      function constructVisualizerPayload() {\r

      \    return { response: pm.response.json() }\r

      }\r

      \r

      pm.visualizer.set(template, constructVisualizerPayload());"
    language: text/javascript
examples: ./.resources/Get Sites.resources/examples
order: 3000
