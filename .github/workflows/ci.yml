name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

env:
    DENO_VERSION: '2.x'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint-format:
        name: Lint & Format Check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}
                  install-deps: 'false'

            - name: Lint
              run: deno lint

            - name: Format check
              run: deno fmt --check

    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Type check all entry points
              run: deno task check

    test:
        name: Test
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Load environment variables
              uses: ./.github/actions/setup-env

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Run tests with coverage
              run: |
                  deno task test:coverage
                  deno coverage coverage --lcov --output=coverage.lcov --include="^file:"
              env:
                  DENO_TLS_CA_STORE: system

            - name: Upload coverage artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: coverage
                  path: coverage.lcov
                  retention-days: 1

    upload-coverage:
        name: Upload Coverage
        runs-on: ubuntu-latest
        timeout-minutes: 5
        needs: [test]
        if: >-
            (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
            github.event_name == 'pull_request'
        permissions:
            contents: read
        steps:
            - name: Download coverage artifact
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  name: coverage

            - name: Upload to Codecov
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
              continue-on-error: true
              with:
                  files: ./coverage.lcov
                  flags: deno
                  fail_ci_if_error: false
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    security:
        name: Security Scan
        runs-on: ubuntu-latest
        timeout-minutes: 15
        # Security scan should not block deployments
        continue-on-error: true
        permissions:
            contents: read
            security-events: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # 0.33.1
              continue-on-error: true
              with:
                  scan-type: fs
                  scan-ref: .
                  format: sarif
                  output: trivy-results.sarif
                  severity: 'CRITICAL,HIGH,MEDIUM'

            - name: Upload Trivy results to GitHub Security
              if: always() && hashFiles('trivy-results.sarif') != ''
              uses: github/codeql-action/upload-sarif@dd677812177e0c29f9c970a6c58d8607ae1bfefd # v4
              continue-on-error: true
              with:
                  sarif_file: trivy-results.sarif

    frontend-lint-test:
        name: Frontend (lint, test)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup pnpm
              uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: '22'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint frontend
              run: pnpm --filter adblock-compiler-frontend run lint

            - name: Test frontend with coverage
              run: pnpm --filter adblock-compiler-frontend run test:coverage

            - name: Upload frontend coverage to Codecov
              if: >-
                  (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
                  github.event_name == 'pull_request'
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
              continue-on-error: true
              with:
                  files: ./frontend/coverage/lcov.info
                  flags: frontend
                  fail_ci_if_error: false
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    frontend-build:
        name: Frontend (build)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup pnpm
              uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: '22'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Angular frontend
              run: pnpm --filter adblock-compiler-frontend run build

            - name: Upload frontend build artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: frontend-dist
                  path: frontend/dist/
                  retention-days: 1

    validate-artifacts:
        name: Validate Generated Artifacts
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Validate OpenAPI specification
              run: deno task openapi:validate

            - name: Regenerate all artifacts
              run: deno task schema:generate

            - name: Check all artifacts are up to date
              run: |
                  DRIFT=0
                  if ! git diff --quiet docs/api/cloudflare-schema.yaml; then
                      echo "❌ docs/api/cloudflare-schema.yaml is out of date!"
                      echo ""
                      git diff docs/api/cloudflare-schema.yaml
                      DRIFT=1
                  fi
                  if ! git diff --quiet docs/postman/postman-collection.json docs/postman/postman-environment.json; then
                      echo "❌ Postman collection or environment is out of date!"
                      echo ""
                      git diff docs/postman/postman-collection.json docs/postman/postman-environment.json
                      DRIFT=1
                  fi
                  if [ "$DRIFT" -eq 1 ]; then
                      echo ""
                      echo "Run 'deno task schema:generate' locally, commit the updated files, and push again."
                      echo "Tip: run 'deno task setup:hooks' to catch drift automatically before every push."
                      exit 1
                  fi
                  echo "✅ All generated artifacts are up to date"

    check-slow-types:
        name: Check Slow Types
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Check for slow types
              run: deno publish --dry-run

    ci-gate:
        name: CI Gate
        runs-on: ubuntu-latest
        timeout-minutes: 5
        needs:
            - lint-format
            - typecheck
            - test
            - validate-artifacts
            - frontend-lint-test
            - frontend-build
            - check-slow-types
            - verify-deploy
        if: ${{ always() && !cancelled() }}
        steps:
            - name: Check all jobs passed
              env:
                  NEEDS_JSON: ${{ toJSON(needs) }}
              run: |
                  echo "Job results: $NEEDS_JSON"
                  python3 - <<'PY'
                  import os
                  import json

                  needs = json.loads(os.environ['NEEDS_JSON'])
                  cancelled = [name for name, data in needs.items() if data['result'] == 'cancelled']
                  if cancelled:
                      print('Run interrupted by concurrency cancellation (cancelled jobs: ' + ', '.join(cancelled) + ')')
                      print('A newer run will verify these checks — exiting gracefully.')
                      raise SystemExit(0)
                  failures = [name for name, data in needs.items() if data['result'] not in ('success', 'skipped')]
                  if failures:
                      print('FAILED: ' + ', '.join(failures))
                      raise SystemExit(1)
                  print('All checks passed')
                  PY

    # Only publish on main pushes, and gate on all checks
    publish:
        name: Publish to JSR
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: [ci-gate]
        # Must use always() because ci-gate depends on verify-deploy which is skipped on push.
        # Without always(), GitHub Actions skips downstream jobs due to transitive skip behavior.
        if: >-
            always() &&
            needs.ci-gate.result == 'success' &&
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main'
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Publish to JSR
              run: |
                  set -euo pipefail
                  if ! OUTPUT="$(deno publish --allow-dirty 2>&1)"; then
                    echo "${OUTPUT}"
                    if echo "${OUTPUT}" | grep -qiE 'version .*already (exists|published)'; then
                      echo "Version already published, skipping."
                      exit 0
                    fi
                    echo "Publish failed with unexpected error."
                    exit 1
                  fi
                  echo "Successfully published to JSR"

    # Verify the worker bundles correctly on every PR — catches build failures
    # before they reach main. No secrets required; --dry-run bundles without
    # uploading to Cloudflare. Runs in parallel with other checks (only waits
    # for frontend-build to produce the artifact) so failures are surfaced fast.
    verify-deploy:
        name: Verify Worker Build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: [frontend-build]
        if: github.event_name == 'pull_request'
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Validate wrangler.toml has no placeholder binding IDs
              run: |
                  if grep -P 'id\s*=\s*"0{10,}' wrangler.toml; then
                      echo "❌ wrangler.toml contains placeholder binding IDs (all-zeros pattern)!"
                      echo "Create real namespaces/resources and update wrangler.toml before merging."
                      exit 1
                  fi
                  echo "✅ No placeholder binding IDs in wrangler.toml"

            - name: Load environment variables
              uses: ./.github/actions/setup-env

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Download frontend build artifact
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  name: frontend-dist
                  path: frontend/dist/

            - name: Verify worker build (dry run)
              run: deno task wrangler:verify

    # Deploy jobs only run on main pushes
    deploy:
        name: Deploy to Cloudflare
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: [ci-gate]
        # Must use always() because ci-gate depends on verify-deploy which is skipped on push.
        # Without always(), GitHub Actions skips downstream jobs due to transitive skip behavior.
        if: >-
            always() &&
            needs.ci-gate.result == 'success' &&
            github.event_name == 'push' &&
            github.ref == 'refs/heads/main'
        permissions:
            contents: read
        env:
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
            CF_WEB_ANALYTICS_TOKEN: ${{ secrets.CF_WEB_ANALYTICS_TOKEN }}
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Load environment variables
              uses: ./.github/actions/setup-env

            - name: Setup Deno environment
              uses: ./.github/actions/setup-deno-env
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Download frontend build artifact
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
              with:
                  name: frontend-dist
                  path: frontend/dist/

            - name: Run database migrations
              run: |
                  echo "Running D1 migrations..."
                  run_migration() {
                      local file="$1"
                      local output
                      if output=$(deno task wrangler d1 execute adblock-compiler-d1-database --file="$file" --remote 2>&1); then
                          echo "✅ Applied: $file"
                      elif echo "$output" | grep -qiE '\balready applied\b'; then
                          echo "⏭️  Already applied: $file"
                          echo "$output"
                      elif echo "$output" | grep -qiE 'Authentication error'; then
                          echo "❌ Migration failed: $file"
                          echo "$output"
                          echo ""
                          echo "🔐 CLOUDFLARE_API_TOKEN is missing D1:Edit permission."
                          echo "   Update your API token at: https://dash.cloudflare.com/profile/api-tokens"
                          echo "   Required permissions: D1:Edit (for database migrations)"
                          exit 1
                      else
                          echo "❌ Migration failed: $file"
                          echo "$output"
                          exit 1
                      fi
                  }
                  run_migration migrations/0001_init.sql
                  run_migration migrations/0002_deployment_history.sql

            - name: Generate deployment version
              id: version
              run: |
                  deno run --allow-read --allow-write --allow-net --allow-env scripts/generate-deployment-version.ts

            - name: Setup Cloudflare resources
              run: |
                  echo "Creating Cloudflare resources..."
                  deno task wrangler queues create adblock-compiler-worker-queue 2>/dev/null || echo "Queue already exists"
                  deno task wrangler queues create adblock-compiler-worker-queue-high-priority 2>/dev/null || echo "High priority queue already exists"
                  deno task wrangler queues create adblock-compiler-dlq 2>/dev/null || echo "DLQ already exists"
                  deno task wrangler r2 bucket create adblock-compiler-r2-storage 2>/dev/null || echo "R2 bucket already exists"

            - name: Deploy Tail Worker
              if: env.CLOUDFLARE_API_TOKEN != ''
              run: |
                  echo "Deploying tail worker (adblock-compiler-tail)..."
                  deno task wrangler:tail:deploy

            - name: Verify Docker for container build
              if: env.CLOUDFLARE_API_TOKEN != ''
              run: |
                  echo "Checking Docker availability for Cloudflare Containers build..."
                  docker info
                  echo "✅ Docker is available"

            - name: Deploy Worker
              id: deploy
              if: env.CLOUDFLARE_API_TOKEN != ''
              run: |
                  echo "Deploying version: ${{ steps.version.outputs.full_version }}"
                  deno task wrangler:deploy

            - name: Record deployment
              if: success() && env.CLOUDFLARE_API_TOKEN != ''
              run: |
                  deno run --allow-read --allow-net --allow-env scripts/record-deployment.ts --status=success

            - name: Record failed deployment
              if: failure() && env.CLOUDFLARE_API_TOKEN != ''
              run: |
                  deno run --allow-read --allow-net --allow-env scripts/record-deployment.ts --status=failed || true
