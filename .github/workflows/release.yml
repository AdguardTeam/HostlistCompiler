name: Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            version:
                description: 'Version to release (e.g., 0.8.0)'
                required: true
                type: string

env:
    DENO_VERSION: '2.x'

permissions:
    contents: write
    packages: write

jobs:
    # Validate before building anything
    validate:
        name: Validate Release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Cache Deno dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/deno
                      ~/.deno
                  key: deno-${{ runner.os }}-${{ hashFiles('deno.json', 'deno.lock') }}
                  restore-keys: |
                      deno-${{ runner.os }}-

            - name: Install dependencies
              run: |
                  deno install
                  deno cache src/index.ts src/cli.ts
              env:
                  DENO_TLS_CA_STORE: system

            # fmt and lint are already enforced by ci.yml before any tag reaches here;
            # only type-check and test are needed as a safety net at release time.
            - name: Run validation
              run: |
                  deno check src/index.ts src/cli.ts
                  deno test --allow-read --allow-write --allow-net --allow-env

    build-binaries:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        needs: validate
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: adblock-compiler-linux-x64
                      compressed_artifact: adblock-compiler-linux-x64.tar.gz
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: adblock-compiler-linux-arm64
                      compressed_artifact: adblock-compiler-linux-arm64.tar.gz
                    - target: x86_64-apple-darwin
                      os: macos-15-intel
                      artifact: adblock-compiler-macos-x64
                      compressed_artifact: adblock-compiler-macos-x64.tar.gz
                    - target: aarch64-apple-darwin
                      os: macos-14
                      artifact: adblock-compiler-macos-arm64
                      compressed_artifact: adblock-compiler-macos-arm64.tar.gz
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                      artifact: adblock-compiler-windows-x64.exe
                      compressed_artifact: adblock-compiler-windows-x64.exe.zip
        steps:
            - name: Configure git for long paths (Windows)
              if: runner.os == 'Windows'
              run: git config --global core.longpaths true

            - uses: actions/checkout@v4

            - name: Setup Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: ${{ env.DENO_VERSION }}

            - name: Cache Deno dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cache/deno
                      ~/.deno
                  key: deno-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('deno.json', 'deno.lock') }}
                  restore-keys: |
                      deno-${{ runner.os }}-${{ matrix.target }}-
                      deno-${{ runner.os }}-

            - name: Install dependencies
              run: deno install
              env:
                  DENO_TLS_CA_STORE: system

            - name: Build binary
              run: deno compile --allow-read --allow-write --allow-net --target ${{ matrix.target }} --output ${{ matrix.artifact }} src/cli.ts

            - name: Compress artifact
              shell: bash
              run: |
                  mkdir -p compressed
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    7z a "compressed/${{ matrix.compressed_artifact }}" "${{ matrix.artifact }}"
                  else
                    tar -czf "compressed/${{ matrix.compressed_artifact }}" "${{ matrix.artifact }}"
                  fi

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: compressed/*
                  retention-days: 7

    build-docker:
        name: Build Docker Image
        runs-on: ubuntu-latest
        needs: validate
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - name: Get version
              id: version
              run: |
                  set -euo pipefail
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    VERSION="${{ inputs.version }}"
                  else
                    VERSION="${GITHUB_REF#refs/tags/v}"
                  fi
                  
                  # Validate version format (must not start with . and must be semver-like)
                  if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
                    echo "Error: Invalid version format '$VERSION'. Must start with a number (e.g., 0.11.6 or 0.11.6-beta.1)" >&2
                    echo "If this is a tag issue, the tag may have been created incorrectly (e.g., 'v.0.11.6' instead of 'v0.11.6')" >&2
                    exit 1
                  fi
                  
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  # Multi-platform build includes ARM64 which uses QEMU emulation and builds slower
                  # To speed up builds, change to: platforms: linux/amd64
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
                      ghcr.io/${{ github.repository }}:latest
                  labels: |
                      org.opencontainers.image.version=${{ steps.version.outputs.version }}
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    build-docs-pdf:
        name: Build Documentation PDF
        runs-on: ubuntu-latest
        needs: validate
        steps:
            - uses: actions/checkout@v4

            - name: Install mdBook, mdbook-mermaid, and mdbook-pdf
              run: |
                  MDBOOK_VERSION=0.4.40
                  curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o mdbook.tar.gz
                  tar xzf mdbook.tar.gz
                  sudo mv mdbook /usr/local/bin/
                  rm mdbook.tar.gz

                  MERMAID_VERSION=0.14.0
                  curl -fsSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MERMAID_VERSION}/mdbook-mermaid-v${MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o mdbook-mermaid.tar.gz
                  mkdir -p /tmp/mdbook-mermaid-install
                  tar xzf mdbook-mermaid.tar.gz -C /tmp/mdbook-mermaid-install
                  sudo mv /tmp/mdbook-mermaid-install/mdbook-mermaid /usr/local/bin/
                  rm -rf mdbook-mermaid.tar.gz /tmp/mdbook-mermaid-install

                  MDBOOK_PDF_VERSION=0.1.10
                  curl -fsSL "https://github.com/HollowMan6/mdbook-pdf/releases/download/v${MDBOOK_PDF_VERSION}/mdbook-pdf" -o mdbook-pdf
                  chmod +x mdbook-pdf
                  sudo mv mdbook-pdf /usr/local/bin/
                  # Chromium is pre-installed on GitHub-hosted ubuntu-latest runners

            - name: Build documentation PDF
              run: mdbook build

            - name: Rename PDF for release
              run: |
                  set -euo pipefail
                  mkdir -p pdf-release
                  if [ -f "book/pdf/adblock-compiler.pdf" ]; then
                    cp book/pdf/adblock-compiler.pdf pdf-release/adblock-compiler-docs.pdf
                    echo "✅ PDF ready for release"
                  else
                    echo "⚠️ PDF not found — skipping"
                  fi

            - name: Upload PDF artifact
              uses: actions/upload-artifact@v4
              with:
                  name: adblock-compiler-docs-pdf
                  path: pdf-release/adblock-compiler-docs.pdf
                  retention-days: 7
                  if-no-files-found: warn

    create-release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: [build-binaries, build-docker, build-docs-pdf]
        steps:
            - uses: actions/checkout@v4

            - name: Get version
              id: version
              run: |
                  set -euo pipefail
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
                    echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
                    echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  pattern: adblock-compiler-*
                  merge-multiple: true

            - name: Prepare release assets
              run: |
                  set -euo pipefail
                  mkdir -p release
                  for dir in artifacts/*/; do
                    for file in "$dir"*.tar.gz "$dir"*.zip "$dir"*.pdf; do
                      [ -f "$file" ] && cp "$file" "release/$(basename "$file")"
                    done
                  done
                  ls -lah release/

            - name: Generate release notes
              id: notes
              run: |
                  set -euo pipefail
                  cat << 'EOF' > release-notes.md
                  ## What's Changed

                  See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for detailed changes.

                  ## Installation

                  ### JSR (Deno)
                  ```bash
                  deno add @jk-com/adblock-compiler
                  ```

                  ### Docker
                  ```bash
                  docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
                  ```

                  ### Binary Downloads
                  Download the appropriate binary for your platform from the assets below.

                  | Platform | Architecture | Download |
                  |----------|--------------|----------|
                  | Linux | x64 | `adblock-compiler-linux-x64.tar.gz` |
                  | Linux | ARM64 | `adblock-compiler-linux-arm64.tar.gz` |
                  | macOS | x64 (Intel) | `adblock-compiler-macos-x64.tar.gz` |
                  | macOS | ARM64 (Apple Silicon) | `adblock-compiler-macos-arm64.tar.gz` |
                  | Windows | x64 | `adblock-compiler-windows-x64.exe.zip` |
                  | Documentation | PDF | `adblock-compiler-docs.pdf` |

                  ### Extracting

                  **Linux/macOS:** `tar -xzf adblock-compiler-<platform>.tar.gz`
                  **Windows:** Extract the `.zip` file using File Explorer or `Expand-Archive` in PowerShell.

                  ## Checksums
                  ```
                  EOF
                  cd release
                  if [ -n "$(ls -A 2>/dev/null)" ]; then
                      sha256sum ./* >> ../release-notes.md 2>/dev/null || shasum -a 256 ./* >> ../release-notes.md
                  else
                      echo 'No binary artifacts were generated; no checksums available.' >> ../release-notes.md
                  fi
                  echo '```' >> ../release-notes.md

            - name: Create tag (workflow_dispatch only)
              if: github.event_name == 'workflow_dispatch'
              run: |
                  set -euo pipefail
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git fetch --tags
                  TAG_NAME="${{ steps.version.outputs.tag }}"
                  VERSION="${{ steps.version.outputs.version }}"
                  if [ -n "$(git tag -l \"$TAG_NAME\")" ]; then
                    echo "Tag $TAG_NAME already exists locally, skipping creation."
                  else
                    echo "Creating new tag $TAG_NAME for version $VERSION."
                    git tag -a "$TAG_NAME" -m "Release $VERSION"
                  fi
                  if git ls-remote --exit-code --tags origin "$TAG_NAME" >/dev/null 2>&1; then
                    echo "Tag $TAG_NAME already exists on origin, skipping push."
                  else
                    echo "Pushing tag $TAG_NAME to origin."
                    git push origin "$TAG_NAME"
                  fi

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  name: v${{ steps.version.outputs.version }}
                  body_path: release-notes.md
                  files: release/*
                  draft: false
                  prerelease: ${{ contains(steps.version.outputs.version, '-') }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
