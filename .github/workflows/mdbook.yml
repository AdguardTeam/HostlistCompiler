name: Build & Deploy mdBook

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'book.toml'
      - '.github/workflows/mdbook.yml'
  workflow_dispatch:

env:
  CLOUDFLARE_PAGES_PROJECT: adblock-compiler-docs

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install mdBook
        run: |
          MDBOOK_VERSION=0.4.40
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o mdbook.tar.gz
          tar xzf mdbook.tar.gz
          sudo mv mdbook /usr/local/bin/
          rm mdbook.tar.gz

          MERMAID_VERSION=0.14.0
          curl -fsSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MERMAID_VERSION}/mdbook-mermaid-v${MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o mdbook-mermaid.tar.gz
          mkdir -p /tmp/mdbook-mermaid-install
          tar xzf mdbook-mermaid.tar.gz -C /tmp/mdbook-mermaid-install
          sudo mv /tmp/mdbook-mermaid-install/mdbook-mermaid /usr/local/bin/
          rm -rf mdbook-mermaid.tar.gz /tmp/mdbook-mermaid-install

      - name: Install mdbook-pdf and Chromium
        run: |
          MDBOOK_PDF_VERSION=0.1.10
          curl -fsSL "https://github.com/HollowMan6/mdbook-pdf/releases/download/v${MDBOOK_PDF_VERSION}/mdbook-pdf" -o mdbook-pdf
          chmod +x mdbook-pdf
          sudo mv mdbook-pdf /usr/local/bin/

          # Install Chromium for headless PDF rendering
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends chromium-browser || \
            sudo apt-get install -y --no-install-recommends chromium

      - name: Set up Deno
        uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-docs-${{ runner.os }}-${{ hashFiles('deno.json', 'deno.lock') }}
          restore-keys: |
            deno-docs-${{ runner.os }}-
            deno-${{ runner.os }}-

      - name: Build mdBook
        run: mdbook build

      - name: Prepare PDF for deployment
        run: |
          set -euo pipefail
          PDF_PATH="book/pdf/adblock-compiler.pdf"
          if [ -f "$PDF_PATH" ]; then
            echo "✅ PDF ready at $PDF_PATH"
          else
            echo "⚠️ PDF not found at $PDF_PATH — skipping"
          fi

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: adblock-compiler-docs-pdf
          path: book/pdf/adblock-compiler.pdf
          retention-days: 90
          if-no-files-found: warn

      - name: Generate TypeScript API reference
        continue-on-error: true
        run: deno task docs:api

      - name: Create Pages project if needed
        run: |
          set -euo pipefail
          # shellcheck source=.github/scripts/retry.sh
          source .github/scripts/retry.sh
          echo "Checking if Pages project exists..."
          PROJECT_LIST=$(
            {
              retry_command 3 15 deno task wrangler pages project list
            } 2>&1
          ) || {
            echo "Warning: Could not list Pages projects after retries (API may be temporarily unavailable)."
            echo "Skipping project creation check - will attempt deployment directly."
            exit 0
          }
          if echo "$PROJECT_LIST" | grep -q "${{ env.CLOUDFLARE_PAGES_PROJECT }}"; then
            echo "Pages project already exists"
          else
            echo "Creating Pages project: ${{ env.CLOUDFLARE_PAGES_PROJECT }}"
            retry_command 3 15 deno task wrangler pages project create "${{ env.CLOUDFLARE_PAGES_PROJECT }}" --production-branch main || {
              echo "Warning: Could not create Pages project after retries. Attempting deployment anyway."
              exit 0
            }
            echo "Pages project created"
          fi

      - name: Deploy to Cloudflare Pages
        run: |
          set -euo pipefail
          # shellcheck source=.github/scripts/retry.sh
          source .github/scripts/retry.sh
          echo "Deploying documentation to Cloudflare Pages..."
          retry_command 3 15 deno task wrangler pages deploy book \
            --project-name="${{ env.CLOUDFLARE_PAGES_PROJECT }}" \
            --branch=main \
            --commit-dirty=true
          echo "✅ Documentation deployed successfully"

