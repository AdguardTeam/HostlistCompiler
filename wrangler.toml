name = "adblock-compiler"
main = "worker/worker.ts"
compatibility_date = "2024-01-01"

# Enable the Workers runtime
workers_dev = true

# Build configuration
# Builds Angular frontend and generates static assets for deployment.
# Wrangler calls this command automatically on `wrangler deploy`.
# Falls back to Vite build during migration if Angular build is not available.
[build]
command = "npm --prefix frontend install && npm --prefix frontend run build"

[browser]
binding = "BROWSER"

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
head_sampling_rate = 1
persist = true

# KV bindings for caching and rate limiting
[[kv_namespaces]]
binding = "COMPILATION_CACHE"
id = "7772628dc4ae46fbb145a811d2de351e"  # Create with: wrangler kv:namespace create COMPILATION_CACHE

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "5dc36da36d9142cc9ced6c56328898ee"  # Create with: wrangler kv:namespace create RATE_LIMIT

[[kv_namespaces]]
binding = "METRICS"
id = "025c3f10527c46c0be559f299bdba994"  # Create with: wrangler kv:namespace create METRICS

# R2 Storage (auto-created by CI)
[[r2_buckets]]
binding = "FILTER_STORAGE"
bucket_name = "adblock-compiler-r2-storage"

# Durable Objects - uncomment if using DO for state management
[[durable_objects.bindings]]
class_name = "AdblockCompiler"
name = "ADBLOCK_COMPILER"

# Containers configuration for AdblockCompiler
[[containers]]
class_name = "AdblockCompiler"
image = "./Dockerfile"
max_instances = 5
instance_type = "basic"

# Database migrations - each must have a unique tag
[[migrations]]
new_sqlite_classes = ["AdblockCompiler"]
tag = "v1"

# Environment variables (base - overridden by env.* sections)
[vars]
# IMPORTANT: This version should match the VERSION constant in src/version.ts (single source of truth)
# To update: change VERSION in src/version.ts, then run `deno task version:sync` to propagate changes
# The worker will fall back to src/version.ts if this is not set
COMPILER_VERSION = "0.37.0"
# TURNSTILE_SITE_KEY, ADMIN_KEY, etc. are loaded from .env files via .envrc
# For local dev: managed by .env.development and .env.local
# For production: managed via Cloudflare secrets (wrangler secret put ADMIN_KEY)

[[d1_databases]]
binding = "DB"
database_name = "adblock-compiler-d1-database"
database_id = "3e8e7dfe-3213-452a-a671-6c18e6e74ce5"

# Static assets — served from the Angular production build output.
# Run `npm --prefix frontend run build` to generate assets before deploying.
# For local dev: `npm --prefix frontend start` for Angular dev server.
[assets]
directory = "./frontend/dist/adblock-compiler-poc/browser"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
# SPA fallback: serve root index.html for any path that doesn't match a static file.
# Required for Angular's client-side router — /compiler, /performance, /validation,
# /api-docs, and /admin are all handled by Angular, not by physical HTML files.
not_found_handling = "single-page-application"

# Tail Workers - uncomment after creating the tail worker service
[[tail_consumers]]
service = "adblock-compiler-tail"

# Queues - commented out until queues are created in Cloudflare dashboard
# To enable queues, first create them in Cloudflare dashboard or run:
#   wrangler queues create adblock-compiler-worker-queue
#   wrangler queues create adblock-compiler-worker-queue-high-priority
#   wrangler queues create adblock-compiler-dlq
#
[[queues.producers]]
queue = "adblock-compiler-worker-queue"
binding = "ADBLOCK_COMPILER_QUEUE"
#
[[queues.producers]]
queue = "adblock-compiler-worker-queue-high-priority"
binding = "ADBLOCK_COMPILER_QUEUE_HIGH_PRIORITY"
#
[[queues.consumers]]
queue = "adblock-compiler-worker-queue"
max_batch_size = 10
max_batch_timeout = 5
dead_letter_queue = "adblock-compiler-dlq"
#
[[queues.consumers]]
queue = "adblock-compiler-worker-queue-high-priority"
max_batch_size = 5
max_batch_timeout = 2
dead_letter_queue = "adblock-compiler-dlq"

# Development settings
# Environment variables are loaded from .env via .envrc
[dev]
port = 8787
local_protocol = "http"
enable_containers = false  # Containers not supported on Windows - use WSL or deploy to test

# Development environment (dev/develop branches)
[env.development]
vars = { ENVIRONMENT = "development" }
# KV namespaces for development
[[env.development.kv_namespaces]]
binding = "COMPILATION_CACHE"
id = "7772628dc4ae46fbb145a811d2de351e"

[[env.development.kv_namespaces]]
binding = "RATE_LIMIT"
id = "5dc36da36d9142cc9ced6c56328898ee"

[[env.development.kv_namespaces]]
binding = "METRICS"
id = "025c3f10527c46c0be559f299bdba994"

# Production environment (main branch)
[env.production]
vars = { ENVIRONMENT = "production" }
tail_consumers = [{ service = "adblock-compiler-tail" }]
# Production secrets MUST be set via: wrangler secret put <KEY_NAME> --env production

# Analytics Engine - uncomment after enabling in Cloudflare dashboard
[[analytics_engine_datasets]]
binding = "ANALYTICS_ENGINE"
dataset = "adguard-compiler-analytics-engine"

# ============================================================================
# Cloudflare Workflows - Durable execution for async operations
# ============================================================================
# Workflows provide crash-resistant, automatically resumable execution
# with built-in retry logic and step-by-step checkpointing.
#
# Benefits over queue-based processing:
# - Automatic state persistence between steps
# - Crash recovery - resumes from last successful step
# - Built-in retry with configurable policies
# - Observable step-by-step progress
# - Reliable scheduled execution with cron triggers

# Compilation Workflow - Handles single async compilations with durability
[[workflows]]
name = "compilation-workflow"
binding = "COMPILATION_WORKFLOW"
class_name = "CompilationWorkflow"

# Batch Compilation Workflow - Handles batch compilations with per-item recovery
[[workflows]]
name = "batch-compilation-workflow"
binding = "BATCH_COMPILATION_WORKFLOW"
class_name = "BatchCompilationWorkflow"

# Cache Warming Workflow - Pre-populates cache on schedule
[[workflows]]
name = "cache-warming-workflow"
binding = "CACHE_WARMING_WORKFLOW"
class_name = "CacheWarmingWorkflow"

# Health Monitoring Workflow - Monitors source health on schedule
[[workflows]]
name = "health-monitoring-workflow"
binding = "HEALTH_MONITORING_WORKFLOW"
class_name = "HealthMonitoringWorkflow"

# Hyperdrive configuration — PlanetScale PostgreSQL (production)
# Production connection string is configured via `wrangler hyperdrive update`.
# Local dev uses localConnectionString which points to a local PostgreSQL instance.
# See docs/database-setup/local-dev.md for setup instructions.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "126a652809674e4abc722e9777ee4140"
localConnectionString = "postgresql://<user>:<password>@127.0.0.1:5432/adblock_dev"

# ============================================================================
# Cron Triggers for Scheduled Workflows
# ============================================================================
# Cron triggers automatically invoke workflows on schedule

[triggers]
# Cache warming every 6 hours
# Health monitoring every hour
crons = [
    "0 */6 * * *",   # Cache warming: At minute 0 past every 6th hour
    "0 * * * *",     # Health monitoring: At minute 0 past every hour
]
