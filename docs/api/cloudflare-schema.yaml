        AdminQueryResponse:
            type: object
            properties:
                success:
                    type: boolean
                rows:
                    type: array
                    items:
                        type: object
                        additionalProperties: true
                rowCount:
                    type: integer
                meta:
                    type: object
                    description: 'Query metadata (e.g., column names, types, execution time)'
                    additionalProperties: true
        WorkflowStartResponse:
            type: object
            properties:
                success:
                    type: boolean
                message:
                    type: string
                workflowId:
                    type: string
                workflowType:
                    type: string
                    enum:
                        - compilation
                        - batch-compilation
                        - cache-warming
                        - health-monitoring
                batchSize:
                    type: integer
                    description: Number of items in the batch (batch workflows only)
                configurationsCount:
                    type: string
                    description: >-
                        Number of configurations to warm, or 'default' for all default configurations (cache-warming
                        only)
                sourcesCount:
                    type: string
                    description: 'Number of sources to check, or ''default'' for all default sources (health-monitoring only)'
        CacheWarmRequest:
            type: object
            properties:
                configurations:
                    type: array
                    items:
                        $ref: '#/components/schemas/Configuration'
                    description: Configurations to warm (uses defaults if empty)
        HealthCheckRequest:
            type: object
            properties:
                sources:
                    type: array
                    items:
                        type: object
                        required:
                            - name
                            - url
                        properties:
                            name:
                                type: string
                            url:
                                type: string
                                format: uri
                            expectedMinRules:
                                type: integer
                    description: Sources to health-check (uses defaults if empty)
                alertOnFailure:
                    type: boolean
                    default: true
        WorkflowStatusResponse:
            type: object
            properties:
                success:
                    type: boolean
                workflowId:
                    type: string
                workflowType:
                    type: string
                status:
                    type: string
                    enum:
                        - queued
                        - running
                        - completed
                        - failed
                        - paused
                        - terminated
                output:
                    type: object
                    nullable: true
                error:
                    type: string
                    nullable: true
        WorkflowMetricsResponse:
            type: object
            properties:
                success:
                    type: boolean
                timestamp:
                    type: string
                    format: date-time
                workflows:
                    type: object
                    description: Metrics grouped by workflow type
                    properties:
                        compilation:
                            type: object
                            description: 'Compilation workflow metrics (e.g., count, success rate, avg duration)'
                            additionalProperties: true
                        batchCompilation:
                            type: object
                            description: Batch compilation workflow metrics
                            additionalProperties: true
                        cacheWarming:
                            type: object
                            description: Cache warming workflow metrics
                            additionalProperties: true
                        healthMonitoring:
                            type: object
                            description: Health monitoring workflow metrics
                            additionalProperties: true
        WorkflowEventsResponse:
            type: object
            properties:
                success:
                    type: boolean
                workflowId:
                    type: string
                workflowType:
                    type: string
                startedAt:
                    type: string
                    format: date-time
                completedAt:
                    type: string
                    format: date-time
                    nullable: true
                progress:
                    type: number
                    minimum: 0
                    maximum: 100
                isComplete:
                    type: boolean
                events:
                    type: array
                    items:
                        $ref: '#/components/schemas/WorkflowEvent'
        WorkflowEvent:
            type: object
            properties:
                type:
                    type: string
                workflowId:
                    type: string
                workflowType:
                    type: string
                timestamp:
                    type: string
                    format: date-time
                step:
                    type: string
                progress:
                    type: number
                    minimum: 0
                    maximum: 100
                message:
                    type: string
                data:
                    type: object
                    description: Step-specific data (structure varies by workflow type and step)
                    additionalProperties: true
        HealthLatestResponse:
            type: object
            required:
                - success
            properties:
                success:
                    type: boolean
                message:
                    type: string
                    description: Present when no health data is available
                timestamp:
                    type: string
                    format: date-time
                    description: ISO timestamp of when this health check ran
                runId:
                    type: string
                    description: Unique identifier for the health monitoring workflow run
                results:
                    type: array
                    description: Per-source health check results
                    items:
                        $ref: '#/components/schemas/SourceHealthResult'
                summary:
                    type: object
                    description: Aggregate counts for the health check run
                    properties:
                        total:
                            type: integer
                        healthy:
                            type: integer
                        unhealthy:
                            type: integer
        SourceHealthResult:
            type: object
            required:
                - name
                - url
                - healthy
                - lastChecked
            properties:
                name:
                    type: string
                url:
                    type: string
                healthy:
                    type: boolean
                statusCode:
                    type: integer
                    nullable: true
                responseTimeMs:
                    type: number
                    nullable: true
                ruleCount:
                    type: integer
                    nullable: true
                error:
                    type: string
                    nullable: true
                lastChecked:
                    type: string
                    format: date-time
        HealthResponse:
            type: object
            properties:
                status:
                    type: string
                    enum:
                        - healthy
                version:
                    type: string
                    description: Current service version
        CreateUserRequest:
            type: object
            required:
                - email
            properties:
                email:
                    type: string
                    format: email
                    description: User email address
                displayName:
                    type: string
                    description: Display name
                role:
                    type: string
                    enum:
                        - admin
                        - user
                        - readonly
                    default: user
                    description: User role
        CreateUserResponse:
            type: object
            properties:
                success:
                    type: boolean
                data:
                    type: object
                    properties:
                        user:
                            type: object
                            properties:
                                id:
                                    type: string
                                    format: uuid
                                email:
                                    type: string
                                    format: email
                                role:
                                    type: string
        CreateApiKeyRequest:
            type: object
            required:
                - userId
                - name
            properties:
                userId:
                    type: string
                    format: uuid
                    description: ID of the user to create the key for
                name:
                    type: string
                    description: Descriptive name for the API key
                scopes:
                    type: array
                    items:
                        type: string
                    description: Permission scopes for the key
                rateLimitPerMinute:
                    type: integer
                    description: Rate limit override for this key
                expiresAt:
                    type: string
                    format: date-time
                    description: Expiry date for the key
        CreateApiKeyResponse:
            type: object
            properties:
                success:
                    type: boolean
                data:
                    type: object
                    properties:
                        id:
                            type: string
                            format: uuid
                        apiKey:
                            type: string
                            description: The raw API key (only returned once — store securely)
                        keyPrefix:
                            type: string
                            description: Prefix for identifying the key
                        name:
                            type: string
                        scopes:
                            type: array
                            items:
                                type: string
                        message:
                            type: string
        ListApiKeysResponse:
            type: object
            properties:
                success:
                    type: boolean
                data:
                    type: object
                    properties:
                        keys:
                            type: array
                            items:
                                $ref: '#/components/schemas/ApiKeyInfo'
                        count:
                            type: integer
        ApiKeyInfo:
            type: object
            properties:
                id:
                    type: string
                    format: uuid
                name:
                    type: string
                keyPrefix:
                    type: string
                scopes:
                    type: array
                    items:
                        type: string
                rateLimitPerMinute:
                    type: integer
                createdAt:
                    type: string
                    format: date-time
                expiresAt:
                    type: string
                    format: date-time
                    nullable: true
                revokedAt:
                    type: string
                    format: date-time
                    nullable: true
                lastUsedAt:
                    type: string
                    format: date-time
                    nullable: true
                status:
                    type: string
                    enum:
                        - active
                        - expired
                        - revoked
        RevokeApiKeyRequest:
            type: object
            properties:
                apiKeyId:
                    type: string
                    format: uuid
                    description: ID of the API key to revoke
                keyPrefix:
                    type: string
                    description: Prefix of the API key to revoke
        RevokeApiKeyResponse:
            type: object
            properties:
                success:
                    type: boolean
                data:
                    type: object
                    properties:
                        revoked:
                            type: boolean
        ValidateApiKeyRequest:
            type: object
            required:
                - apiKey
            properties:
                apiKey:
                    type: string
                    description: The API key to validate
        ValidateApiKeyResponse:
            type: object
            properties:
                success:
                    type: boolean
                data:
                    type: object
                    properties:
                        valid:
                            type: boolean
                        keyPrefix:
                            type: string
                        name:
                            type: string
                        scopes:
                            type: array
                            items:
                                type: string
                        userEmail:
                            type: string
                        status:
                            type: string
                            enum:
                                - active
                                - expired
                                - revoked
                        error:
                            type: string
                            description: Present when valid is false
        MigrationResult:
            type: object
            properties:
                success:
                    type: boolean
                data:
                    type: object
                    properties:
                        dryRun:
                            type: boolean
                        startedAt:
                            type: string
                            format: date-time
                        completedAt:
                            type: string
                            format: date-time
                        totalDurationMs:
                            type: integer
                        tables:
                            type: array
                            items:
                                $ref: '#/components/schemas/MigrationTableStats'
                        errors:
                            type: array
                            items:
                                type: string
                        summary:
                            type: string
                            description: Human-readable summary (omitted for dry runs)
                        message:
                            type: string
                            description: Present for dry runs
        MigrationTableStats:
            type: object
            properties:
                table:
                    type: string
                sourceCount:
                    type: integer
                migratedCount:
                    type: integer
                skippedCount:
                    type: integer
                errorCount:
                    type: integer
                durationMs:
                    type: integer
        BackendStatusResponse:
            type: object
            properties:
                success:
                    type: boolean
                data:
                    type: object
                    properties:
                        backends:
                            type: object
                            properties:
                                d1:
                                    $ref: '#/components/schemas/BackendHealth'
                                postgresql:
                                    $ref: '#/components/schemas/BackendHealth'
                        primary:
                            type: string
                            enum:
                                - d1
                                - postgresql
                            description: Currently active primary backend
                        timestamp:
                            type: string
                            format: date-time
        BackendHealth:
            type: object
            properties:
                available:
                    type: boolean
                latencyMs:
                    type: integer
                host:
                    type: string
                    description: Host name (PostgreSQL only)
                error:
                    type: string
                    description: Error message if unavailable
        PgStorageStatsResponse:
            type: object
            properties:
                success:
                    type: boolean
                data:
                    type: object
                    properties:
                        stats:
                            type: object
                            properties:
                                storage_entries:
                                    type: integer
                                filter_cache:
                                    type: integer
                                compilation_metadata:
                                    type: integer
                                expired_storage:
                                    type: integer
                                expired_cache:
                                    type: integer
                                users:
                                    type: integer
                                active_api_keys:
                                    type: integer
                        backend:
                            type: string
                            example: postgresql
                        host:
                            type: string
                        timestamp:
                            type: string
                            format: date-time
        WsCompileRequest:
            type: object
            required:
                - type
                - sessionId
                - configuration
            properties:
                type:
                    type: string
                    enum:
                        - compile
                sessionId:
                    type: string
                configuration:
                    $ref: '#/components/schemas/Configuration'
                preFetchedContent:
                    type: object
                    additionalProperties:
                        type: string
                benchmark:
                    type: boolean
        WsCancelRequest:
            type: object
            required:
                - type
                - sessionId
            properties:
                type:
                    type: string
                    enum:
                        - cancel
                sessionId:
                    type: string
        WsPingMessage:
            type: object
            required:
                - type
            properties:
                type:
                    type: string
                    enum:
                        - ping
        WsWelcomeMessage:
            type: object
            required:
                - type
                - version
                - connectionId
                - capabilities
            properties:
                type:
                    type: string
                    enum:
                        - welcome
                version:
                    type: string
                connectionId:
                    type: string
                capabilities:
                    type: object
                    properties:
                        maxConcurrentCompilations:
                            type: integer
                        supportsPauseResume:
                            type: boolean
                        supportsStreaming:
                            type: boolean
        WsPongMessage:
            type: object
            required:
                - type
            properties:
                type:
                    type: string
                    enum:
                        - pong
                timestamp:
                    type: string
        WsCompileStartedMessage:
            type: object
            required:
                - type
                - sessionId
                - configurationName
            properties:
                type:
                    type: string
                    enum:
                        - 'compile:started'
                sessionId:
                    type: string
                configurationName:
                    type: string
        WsEventMessage:
            type: object
            required:
                - type
                - sessionId
                - eventType
                - data
            properties:
                type:
                    type: string
                    enum:
                        - event
                sessionId:
                    type: string
                eventType:
                    type: string
                    enum:
                        - log
                        - 'source:start'
                        - 'source:complete'
                        - 'source:error'
                        - 'transformation:start'
                        - 'transformation:complete'
                        - progress
                        - result
                        - done
                        - error
                        - diagnostic
                        - cache
                        - network
                        - metric
                data:
                    type: object
        WsCompileCompleteMessage:
            type: object
            required:
                - type
                - sessionId
                - rules
                - ruleCount
            properties:
                type:
                    type: string
                    enum:
                        - 'compile:complete'
                sessionId:
                    type: string
                rules:
                    type: array
                    items:
                        type: string
                ruleCount:
                    type: integer
                metrics:
                    type: object
                compiledAt:
                    type: string
        WsCompileErrorMessage:
            type: object
            required:
                - type
                - sessionId
                - error
            properties:
                type:
                    type: string
                    enum:
                        - 'compile:error'
                sessionId:
                    type: string
                error:
                    type: string
                details:
                    type: object
    responses:
        BadRequestError:
            description: Bad request - request body failed schema validation
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            error:
                                type: string
                                example: Invalid request body
        RateLimitError:
            description: Rate limit exceeded
            headers:
                Retry-After:
                    schema:
                        type: integer
                    description: Seconds until retry allowed
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            error:
                                type: string
                                example: Rate limit exceeded. Maximum 10 requests per minute.
        CompilationError:
            description: Compilation failed
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            error:
                                type: string
        UnauthorizedError:
            description: Unauthorized - missing or invalid admin key
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            error:
                                type: string
        ServiceUnavailable:
            description: Service unavailable - required binding not configured
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            error:
                                type: string
    securitySchemes:
        Turnstile:
            type: apiKey
            in: header
            name: turnstileToken
            description: Cloudflare Turnstile token (if enabled on the server)
        AdminKey:
            type: apiKey
            in: header
            name: X-Admin-Key
            description: Admin API key for protected admin endpoints
security: []
