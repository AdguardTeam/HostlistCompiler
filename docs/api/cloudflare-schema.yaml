                    $ref: '#/components/responses/UnauthorizedError'
                '404':
                    description: User not found
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
        get:
            tags:
                - Admin
            summary: List API keys
            description: Lists API keys for a user (without key hashes). Requires Hyperdrive (PostgreSQL) binding.
            operationId: listApiKeys
            security:
                -
                    AdminKey: []
            parameters:
                -
                    name: userId
                    in: query
                    required: true
                    schema:
                        type: string
                        format: uuid
                    description: User ID to list API keys for
            responses:
                '200':
                    description: List of API keys
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListApiKeysResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
    /admin/auth/api-keys/revoke:
        post:
            tags:
                - Admin
            summary: Revoke API key
            description: Revokes an API key by ID or key prefix. Requires Hyperdrive (PostgreSQL) binding.
            operationId: revokeApiKey
            security:
                -
                    AdminKey: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RevokeApiKeyRequest'
            responses:
                '200':
                    description: API key revoked
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/RevokeApiKeyResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '404':
