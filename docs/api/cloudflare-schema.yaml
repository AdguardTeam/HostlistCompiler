    /admin/auth/api-keys/validate:
        post:
            tags:
                - Admin
            summary: Validate API key
            description: Validates an API key without authenticating a full request. Useful for the admin UI to test keys.
            operationId: validateApiKey
            security:
                -
                    AdminKey: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ValidateApiKeyRequest'
            responses:
                '200':
                    description: Validation result
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidateApiKeyResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
    /admin/migrate/d1-to-pg:
        post:
            tags:
                - Admin
            summary: Migrate D1 data to PostgreSQL
            description: >
                One-time migration that reads data from Cloudflare D1 (SQLite) and writes it to PostgreSQL via
                Hyperdrive.


                Migrates the following tables: `storage_entries`, `filter_cache`, `compilation_metadata`.


                The migration is:

                - **Idempotent**: uses ON CONFLICT DO NOTHING to skip existing rows

                - **Batched**: processes rows in chunks of 100

                - **Read-only on D1**: never modifies the source database

                - **Resumable**: can be re-run safely if interrupted
            operationId: migrateD1ToPg
            security:
                -
                    AdminKey: []
            parameters:
                -
                    name: dryRun
                    in: query
                    required: false
                    schema:
                        type: boolean
                        default: false
                    description: Count rows without writing (dry run)
                -
                    name: tables
                    in: query
                    required: false
                    schema:
                        type: string
                    description: 'Comma-separated list of tables to migrate (default: all)'
                    example: 'storage_entries,filter_cache'
            responses:
                '200':
                    description: Migration result
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MigrationResult'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
    /admin/backends:
        get:
            tags:
                - Admin
            summary: Backend health status
            description: Returns health and connectivity status of both D1 and PostgreSQL backends
            operationId: getBackendStatus
            security:
                -
                    AdminKey: []
            responses:
                '200':
                    description: Backend status
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/BackendStatusResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
    /admin/pg/stats:
        get:
            tags:
                - Admin
            summary: PostgreSQL storage statistics
            description: Returns storage statistics from the PostgreSQL backend (mirrors /admin/storage/stats for D1)
            operationId: getPgStorageStats
            security:
                -
                    AdminKey: []
            responses:
                '200':
                    description: PostgreSQL storage statistics
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PgStorageStatsResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
    /admin/pg/export:
        get:
            tags:
                - Admin
            summary: Export PostgreSQL data
            description: Exports data from the PostgreSQL backend (mirrors /admin/storage/export for D1)
            operationId: exportPgData
            security:
                -
                    AdminKey: []
            responses:
                '200':
                    description: PostgreSQL data export
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminExportResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
    /admin/pg/clear-expired:
        post:
            tags:
                - Admin
            summary: Clear expired PostgreSQL entries
            description: Deletes all expired entries from PostgreSQL storage and cache tables
            operationId: clearPgExpiredEntries
            security:
                -
                    AdminKey: []
            responses:
                '200':
                    description: Entries cleared
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminOperationResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
    /admin/pg/clear-cache:
        post:
            tags:
                - Admin
            summary: Clear PostgreSQL cache
            description: Deletes all cache entries from PostgreSQL tables
            operationId: clearPgCache
            security:
                -
                    AdminKey: []
            responses:
                '200':
                    description: Cache cleared
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminOperationResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
    /admin/pg/query:
        post:
            tags:
                - Admin
            summary: Execute read-only PostgreSQL query
            description: Executes a SELECT-only SQL query against PostgreSQL for debugging (mirrors /admin/storage/query for D1)
            operationId: queryPg
            security:
                -
                    AdminKey: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AdminQueryRequest'
            responses:
                '200':
                    description: Query results
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminQueryResponse'
                '400':
                    description: Invalid or disallowed SQL
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
components:
    schemas:
        CompileRequest:
            type: object
            required:
                - configuration
            properties:
                configuration:
                    $ref: '#/components/schemas/Configuration'
                preFetchedContent:
                    type: object
                    additionalProperties:
                        type: string
                    description: Map of source keys to pre-fetched content
                benchmark:
                    type: boolean
                    default: false
                    description: Include detailed performance metrics
                turnstileToken:
                    type: string
                    description: Cloudflare Turnstile token (if enabled)
                priority:
                    type: string
                    enum:
                        - standard
                        - high
                    default: standard
                    description: Job processing priority (used for async compilation)
        Configuration:
            type: object
            required:
                - name
                - sources
            properties:
                name:
                    type: string
                    minLength: 1
                    description: Name of the compiled list
                description:
                    type: string
                    description: Description of the list
                homepage:
                    type: string
                    format: uri
                    description: Homepage URL
                license:
                    type: string
                    description: License identifier
                version:
                    type: string
                    description: Version string
                sources:
                    type: array
                    items:
                        $ref: '#/components/schemas/Source'
                    minItems: 1
                transformations:
                    type: array
                    items:
                        $ref: '#/components/schemas/Transformation'
                    description: Global transformations to apply
                exclusions:
                    type: array
                    items:
                        type: string
                    description: Rules to exclude (supports wildcards and regex)
                exclusions_sources:
                    type: array
                    items:
                        type: string
                    description: Files containing exclusion rules
                inclusions:
                    type: array
                    items:
                        type: string
                    description: Rules to include (supports wildcards and regex)
                inclusions_sources:
                    type: array
                    items:
                        type: string
                    description: Files containing inclusion rules
        Source:
            type: object
            required:
                - source
            properties:
                source:
                    type: string
                    description: URL or key for pre-fetched content
                name:
                    type: string
                    description: Name of the source
                type:
                    type: string
                    enum:
                        - adblock
                        - hosts
                    default: adblock
                    description: Source type
                transformations:
                    type: array
                    items:
                        $ref: '#/components/schemas/Transformation'
                exclusions:
                    type: array
                    items:
                        type: string
                inclusions:
                    type: array
                    items:
                        type: string
        Transformation:
            type: string
            enum:
                - ConvertToAscii
                - RemoveComments
                - Compress
                - RemoveModifiers
                - Validate
                - ValidateAllowIp
                - Deduplicate
                - InvertAllow
                - RemoveEmptyLines
                - TrimLines
                - InsertFinalNewLine
            description: |
                Available transformations (applied in this order):
                - **ConvertToAscii**: Convert internationalized domains to ASCII
                - **RemoveComments**: Remove comment lines
                - **Compress**: Convert hosts format to adblock syntax
                - **RemoveModifiers**: Strip unsupported modifiers
                - **Validate**: Remove invalid/dangerous rules
                - **ValidateAllowIp**: Like Validate but keeps IP addresses
                - **Deduplicate**: Remove duplicate rules
                - **InvertAllow**: Convert blocking rules to allowlist
                - **RemoveEmptyLines**: Remove blank lines
                - **TrimLines**: Remove leading/trailing whitespace
                - **InsertFinalNewLine**: Add final newline
        BatchCompileRequest:
            type: object
            required:
                - requests
            properties:
                requests:
                    type: array
                    items:
                        $ref: '#/components/schemas/BatchRequestItem'
                    minItems: 1
                    maxItems: 10
        BatchRequestItem:
            type: object
            required:
                - id
                - configuration
            properties:
                id:
                    type: string
                    description: Unique request identifier
                configuration:
                    $ref: '#/components/schemas/Configuration'
                preFetchedContent:
                    type: object
                    additionalProperties:
                        type: string
                benchmark:
                    type: boolean
        CompileResponse:
            type: object
            required:
                - success
            properties:
                success:
                    type: boolean
                rules:
                    type: array
                    items:
                        type: string
                    description: Compiled filter rules
                ruleCount:
                    type: integer
                    description: Number of rules
                metrics:
                    $ref: '#/components/schemas/CompilationMetrics'
                compiledAt:
                    type: string
                    format: date-time
                previousVersion:
                    $ref: '#/components/schemas/PreviousVersion'
                cached:
                    type: boolean
                    description: Whether result was served from cache
                deduplicated:
                    type: boolean
                    description: Whether request was deduplicated
                error:
                    type: string
                    description: Error message if success=false
        CompilationMetrics:
            type: object
            properties:
                totalDurationMs:
                    type: integer
                sourceCount:
                    type: integer
                ruleCount:
                    type: integer
                transformationMetrics:
                    type: array
                    items:
                        type: object
                        properties:
                            name:
                                type: string
                            inputCount:
                                type: integer
                            outputCount:
                                type: integer
                            durationMs:
                                type: integer
        PreviousVersion:
            type: object
            properties:
                rules:
                    type: array
                    items:
                        type: string
                ruleCount:
                    type: integer
                compiledAt:
                    type: string
                    format: date-time
        BatchCompileResponse:
            type: object
            properties:
                success:
                    type: boolean
                results:
                    type: array
                    items:
                        allOf:
                            -
                                type: object
                                properties:
                                    id:
                                        type: string
                            -
                                $ref: '#/components/schemas/CompileResponse'
        QueueResponse:
            type: object
            properties:
                success:
                    type: boolean
                message:
                    type: string
                requestId:
                    type: string
                priority:
                    type: string
                    enum:
                        - standard
                        - high
                note:
                    type: string
                    description: Informational note about the queued job
                batchSize:
                    type: integer
                    description: Number of items in the batch (only for batch async requests)
        QueueJobStatus:
            type: object
            properties:
                success:
                    type: boolean
                status:
                    type: string
                    enum:
                        - completed
                        - failed
                        - not_found
                        - no_cache
                        - cache_miss
                jobInfo:
                    type: object
                    properties:
                        configName:
                            type: string
                        duration:
                            type: integer
                        timestamp:
                            type: string
                        error:
                            type: string
        QueueStats:
            type: object
            properties:
                pending:
                    type: integer
                completed:
                    type: integer
                failed:
                    type: integer
                cancelled:
                    type: integer
                totalProcessingTime:
                    type: integer
                averageProcessingTime:
                    type: integer
                processingRate:
                    type: number
                    description: Jobs per minute
                queueLag:
                    type: integer
                    description: Average time in queue (ms)
                lastUpdate:
                    type: string
                    format: date-time
                history:
                    type: array
                    items:
                        $ref: '#/components/schemas/JobHistoryEntry'
                depthHistory:
                    type: array
                    items:
                        type: object
                        properties:
                            timestamp:
                                type: string
                            pending:
                                type: integer
        JobHistoryEntry:
            type: object
            properties:
                requestId:
                    type: string
                configName:
                    type: string
                status:
                    type: string
                    enum:
                        - completed
                        - failed
                        - cancelled
                duration:
                    type: integer
                timestamp:
                    type: string
                error:
                    type: string
                ruleCount:
                    type: integer
        MetricsResponse:
            type: object
            properties:
                window:
                    type: string
                timestamp:
                    type: string
                    format: date-time
                endpoints:
                    type: object
                    additionalProperties:
                        type: object
                        properties:
                            count:
                                type: integer
                            success:
                                type: integer
                            failed:
                                type: integer
                            avgDuration:
                                type: number
                            errors:
                                type: object
                                additionalProperties:
                                    type: integer
        ApiInfo:
            type: object
            properties:
                name:
                    type: string
                version:
                    type: string
                endpoints:
                    type: object
                    additionalProperties:
                        type: string
                example:
                    type: object
        VersionResponse:
            type: object
            required:
                - success
                - version
            properties:
                success:
                    type: boolean
                version:
                    type: string
                    description: Semantic version string
                buildNumber:
                    type: integer
                fullVersion:
                    type: string
                    description: Full version string including build number
                gitCommit:
                    type: string
                gitBranch:
                    type: string
                deployedAt:
                    type: string
                    description: 'Deployment timestamp as stored by SQLite datetime(''now'') in ''YYYY-MM-DD HH:MM:SS'' format'
                deployedBy:
                    type: string
                status:
                    type: string
                message:
                    type: string
                    description: Present when no deployment history is available
        DeploymentHistoryResponse:
            type: object
            required:
                - success
                - deployments
                - count
            properties:
                success:
                    type: boolean
                deployments:
                    type: array
                    items:
                        $ref: '#/components/schemas/DeploymentInfo'
                count:
                    type: integer
                    description: Total number of deployments returned
        DeploymentStatsResponse:
            type: object
            required:
                - success
                - totalDeployments
                - successfulDeployments
                - failedDeployments
            properties:
                success:
                    type: boolean
                totalDeployments:
                    type: integer
                successfulDeployments:
                    type: integer
                failedDeployments:
                    type: integer
                latestVersion:
                    type: string
                    nullable: true
        TurnstileConfigResponse:
            type: object
            properties:
                siteKey:
                    type: string
                    nullable: true
                    description: Cloudflare Turnstile site key
                enabled:
                    type: boolean
                    description: Whether Turnstile verification is enabled
        DeploymentInfo:
            type: object
            required:
                - version
                - buildNumber
                - fullVersion
                - gitCommit
                - gitBranch
                - deployedAt
                - deployedBy
                - status
            properties:
                version:
                    type: string
                buildNumber:
                    type: integer
                fullVersion:
                    type: string
                gitCommit:
                    type: string
                gitBranch:
                    type: string
                deployedAt:
                    type: string
                    description: 'Deployment timestamp as stored by SQLite datetime(''now'') in ''YYYY-MM-DD HH:MM:SS'' format'
                deployedBy:
                    type: string
                status:
                    type: string
                metadata:
                    type: object
                    additionalProperties: true
                    nullable: true
        QueueHistoryResponse:
            type: object
            properties:
                history:
                    type: array
                    items:
                        $ref: '#/components/schemas/JobHistoryEntry'
                depthHistory:
                    type: array
                    items:
                        type: object
                        properties:
                            timestamp:
                                type: string
                            pending:
                                type: integer
        CancelJobResponse:
            type: object
            properties:
                success:
                    type: boolean
                message:
                    type: string
                note:
                    type: string
                    description: Note that job may still process if already started
        ASTParseRequest:
            type: object
            properties:
                rules:
                    type: array
                    items:
                        type: string
                    description: Array of filter rule strings to parse
                text:
                    type: string
                    description: Raw text containing filter rules (newline-separated)
            description: Either 'rules' or 'text' must be provided
        ASTParseResponse:
            type: object
            properties:
                success:
                    type: boolean
                parsedRules:
                    type: array
                    items:
                        type: object
                        additionalProperties: true
                    description: Array of parsed rule AST objects
                summary:
                    type: object
                    description: 'Summary statistics about the parsed rules (e.g., total rules, rule types, parse errors)'
                    additionalProperties: true
        AdminStorageStatsResponse:
            type: object
            properties:
                success:
                    type: boolean
                stats:
                    $ref: '#/components/schemas/StorageStats'
                timestamp:
                    type: string
                    format: date-time
        StorageStats:
            type: object
            properties:
                storage_entries:
                    type: integer
                filter_cache:
                    type: integer
                compilation_metadata:
                    type: integer
                expired_storage:
                    type: integer
                expired_cache:
                    type: integer
        AdminOperationResponse:
            type: object
            properties:
                success:
                    type: boolean
                deleted:
                    type: integer
                    description: Number of entries deleted (for clear operations)
                message:
                    type: string
        AdminExportResponse:
            type: object
            properties:
                success:
                    type: boolean
                exportedAt:
                    type: string
                    format: date-time
                storage_entries:
                    type: array
                    items:
                        type: object
                filter_cache:
                    type: array
                    items:
                        type: object
                compilation_metadata:
                    type: array
                    items:
                        type: object
        AdminTablesResponse:
            type: object
            properties:
                success:
                    type: boolean
                tables:
                    type: array
                    items:
                        $ref: '#/components/schemas/TableInfo'
        TableInfo:
            type: object
            properties:
                name:
                    type: string
                type:
                    type: string
                    enum:
                        - table
                        - index
        AdminQueryRequest:
            type: object
            required:
                - sql
            properties:
                sql:
                    type: string
