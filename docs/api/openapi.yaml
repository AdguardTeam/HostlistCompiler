openapi: 3.0.3
info:
    title: Adblock Compiler API
    description: |
        **Compiler-as-a-Service** for adblock filter lists. Transform, optimize, and combine filter lists from multiple sources with real-time progress tracking.

        ## Features
        - 🎯 Multi-Source Compilation
        - ⚡ Performance (Gzip compression, caching, request deduplication)
        - 🔄 Circuit Breaker with retry logic
        - 📊 Visual Diff between compilations
        - 📡 Real-time progress via SSE and WebSocket
        - 🎪 Batch Processing
        - 🌍 Universal (Deno, Node.js, Cloudflare Workers, browsers)

        ## Links
        - [GitHub Repository](https://github.com/jaypatrick/adblock-compiler)
        - [Documentation](https://github.com/jaypatrick/adblock-compiler/tree/master/docs)
        - [Web UI](https://adblock-compiler.jayson-knight.workers.dev/)

    version: 2.0.0
    license:
        name: GPL-3.0
        url: https://github.com/jaypatrick/adblock-compiler/blob/master/LICENSE
    contact:
        name: Jayson Knight
        url: https://github.com/jaypatrick/adblock-compiler

servers:
    - url: https://adblock-compiler.jayson-knight.workers.dev
      description: Production server
    - url: http://localhost:8787
      description: Local development server

tags:
    - name: Compilation
      description: Filter list compilation endpoints
    - name: Streaming
      description: Real-time event streaming endpoints
    - name: Queue
      description: Async job queue management
    - name: Metrics
      description: Performance metrics and statistics
    - name: WebSocket
      description: Bidirectional real-time communication
    - name: Admin
      description: Administration endpoints for storage, auth, migration, and backends (require X-Admin-Key header)
    - name: Workflow
      description: Durable execution workflow endpoints
    - name: Health
      description: Health monitoring endpoints
    - name: Browser Rendering
      description: Endpoints backed by the Cloudflare Browser Rendering binding (`BROWSER`). Used for resolving redirect chains and monitoring filter-list source URLs for changes.
    - name: Authentication
      description: User-level authentication endpoints — API key management and webhook receivers. Requires Clerk JWT or API key auth.

paths:
    /api:
        get:
            tags: [Metrics]
            summary: Get API information
            description: Returns API version, available endpoints, and usage examples
            operationId: getApiInfo
            responses:
                '200':
                    description: API information
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ApiInfo'

    /compile:
        post:
            tags: [Compilation]
            summary: Compile filter list (JSON)
            description: |
                Compile filter lists and return results as JSON. Results are cached for 1 hour.
                Supports request deduplication for concurrent identical requests.
            operationId: compileJson
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CompileRequest'
                        examples:
                            simple:
                                summary: Simple compilation
                                value:
                                    configuration:
                                        name: My Filter List
                                        sources:
                                            - source: https://example.com/filters.txt
                                              transformations:
                                                  - RemoveComments
                                                  - Validate
                                        transformations:
                                            - Deduplicate
                            withPreFetched:
                                summary: With pre-fetched content
                                value:
                                    configuration:
                                        name: Custom Rules
                                        sources:
                                            - source: my-custom-rules
                                    preFetchedContent:
                                        my-custom-rules: "||ads.example.com^\n||tracking.example.com^"
            responses:
                '200':
                    description: Compilation successful
                    headers:
                        X-Cache:
                            schema:
                                type: string
                                enum: [HIT, MISS]
                            description: Cache hit/miss status
                        X-Request-Deduplication:
                            schema:
                                type: string
                                enum: [HIT]
                            description: Present if request was deduplicated
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CompileResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '429':
                    $ref: '#/components/responses/RateLimitError'
                '500':
                    $ref: '#/components/responses/CompilationError'

    /compile/stream:
        post:
            tags: [Streaming]
            summary: Compile with real-time progress (SSE)
            description: |
                Compile filter lists with real-time progress updates via Server-Sent Events.
                Streams events including source downloads, transformations, diagnostics, cache operations, network events, and metrics.
            operationId: compileStream
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CompileRequest'
            responses:
                '200':
                    description: Event stream
                    content:
                        text/event-stream:
                            schema:
                                type: string
                                description: |
                                    Server-Sent Events stream with the following event types:

                                    **Compilation Events:**
                                    - `log` - Log messages (info, warn, error, debug)
                                    - `source:start` - Source download started
                                    - `source:complete` - Source download completed
                                    - `source:error` - Source download failed
                                    - `transformation:start` - Transformation started
                                    - `transformation:complete` - Transformation completed
                                    - `progress` - Compilation progress update
                                    - `result` - Final compilation result
                                    - `done` - Compilation finished
                                    - `error` - Compilation error

                                    **Enhanced Events:**
                                    - `diagnostic` - Diagnostic event from tracing system
                                    - `cache` - Cache operation (hit/miss/write)
                                    - `network` - Network operation (HTTP requests)
                                    - `metric` - Performance metric
                            examples:
                                logEvent:
                                    value: |
                                        event: log
                                        data: {"level":"info","message":"Fetching source..."}
                                sourceStart:
                                    value: |
                                        event: source:start
                                        data: {"source":{"name":"Source 1","source":"https://..."},"sourceIndex":0,"totalSources":2}
                                diagnostic:
                                    value: |
                                        event: diagnostic
                                        data: {"eventId":"evt-123","timestamp":"2026-01-14T05:00:00Z","category":"compilation","severity":"info","message":"Started compilation"}
                                cache:
                                    value: |
                                        event: cache
                                        data: {"operation":"hit","key":"cache:abc123","size":1024}
                                network:
                                    value: |
                                        event: network
                                        data: {"method":"GET","url":"https://example.com/filters.txt","statusCode":200,"durationMs":234,"responseSize":51200}
                                metric:
                                    value: |
                                        event: metric
                                        data: {"metric":"download_speed","value":218.5,"unit":"KB/s"}
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '429':
                    $ref: '#/components/responses/RateLimitError'

    /compile/batch:
        post:
            tags: [Compilation]
            summary: Batch compile multiple lists
            description: Compile multiple filter lists in parallel (max 10 per batch)
            operationId: compileBatch
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/BatchCompileRequest'
            responses:
                '200':
                    description: Batch compilation results
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/BatchCompileResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '429':
                    $ref: '#/components/responses/RateLimitError'

    /compile/async:
        post:
            tags: [Queue]
            summary: Queue async compilation job
            description: |
                Queue a compilation job for asynchronous processing. Returns immediately with a request ID.
                Use GET /queue/results/{requestId} to retrieve results when complete.
            operationId: compileAsync
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CompileRequest'
            responses:
                '202':
                    description: Job queued successfully
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/QueueResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '500':
                    $ref: '#/components/responses/ServiceUnavailable'

    /compile/batch/async:
        post:
            tags: [Queue]
            summary: Queue batch async compilation
            description: Queue multiple compilations for async processing
            operationId: compileBatchAsync
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/BatchCompileRequest'
            responses:
                '202':
                    description: Batch queued successfully
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/QueueResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '500':
                    $ref: '#/components/responses/ServiceUnavailable'

    /ws/compile:
        get:
            tags: [WebSocket]
            summary: WebSocket endpoint for real-time compilation
            description: |
                Bidirectional WebSocket connection for real-time compilation with event streaming.

                **Client → Server Messages:**
                - `compile` - Start compilation
                - `cancel` - Cancel running compilation
                - `ping` - Heartbeat ping

                **Server → Client Messages:**
                - `welcome` - Connection established
                - `pong` - Heartbeat response
                - `compile:started` - Compilation started
                - `event` - Compilation event (source, transformation, progress, diagnostic, cache, network, metric)
                - `compile:complete` - Compilation finished successfully
                - `compile:error` - Compilation failed
                - `compile:cancelled` - Compilation cancelled
                - `error` - Error message

                **Features:**
                - Up to 3 concurrent compilations per connection
                - Automatic heartbeat (30s interval)
                - Connection timeout (5 minutes idle)
                - Session-based compilation tracking
                - Cancellation support
            operationId: websocketCompile
            responses:
                '101':
                    description: WebSocket connection established
                '426':
                    description: Upgrade required (not a WebSocket request)
            x-websocket-messages:
                client-to-server:
                    - $ref: '#/components/schemas/WsCompileRequest'
                    - $ref: '#/components/schemas/WsCancelRequest'
                    - $ref: '#/components/schemas/WsPingMessage'
                server-to-client:
                    - $ref: '#/components/schemas/WsWelcomeMessage'
                    - $ref: '#/components/schemas/WsPongMessage'
                    - $ref: '#/components/schemas/WsCompileStartedMessage'
                    - $ref: '#/components/schemas/WsEventMessage'
                    - $ref: '#/components/schemas/WsCompileCompleteMessage'
                    - $ref: '#/components/schemas/WsCompileErrorMessage'

    /metrics:
        get:
            tags: [Metrics]
            summary: Get performance metrics
            description: Returns aggregated metrics for the last 30 minutes
            operationId: getMetrics
            responses:
                '200':
                    description: Performance metrics
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MetricsResponse'

    /queue/stats:
        get:
            tags: [Queue]
            summary: Get queue statistics
            description: Returns queue health metrics and job statistics
            operationId: getQueueStats
            responses:
                '200':
                    description: Queue statistics
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/QueueStats'

    /queue/results/{requestId}:
        get:
            tags: [Queue]
            summary: Get async job results
            description: Retrieve results for a completed async compilation job
            operationId: getQueueResults
            parameters:
                - name: requestId
                  in: path
                  required: true
                  schema:
                      type: string
                  description: Request ID returned from async endpoints
            responses:
                '200':
                    description: Job results
                    content:
                        application/json:
                            schema:
                                oneOf:
                                    - $ref: '#/components/schemas/CompileResponse'
                                    - $ref: '#/components/schemas/QueueJobStatus'
                '404':
                    description: Job not found

    /api/version:
        get:
            tags: [Metrics]
            summary: Get latest deployment version
            description: Returns the current version from deployment history
            operationId: getApiVersion
            responses:
                '200':
                    description: Version information
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/VersionResponse'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /api/deployments:
        get:
            tags: [Metrics]
            summary: Get deployment history
            description: Returns deployment history records
            operationId: getDeployments
            parameters:
                - name: limit
                  in: query
                  schema:
                      type: integer
                      format: int32
                      default: 50
                      minimum: 1
                      maximum: 1000
                  description: Maximum number of records to return
                - name: version
                  in: query
                  schema:
                      type: string
                  description: Filter by version
                - name: status
                  in: query
                  schema:
                      type: string
                  description: Filter by deployment status
                - name: branch
                  in: query
                  schema:
                      type: string
                  description: Filter by branch name
            responses:
                '200':
                    description: Deployment history
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DeploymentHistoryResponse'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /api/deployments/stats:
        get:
            tags: [Metrics]
            summary: Get deployment statistics
            description: Returns aggregated deployment statistics
            operationId: getDeploymentStats
            responses:
                '200':
                    description: Deployment statistics
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/DeploymentStatsResponse'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /api/turnstile-config:
        get:
            tags: [Metrics]
            summary: Get Turnstile configuration
            description: Returns the Cloudflare Turnstile site key and whether it is enabled
            operationId: getTurnstileConfig
            responses:
                '200':
                    description: Turnstile configuration
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TurnstileConfigResponse'

    /queue/history:
        get:
            tags: [Queue]
            summary: Get queue job history
            description: Returns job history and queue depth over time
            operationId: getQueueHistory
            responses:
                '200':
                    description: Queue history
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/QueueHistoryResponse'

    /queue/cancel/{requestId}:
        post:
            tags: [Queue]
            summary: Cancel a queued job
            description: Marks a pending queue job as cancelled
            operationId: cancelQueueJob
            parameters:
                - name: requestId
                  in: path
                  required: true
                  schema:
                      type: string
                  description: Request ID of the job to cancel
            responses:
                '200':
                    description: Job cancelled
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CancelJobResponse'
                '400':
                    description: Invalid request ID

    /ast/parse:
        post:
            tags: [Compilation]
            summary: Parse filter rules into AST
            description: Parses adblock filter rules into an Abstract Syntax Tree representation
            operationId: parseAST
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ASTParseRequest'
            responses:
                '200':
                    description: Parsed AST
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ASTParseResponse'
                '400':
                    description: Invalid request (must provide rules or text)
                '500':
                    description: Parse error

    /admin/storage/stats:
        get:
            tags: [Admin]
            summary: Get storage statistics
            description: Returns database table counts and expired entry counts
            operationId: getAdminStorageStats
            security:
                - AdminKey: []
            responses:
                '200':
                    description: Storage statistics
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminStorageStatsResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/storage/clear-expired:
        post:
            tags: [Admin]
            summary: Clear expired entries
            description: Deletes all expired entries from storage tables
            operationId: clearExpiredEntries
            security:
                - AdminKey: []
            responses:
                '200':
                    description: Entries cleared
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminOperationResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/storage/clear-cache:
        post:
            tags: [Admin]
            summary: Clear cache entries
            description: Deletes all cache entries from storage tables
            operationId: clearCacheEntries
            security:
                - AdminKey: []
            responses:
                '200':
                    description: Cache cleared
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminOperationResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/storage/export:
        get:
            tags: [Admin]
            summary: Export storage data
            description: Exports storage entries as JSON (includes storage entries, filter cache, and compilation metadata; returned amounts subject to implementation limits)
            operationId: exportStorage
            security:
                - AdminKey: []
            responses:
                '200':
                    description: Storage export
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminExportResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/storage/vacuum:
        post:
            tags: [Admin]
            summary: Vacuum database
            description: Runs VACUUM on the D1 database to reclaim space
            operationId: vacuumDatabase
            security:
                - AdminKey: []
            responses:
                '200':
                    description: Vacuum completed
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminOperationResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/storage/tables:
        get:
            tags: [Admin]
            summary: List database tables
            description: Returns all tables and indexes in the D1 database
            operationId: listStorageTables
            security:
                - AdminKey: []
            responses:
                '200':
                    description: Table listing
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminTablesResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/storage/query:
        post:
            tags: [Admin]
            summary: Execute read-only SQL query
            description: Executes a SELECT-only SQL query against the D1 database for debugging
            operationId: queryStorage
            security:
                - AdminKey: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AdminQueryRequest'
            responses:
                '200':
                    description: Query results
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminQueryResponse'
                '400':
                    description: Invalid or disallowed SQL
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /workflow/compile:
        post:
            tags: [Workflow]
            summary: Start async compilation workflow
            description: Creates a durable Cloudflare Workflow instance for compilation
            operationId: startWorkflowCompile
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CompileRequest'
            responses:
                '202':
                    description: Workflow started
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkflowStartResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /workflow/batch:
        post:
            tags: [Workflow]
            summary: Start async batch compilation workflow
            description: Creates a durable Cloudflare Workflow instance for batch compilation
            operationId: startWorkflowBatch
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/BatchCompileRequest'
            responses:
                '202':
                    description: Workflow started
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkflowStartResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /workflow/cache-warm:
        post:
            tags: [Workflow]
            summary: Start cache warming workflow
            description: Triggers manual cache warming for specified configurations
            operationId: startWorkflowCacheWarm
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CacheWarmRequest'
            responses:
                '202':
                    description: Workflow started
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkflowStartResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /workflow/health-check:
        post:
            tags: [Workflow]
            summary: Start health monitoring workflow
            description: Triggers manual health check for specified filter list sources
            operationId: startWorkflowHealthCheck
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/HealthCheckRequest'
            responses:
                '202':
                    description: Workflow started
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkflowStartResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /workflow/status/{workflowType}/{instanceId}:
        get:
            tags: [Workflow]
            summary: Get workflow instance status
            description: Returns the current status and output of a workflow instance
            operationId: getWorkflowStatus
            parameters:
                - name: workflowType
                  in: path
                  required: true
                  schema:
                      type: string
                      enum: [compilation, batch-compilation, cache-warming, health-monitoring]
                  description: Type of workflow
                - name: instanceId
                  in: path
                  required: true
                  schema:
                      type: string
                  description: Workflow instance ID
            responses:
                '200':
                    description: Workflow status
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkflowStatusResponse'
                '400':
                    description: Unknown workflow type
                '404':
                    description: Workflow instance not found
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /workflow/metrics:
        get:
            tags: [Workflow]
            summary: Get workflow metrics
            description: Returns aggregated metrics for all workflow types
            operationId: getWorkflowMetrics
            responses:
                '200':
                    description: Workflow metrics
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkflowMetricsResponse'

    /workflow/events/{workflowId}:
        get:
            tags: [Workflow]
            summary: Get workflow events
            description: Returns progress events for a specific workflow instance
            operationId: getWorkflowEvents
            parameters:
                - name: workflowId
                  in: path
                  required: true
                  schema:
                      type: string
                  description: Workflow instance ID
                - name: since
                  in: query
                  schema:
                      type: string
                      format: date-time
                  description: Return only events after this timestamp
            responses:
                '200':
                    description: Workflow events
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WorkflowEventsResponse'

    /health/latest:
        get:
            tags: [Health]
            summary: Get latest health check results
            description: Returns the results of the most recent health monitoring workflow run
            operationId: getLatestHealth
            responses:
                '200':
                    description: Latest health check data
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HealthLatestResponse'

    /health:
        get:
            tags: [Health]
            summary: Basic health check
            description: Returns current service health status and version
            operationId: getHealth
            responses:
                '200':
                    description: Service is healthy
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HealthResponse'

    /admin/auth/users:
        post:
            tags: [Admin]
            summary: Create user
            description: Creates a new user account. Requires Hyperdrive (PostgreSQL) binding.
            operationId: createUser
            security:
                - AdminKey: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateUserRequest'
            responses:
                '201':
                    description: User created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CreateUserResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '409':
                    description: User with this email already exists
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/auth/api-keys:
        post:
            tags: [Admin]
            summary: Create API key
            description: |
                Creates a new API key for a user. Requires Hyperdrive (PostgreSQL) binding.

                **Important:** The raw API key is only returned once. Store it securely.
            operationId: createApiKey
            security:
                - AdminKey: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateApiKeyRequest'
            responses:
                '201':
                    description: API key created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CreateApiKeyResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '404':
                    description: User not found
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'
        get:
            tags: [Admin]
            summary: List API keys
            description: Lists API keys for a user (without key hashes). Requires Hyperdrive (PostgreSQL) binding.
            operationId: listApiKeys
            security:
                - AdminKey: []
            parameters:
                - name: userId
                  in: query
                  required: true
                  schema:
                      type: string
                      format: uuid
                  description: User ID to list API keys for
            responses:
                '200':
                    description: List of API keys
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListApiKeysResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/auth/api-keys/revoke:
        post:
            tags: [Admin]
            summary: Revoke API key
            description: Revokes an API key by ID or key prefix. Requires Hyperdrive (PostgreSQL) binding.
            operationId: revokeApiKey
            security:
                - AdminKey: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RevokeApiKeyRequest'
            responses:
                '200':
                    description: API key revoked
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/RevokeApiKeyResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '404':
                    description: API key not found or already revoked
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/auth/api-keys/validate:
        post:
            tags: [Admin]
            summary: Validate API key
            description: Validates an API key without authenticating a full request. Useful for the admin UI to test keys.
            operationId: validateApiKey
            security:
                - AdminKey: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ValidateApiKeyRequest'
            responses:
                '200':
                    description: Validation result
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidateApiKeyResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    # ─── User-Level Authentication Endpoints ───────────────────────────

    /api/keys:
        post:
            tags: [Authentication]
            summary: Create API key
            description: |
                Creates a new API key for the authenticated user.
                The raw API key (with `abc_` prefix) is returned **only once** — store it securely.
                Requires Clerk JWT authentication.
            operationId: userCreateApiKey
            security:
                - ClerkJWT: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UserCreateApiKeyRequest'
            responses:
                '201':
                    description: API key created
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UserCreateApiKeyResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
        get:
            tags: [Authentication]
            summary: List user's API keys
            description: |
                Lists all API keys belonging to the authenticated user.
                Returns metadata only — never the key hash or plaintext.
                Requires Clerk JWT authentication.
            operationId: userListApiKeys
            security:
                - ClerkJWT: []
            responses:
                '200':
                    description: List of API keys
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UserListApiKeysResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'

    /api/keys/{keyId}:
        delete:
            tags: [Authentication]
            summary: Revoke API key
            description: |
                Revokes (soft-deletes) an API key. The key remains in the database for audit
                purposes but is no longer valid for authentication.
                Only the key owner can revoke their own keys.
            operationId: userRevokeApiKey
            security:
                - ClerkJWT: []
            parameters:
                - name: keyId
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                  description: ID of the API key to revoke
            responses:
                '200':
                    description: API key revoked
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                    message:
                                        type: string
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '404':
                    description: API key not found or already revoked
        patch:
            tags: [Authentication]
            summary: Update API key
            description: |
                Updates an API key's name or scopes. Only the key owner can update their own keys.
                Requires Clerk JWT authentication.
            operationId: userUpdateApiKey
            security:
                - ClerkJWT: []
            parameters:
                - name: keyId
                  in: path
                  required: true
                  schema:
                      type: string
                      format: uuid
                  description: ID of the API key to update
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UserUpdateApiKeyRequest'
            responses:
                '200':
                    description: API key updated
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UserUpdateApiKeyResponse'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '404':
                    description: API key not found or already revoked

    /api/webhooks/clerk:
        post:
            tags: [Authentication]
            summary: Clerk webhook receiver
            description: |
                Receives Clerk webhook events (user.created, user.updated, user.deleted, session.created).
                Verified via Svix webhook signature. This endpoint is called by Clerk's webhook infrastructure
                and should not be called directly.
            operationId: clerkWebhook
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            description: Clerk webhook event payload (Svix-signed)
                            properties:
                                type:
                                    type: string
                                    description: Event type (e.g. user.created, user.updated)
                                data:
                                    type: object
                                    description: Event-specific payload
                                object:
                                    type: string
                                    enum: [event]
            parameters:
                - name: svix-id
                  in: header
                  required: true
                  schema:
                      type: string
                  description: Svix webhook ID
                - name: svix-timestamp
                  in: header
                  required: true
                  schema:
                      type: string
                  description: Svix webhook timestamp
                - name: svix-signature
                  in: header
                  required: true
                  schema:
                      type: string
                  description: Svix webhook signature
            responses:
                '200':
                    description: Webhook processed successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    success:
                                        type: boolean
                                    message:
                                        type: string
                '400':
                    description: Invalid webhook signature or payload
                '401':
                    description: Webhook signature verification failed

    /admin/migrate/d1-to-pg:
        post:
            tags: [Admin]
            summary: Migrate D1 data to PostgreSQL
            description: |
                One-time migration that reads data from Cloudflare D1 (SQLite) and writes it to PostgreSQL via Hyperdrive.

                Migrates the following tables: `storage_entries`, `filter_cache`, `compilation_metadata`.

                The migration is:
                - **Idempotent**: uses ON CONFLICT DO NOTHING to skip existing rows
                - **Batched**: processes rows in chunks of 100
                - **Read-only on D1**: never modifies the source database
                - **Resumable**: can be re-run safely if interrupted
            operationId: migrateD1ToPg
            security:
                - AdminKey: []
            parameters:
                - name: dryRun
                  in: query
                  required: false
                  schema:
                      type: boolean
                      default: false
                  description: Count rows without writing (dry run)
                - name: tables
                  in: query
                  required: false
                  schema:
                      type: string
                  description: 'Comma-separated list of tables to migrate (default: all)'
                  example: storage_entries,filter_cache
            responses:
                '200':
                    description: Migration result
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MigrationResult'
                '400':
                    $ref: '#/components/responses/BadRequestError'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/backends:
        get:
            tags: [Admin]
            summary: Backend health status
            description: Returns health and connectivity status of both D1 and PostgreSQL backends
            operationId: getBackendStatus
            security:
                - AdminKey: []
            responses:
                '200':
                    description: Backend status
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/BackendStatusResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'

    /admin/pg/stats:
        get:
            tags: [Admin]
            summary: PostgreSQL storage statistics
            description: Returns storage statistics from the PostgreSQL backend (mirrors /admin/storage/stats for D1)
            operationId: getPgStorageStats
            security:
                - AdminKey: []
            responses:
                '200':
                    description: PostgreSQL storage statistics
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PgStorageStatsResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/pg/export:
        get:
            tags: [Admin]
            summary: Export PostgreSQL data
            description: Exports data from the PostgreSQL backend (mirrors /admin/storage/export for D1)
            operationId: exportPgData
            security:
                - AdminKey: []
            responses:
                '200':
                    description: PostgreSQL data export
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminExportResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/pg/clear-expired:
        post:
            tags: [Admin]
            summary: Clear expired PostgreSQL entries
            description: Deletes all expired entries from PostgreSQL storage and cache tables
            operationId: clearPgExpiredEntries
            security:
                - AdminKey: []
            responses:
                '200':
                    description: Entries cleared
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminOperationResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/pg/clear-cache:
        post:
            tags: [Admin]
            summary: Clear PostgreSQL cache
            description: Deletes all cache entries from PostgreSQL tables
            operationId: clearPgCache
            security:
                - AdminKey: []
            responses:
                '200':
                    description: Cache cleared
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminOperationResponse'
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /admin/pg/query:
        post:
            tags: [Admin]
            summary: Execute read-only PostgreSQL query
            description: Executes a SELECT-only SQL query against PostgreSQL for debugging (mirrors /admin/storage/query for D1)
            operationId: queryPg
            security:
                - AdminKey: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AdminQueryRequest'
            responses:
                '200':
                    description: Query results
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminQueryResponse'
                '400':
                    description: Invalid or disallowed SQL
                '401':
                    $ref: '#/components/responses/UnauthorizedError'
                '503':
                    $ref: '#/components/responses/ServiceUnavailable'

    /api/browser/resolve-url:
        post:
            tags: [Browser Rendering]
            summary: Resolve canonical URL via browser
            description: |
                Navigates to a URL using the Cloudflare Browser Rendering binding and returns the
                final canonical URL after all redirects. Useful for discovering the true destination
                of redirect chains or URL shorteners before scheduling a filter-list download.

                Requires the `BROWSER` binding to be configured in `wrangler.toml`.
            operationId: browserResolveUrl
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/BrowserResolveRequest'
            responses:
                '200':
                    description: Resolved URL
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/BrowserResolveResponse'
                '400':
                    description: Invalid request body
                '502':
                    description: Browser navigation failed
                '503':
                    description: BROWSER binding not configured

    /api/browser/monitor:
        post:
            tags: [Browser Rendering]
            summary: Monitor filter-list sources for reachability
            description: |
                Performs parallel browser-based health checks on a list of filter-list source
                URLs. For each URL a headless browser navigates to the page, verifies non-empty
                text content, and optionally captures a full-page PNG screenshot stored in R2.

                The full result set is persisted under the KV key `browser:monitor:latest`
                and is retrievable via `GET /api/browser/monitor/latest`.

                Requires the `BROWSER` binding. `FILTER_STORAGE` (R2) is required for
                screenshot capture. `COMPILATION_CACHE` (KV) is required for result persistence.
            operationId: browserMonitor
            security:
                - BearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SourceMonitorRequest'
            responses:
                '200':
                    description: Per-source reachability results
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SourceMonitorResponse'
                '400':
                    description: Invalid request body
                '503':
                    description: BROWSER binding not configured

    /api/browser/monitor/latest:
        get:
            tags: [Browser Rendering]
            summary: Retrieve the latest monitor results
            description: |
                Returns the most recent result set written by `POST /api/browser/monitor`. Reads
                the KV key `browser:monitor:latest` from `COMPILATION_CACHE`.

                Requires the `COMPILATION_CACHE` binding.
            operationId: browserMonitorLatest
            security:
                - BearerAuth: []
            responses:
                '200':
                    description: Latest monitor results
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SourceMonitorResponse'
                '404':
                    description: No monitor results available yet
                '503':
                    description: COMPILATION_CACHE binding not configured

    /validate-rule:
        post:
