    /notify:
        post:
            summary: Send a notification event to configured webhook targets
            description: Delivers a notification event (e.g. error, warning, info) to one or more configured targets — generic HTTP webhook (WEBHOOK_URL), Sentry (SENTRY_DSN), and/or Datadog (DATADOG_API_KEY). At least one target must be configured in the worker environment.
            operationId: notify
            tags:
                - Notifications
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/WebhookNotifyRequest'
            responses:
                '200':
                    description: Notification delivered to at least one target
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebhookNotifyResponse'
                '400':
                    description: Invalid request body
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'
                '502':
                    description: All configured notification targets failed to receive the event
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebhookNotifyResponse'
                '503':
