                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ErrorResponse'

components:
    schemas:
        # Request Schemas
        CompileRequest:
            type: object
            required:
                - configuration
            properties:
                configuration:
                    $ref: '#/components/schemas/Configuration'
                preFetchedContent:
                    type: object
                    additionalProperties:
                        type: string
                    description: Map of source keys to pre-fetched content
                benchmark:
                    type: boolean
                    default: false
                    description: Include detailed performance metrics
                turnstileToken:
                    type: string
                    description: Cloudflare Turnstile token (if enabled)
                priority:
                    type: string
                    enum: [standard, high]
                    default: standard
                    description: Job processing priority (used for async compilation)

        Configuration:
            type: object
            required:
                - name
                - sources
            properties:
                name:
                    type: string
                    minLength: 1
                    description: Name of the compiled list
                description:
                    type: string
                    description: Description of the list
                homepage:
                    type: string
                    format: uri
                    description: Homepage URL
                license:
                    type: string
                    description: License identifier
                version:
                    type: string
                    description: Version string
                sources:
                    type: array
                    items:
                        $ref: '#/components/schemas/Source'
                    minItems: 1
                transformations:
                    type: array
                    items:
                        $ref: '#/components/schemas/Transformation'
                    description: Global transformations to apply
                exclusions:
                    type: array
                    items:
                        type: string
                    description: Rules to exclude (supports wildcards and regex)
                exclusions_sources:
                    type: array
                    items:
                        type: string
                    description: Files containing exclusion rules
                inclusions:
                    type: array
                    items:
                        type: string
                    description: Rules to include (supports wildcards and regex)
                inclusions_sources:
                    type: array
                    items:
                        type: string
                    description: Files containing inclusion rules

        Source:
            type: object
            required:
                - source
            properties:
                source:
                    type: string
                    description: URL or key for pre-fetched content
                name:
                    type: string
                    description: Name of the source
                type:
                    type: string
                    enum: [adblock, hosts]
                    default: adblock
                    description: Source type
                transformations:
                    type: array
                    items:
                        $ref: '#/components/schemas/Transformation'
                exclusions:
                    type: array
                    items:
                        type: string
                inclusions:
                    type: array
                    items:
                        type: string

        Transformation:
            type: string
            enum:
                - ConvertToAscii
                - RemoveComments
                - Compress
                - RemoveModifiers
                - Validate
                - ValidateAllowIp
                - Deduplicate
                - InvertAllow
                - RemoveEmptyLines
                - TrimLines
                - InsertFinalNewLine
            description: |
                Available transformations (applied in this order):
                - **ConvertToAscii**: Convert internationalized domains to ASCII
                - **RemoveComments**: Remove comment lines
                - **Compress**: Convert hosts format to adblock syntax
                - **RemoveModifiers**: Strip unsupported modifiers
                - **Validate**: Remove invalid/dangerous rules
                - **ValidateAllowIp**: Like Validate but keeps IP addresses
                - **Deduplicate**: Remove duplicate rules
                - **InvertAllow**: Convert blocking rules to allowlist
                - **RemoveEmptyLines**: Remove blank lines
                - **TrimLines**: Remove leading/trailing whitespace
                - **InsertFinalNewLine**: Add final newline

        BatchCompileRequest:
            type: object
            required:
                - requests
            properties:
                requests:
                    type: array
                    items:
                        $ref: '#/components/schemas/BatchRequestItem'
                    minItems: 1
                    maxItems: 10

        BatchRequestItem:
            type: object
            required:
                - id
                - configuration
            properties:
                id:
                    type: string
                    description: Unique request identifier
                configuration:
                    $ref: '#/components/schemas/Configuration'
                preFetchedContent:
                    type: object
                    additionalProperties:
                        type: string
                benchmark:
                    type: boolean

        # Response Schemas
        CompileResponse:
            type: object
            required:
                - success
            properties:
                success:
                    type: boolean
                rules:
                    type: array
                    items:
                        type: string
                    description: Compiled filter rules
                ruleCount:
                    type: integer
                    description: Number of rules
                metrics:
                    $ref: '#/components/schemas/CompilationMetrics'
                compiledAt:
                    type: string
                    format: date-time
                previousVersion:
                    $ref: '#/components/schemas/PreviousVersion'
                cached:
                    type: boolean
                    description: Whether result was served from cache
                deduplicated:
                    type: boolean
                    description: Whether request was deduplicated
                error:
                    type: string
                    description: Error message if success=false

        CompilationMetrics:
            type: object
            properties:
                totalDurationMs:
                    type: integer
                sourceCount:
                    type: integer
                ruleCount:
                    type: integer
                transformationMetrics:
                    type: array
                    items:
                        type: object
                        properties:
                            name:
                                type: string
                            inputCount:
                                type: integer
                            outputCount:
                                type: integer
                            durationMs:
                                type: integer

        PreviousVersion:
            type: object
            properties:
                rules:
                    type: array
                    items:
                        type: string
                ruleCount:
                    type: integer
                compiledAt:
                    type: string
                    format: date-time

        BatchCompileResponse:
            type: object
            properties:
                success:
                    type: boolean
                results:
                    type: array
                    items:
                        allOf:
                            - type: object
                              properties:
                                  id:
                                      type: string
