                    type: string
                rules:
                    type: array
                    items:
                        type: string
                ruleCount:
                    type: integer
                metrics:
                    type: object
                compiledAt:
                    type: string

        WsCompileErrorMessage:
            type: object
            required:
                - type
                - sessionId
                - error
            properties:
                type:
                    type: string
                    enum: [compile:error]
                sessionId:
                    type: string
                error:
                    type: string
                details:
                    type: object

        BrowserWaitUntil:
            type: string
            enum: [load, domcontentloaded, networkidle]
            default: networkidle
            description: |
                Playwright `waitUntil` navigation event. `networkidle` (default) waits until
                there are no more than 0 network connections for at least 500 ms — suitable for
                most filter-list sources. Use `load` for fastest navigation.

        BrowserResolveRequest:
            type: object
            required: [url]
            properties:
                url:
                    type: string
                    format: uri
                    description: The URL to navigate to and resolve.
                    example: 'https://example.com/redirect-me'
                waitUntil:
                    $ref: '#/components/schemas/BrowserWaitUntil'

        BrowserResolveResponse:
            type: object
            required: [success, resolvedUrl, originalUrl]
            properties:
                success:
                    type: boolean
                    example: true
                resolvedUrl:
                    type: string
                    format: uri
                    description: The canonical URL after all JavaScript redirects have settled.
                    example: 'https://example.com/final-destination'
                originalUrl:
                    type: string
                    format: uri
                    description: The original URL that was submitted.
                    example: 'https://example.com/redirect-me'

        SourceMonitorEntry:
            type: object
            required: [url, reachable, checkedAt]
            properties:
                url:
                    type: string
                    format: uri
                    description: The source URL that was checked.
                reachable:
                    type: boolean
                    description: Whether the URL was reachable and returned non-empty content.
                checkedAt:
                    type: string
                    format: date-time
                    description: ISO-8601 timestamp of when this URL was checked.
                screenshotKey:
                    type: string
                    description: R2 object key for the captured screenshot (only present when captureScreenshots is true).
                error:
                    type: string
                    description: Error message, present only when the URL could not be fetched.

        SourceMonitorRequest:
            type: object
            required: [urls]
            properties:
                urls:
                    type: array
                    items:
                        type: string
                        format: uri
                    minItems: 1
                    maxItems: 10
                    description: One or more filter-list source URLs to check (max 10).
                    example:
                        - 'https://example.com/filter-list.txt'
                        - 'https://another.example.com/rules.txt'
                captureScreenshots:
                    type: boolean
                    default: false
                    description: When true, a full-page PNG screenshot is captured and stored in R2 per URL.
                screenshotPrefix:
                    type: string
                    description: R2 key prefix for screenshots (alphanumeric, hyphens, underscores only). Defaults to the current ISO date.
                    example: '2025-07-01'
                timeout:
                    type: integer
                    minimum: 1000
                    maximum: 60000
                    description: Per-URL navigation timeout in milliseconds.
                    example: 30000
                waitUntil:
                    $ref: '#/components/schemas/BrowserWaitUntil'

        SourceMonitorResponse:
            type: object
            required: [success, results, total, reachable, unreachable]
            properties:
                success:
                    type: boolean
                    example: true
                results:
                    type: array
                    items:
                        $ref: '#/components/schemas/SourceMonitorEntry'
                total:
                    type: integer
                    description: Total number of URLs checked.
                reachable:
                    type: integer
                    description: Number of reachable URLs.
                unreachable:
                    type: integer
                    description: Number of unreachable URLs.

    responses:
        BadRequestError:
            description: Bad request - request body failed schema validation
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            error:
                                type: string
                                example: Invalid request body

        RateLimitError:
            description: Rate limit exceeded
            headers:
                Retry-After:
                    schema:
                        type: integer
                    description: Seconds until retry allowed
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            error:
                                type: string
                                example: Rate limit exceeded. Maximum 10 requests per minute.

        CompilationError:
            description: Compilation failed
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            error:
                                type: string

        UnauthorizedError:
            description: Unauthorized - missing or invalid admin key
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            error:
                                type: string

        ServiceUnavailable:
            description: Service unavailable - required binding not configured
            content:
                application/json:
                    schema:
                        type: object
                        properties:
                            success:
                                type: boolean
                                example: false
                            error:
                                type: string

        # Rule Validation Schemas
        ValidateRuleRequest:
            type: object
            required:
                - rule
            properties:
                rule:
                    type: string
                    description: The adblock rule string to validate
                    example: '||example.com^'
                testUrl:
                    type: string
                    format: uri
                    description: Optional URL to test the rule against
                    example: 'https://example.com/ads/banner.png'
                strict:
                    type: boolean
                    description: Enable strict validation mode (rejects rules that the tolerant parser would silently accept)
                    default: false
                    example: true

        ValidateRuleResponse:
            type: object
            required:
                - success
                - valid
                - rule
                - duration
            properties:
                success:
                    type: boolean
                    description: Whether the validation request was processed successfully
                valid:
                    type: boolean
                    description: Whether the rule is syntactically valid
                rule:
                    type: string
                    description: The original rule string
                ruleType:
                    type: string
                    description: High-level classification of the rule (e.g. "NetworkRule", "CosmeticRule")
                    nullable: true
                category:
                    type: string
                    description: Category of the rule (e.g. "Network", "Cosmetic")
                    nullable: true
                syntax:
                    type: string
                    description: Detected adblock syntax variant for the rule
                    nullable: true
                ast:
                    type: object
                    description: Abstract Syntax Tree of the parsed rule
                    nullable: true
                matchResult:
                    type: boolean
                    description: Whether the rule matches the provided testUrl (if supplied)
                    nullable: true
                testUrl:
                    type: string
                    format: uri
                    description: The URL used to test the rule against, if provided
                    nullable: true
                error:
                    type: string
                    description: Error message if the rule is invalid
                    nullable: true
                duration:
                    type: string
                    description: Processing duration (e.g. "2ms")

        # Rule Set Schemas
        RuleSet:
            type: object
            required:
                - id
                - name
                - rules
                - createdAt
                - updatedAt
            properties:
                id:
                    type: string
                    format: uuid
                    description: Unique identifier for the rule set
                name:
                    type: string
                    description: Human-readable name for the rule set
                description:
                    type: string
                    description: Optional description of the rule set
                    nullable: true
                rules:
                    type: array
                    items:
                        type: string
                    description: Array of adblock rule strings
                tags:
                    type: array
                    items:
                        type: string
                    description: Optional tags for categorising the rule set
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        RuleSetCreateRequest:
            type: object
            required:
                - name
                - rules
            properties:
                name:
                    type: string
                    description: Name for the new rule set
                description:
                    type: string
                    nullable: true
                rules:
                    type: array
                    items:
                        type: string
                    minItems: 1
                tags:
                    type: array
                    items:
                        type: string

        RuleSetUpdateRequest:
            type: object
            properties:
                name:
                    type: string
                description:
                    type: string
                    nullable: true
                rules:
                    type: array
                    items:
                        type: string
                tags:
                    type: array
                    items:
                        type: string

        RuleSetMeta:
            type: object
            description: Rule set metadata returned in list responses (no rules array)
            required:
                - id
                - name
                - ruleCount
                - createdAt
                - updatedAt
            properties:
                id:
                    type: string
                    format: uuid
                    description: Unique identifier for the rule set
                name:
                    type: string
                    description: Human-readable name for the rule set
                description:
                    type: string
                    description: Optional description of the rule set
                    nullable: true
                ruleCount:
                    type: integer
                    description: Number of rules in the set
                tags:
                    type: array
                    items:
                        type: string
                    description: Optional tags for categorising the rule set
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        RuleSetListResponse:
            type: object
            required:
                - success
                - items
                - total
            properties:
                success:
                    type: boolean
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/RuleSetMeta'
                    description: Metadata-only list of rule sets (rules array excluded)
                total:
                    type: integer
                    description: Total number of rule sets

        RuleSetResponse:
            type: object
            required:
                - success
                - data
            properties:
                success:
                    type: boolean
                data:
                    $ref: '#/components/schemas/RuleSet'

        # Webhook / Notification Schemas
        NotifyLevel:
            type: string
            enum:
                - info
                - warn
                - error
                - debug
            description: Severity level of the notification

        WebhookNotifyRequest:
            type: object
            required:
                - event
                - message
            properties:
                event:
                    type: string
                    description: Event name or type (e.g. "compile.error", "rule.invalid")
                    minLength: 1
                    maxLength: 128
                level:
                    $ref: '#/components/schemas/NotifyLevel'
                message:
                    type: string
                    description: Human-readable message describing the event
                    minLength: 1
                    maxLength: 2048
                metadata:
                    type: object
                    additionalProperties: true
                    description: Optional structured metadata associated with the event
                    nullable: true
                source:
                    type: string
                    description: Identifies the component that emitted the event
                    nullable: true
                timestamp:
                    type: string
                    format: date-time
                    description: ISO 8601 event timestamp; defaults to current time if omitted
                    nullable: true

        WebhookDelivery:
            type: object
            required:
                - target
                - success
            properties:
                target:
                    type: string
                    description: Delivery target identifier (e.g. webhook, sentry, datadog)
                success:
                    type: boolean
                statusCode:
                    type: integer
                    description: HTTP status code returned by the target
                    nullable: true
                error:
                    type: string
                    description: Error message if delivery failed
                    nullable: true

        WebhookNotifyResponse:
            type: object
            required:
                - success
                - event
                - deliveries
                - duration
            properties:
                success:
                    type: boolean
                    description: True if at least one delivery succeeded
                event:
                    type: string
                    description: The event name from the request
                deliveries:
                    type: array
                    items:
                        $ref: '#/components/schemas/WebhookDelivery'
                duration:
                    type: string
                    description: Processing duration (e.g. "5ms")

    securitySchemes:
        Turnstile:
            type: apiKey
            in: header
            name: turnstileToken
            description: Cloudflare Turnstile token (if enabled on the server)
        AdminKey:
            type: apiKey
            in: header
            name: X-Admin-Key
            description: Admin API key for protected admin endpoints
        ClerkJWT:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: Clerk-issued JWT for authenticated user requests. Obtain via Clerk sign-in flow.
        UserApiKey:
            type: http
            scheme: bearer
            bearerFormat: ApiKey
            description: User API key with `abc_` prefix. Pass the key as a Bearer token in the Authorization header (e.g. `Authorization: Bearer abc_...`).

security: []
